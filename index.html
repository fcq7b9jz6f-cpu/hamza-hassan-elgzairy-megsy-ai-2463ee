يعة البرق ونهايات خلفية متينة تدعم ملايين البيانات يومياً في Megsy AI.\",\n      icon: Code,\n      color: \"from-blue-500 to-cyan-600\"\n    },\n    {\n      title: \"قيادة الابتكار\",\n      desc: \"أساهم في تشكيل مستقبل Megsy AI من خلال أبحاث متقدمة في معالجة اللغات الطبيعية.\",\n      icon: Rocket,\n      color: \"from-fuchsia-500 to-pink-600\"\n    }\n  ];\n\n  return (\n    <div className=\"overflow-hidden\">\n      {/* Hero Section */}\n      <section className=\"relative min-h-screen flex items-center justify-center pt-20 px-4\">\n        <div className=\"absolute inset-0 z-0\">\n          <div className=\"absolute top-1/4 left-1/4 w-96 h-96 bg-violet-600/20 blur-[120px] rounded-full animate-pulse\" />\n          <div className=\"absolute bottom-1/4 right-1/4 w-[500px] h-[500px] bg-fuchsia-600/10 blur-[150px] rounded-full\" />\n        </div>\n\n        <div className={`${ui.container} relative z-10 grid lg:grid-cols-2 gap-12 items-center`}>\n          <motion.div \n            initial={{ opacity: 0, x: -50 }}\n            animate={{ opacity: 1, x: 0 }}\n            transition={{ duration: 0.8 }}\n          >\n            <div className=\"inline-flex items-center gap-2 px-4 py-2 rounded-full bg-white/5 border border-white/10 mb-8 backdrop-blur-md\">\n              <Sparkles className=\"w-4 h-4 text-fuchsia-400\" />\n              <span className=\"text-sm font-bold text-white/80\">AI Engineer @ Megsy AI</span>\n            </div>\n            \n            <h1 className={ui.h1}>\n              حمزة <br />\n              <span className={ui.gradientText}>الجزايري</span>\n            </h1>\n            \n            <p className={ui.p + \" mb-10\"}>\n              مهندس ذكاء اصطناعي وشغوف ببناء تطبيقات المستقبل. أقوم بتحويل الأفكار المعقدة إلى منتجات رقمية ذكية تخدم آلاف المستخدمين حول العالم عبر منصة Megsy AI.\n            </p>\n\n            <div className=\"flex flex-col sm:flex-row gap-4\">\n              <Link to=\"/store\" className={ui.btnPrimary}>\n                استكشف المتجر <ArrowRight className=\"w-5 h-5\" />\n              </Link>\n              <Link to=\"/projects\" className={ui.btnGhost}>\n                أعمالي التقنية\n              </Link>\n            </div>\n\n            <div className=\"mt-16 flex items-center gap-6 grayscale opacity-50 hover:grayscale-0 hover:opacity-100 transition-all\">\n              <span className=\"text-sm font-bold tracking-widest text-white/30 uppercase\">Trusted by</span>\n              <img src=\"https://megsyai.com/favicon.ico\" alt=\"Megsy AI\" className=\"h-8\" />\n              <span className=\"text-xl font-black text-white/40\">MEGSY AI</span>\n            </div>\n          </motion.div>\n\n          <motion.div \n            initial={{ opacity: 0, scale: 0.8, rotate: 5 }}\n            animate={{ opacity: 1, scale: 1, rotate: 0 }}\n            transition={{ duration: 1 }}\n            className=\"relative\"\n          >\n            <div className=\"relative z-10 aspect-square rounded-[3rem] overflow-hidden border-2 border-white/10 shadow-2xl\">\n              <img \n                src=\"https://images.pexels.com/photos/19805885/pexels-photo-19805885.jpeg?auto=compress&cs=tinysrgb&dpr=2&h=650&w=940\" \n                alt=\"Hamza Hassan\"\n                className=\"w-full h-full object-cover\"\n              />\n              <div className=\"absolute inset-0 bg-gradient-to-t from-black via-transparent to-transparent\" />\n              <div className=\"absolute bottom-8 left-8 right-8 p-6 glass rounded-2xl\">\n                <div className=\"flex items-center gap-4\">\n                  <div className=\"w-12 h-12 rounded-full bg-violet-500 flex items-center justify-center\">\n                    <Star className=\"text-white fill-white w-6 h-6\" />\n                  </div>\n                  <div>\n                    <div className=\"font-bold text-white italic\">\"نحن لا نتوقع المستقبل، نحن نبرمجه.\"</div>\n                    <div className=\"text-sm text-white/50\">حمزة الجزايري — 2024</div>\n                  </div>\n                </div>\n              </div>\n            </div>\n            {/* Shapes */}\n            <div className=\"absolute -top-10 -right-10 w-40 h-40 bg-fuchsia-500/20 rounded-full blur-3xl\" />\n          </motion.div>\n        </div>\n      </section>\n\n      {/* Stats Section */}\n      <section className=\"py-20 bg-white/[0.02] border-y border-white/5\">\n        <div className={ui.container}>\n          <div className=\"grid grid-cols-2 md:grid-cols-4 gap-8\">\n            {stats.map((s, idx) => (\n              <div key={idx} className=\"text-center\">\n                <div className=\"text-4xl sm:text-6xl font-black text-gradient mb-2\">{s.value}</div>\n                <div className=\"text-sm sm:text-base font-medium text-white/40 uppercase tracking-widest\">{s.label}</div>\n              </div>\n            ))}\n          </div>\n        </div>\n      </section>\n\n      {/* Features/Work Section */}\n      <section className={ui.section}>\n        <div className={ui.container}>\n          <div className=\"text-center mb-20\">\n            <h2 className={ui.h2}>خبرات تضعك في <span className={ui.gradientText}>المقدمة</span></h2>\n            <p className={ui.p + \" mx-auto\"}>\n              أركز على تمكين الأفراد والشركات من استغلال القوة الكاملة للذكاء الاصطناعي لزيادة الإنتاجية والإبداع.\n            </p>\n          </div>\n\n          <div className=\"grid md:grid-cols-3 gap-8\">\n            {features.map((f, i) => (\n              <div key={i} className={`${ui.card} group hover:border-violet-500/30 transition-all`}>\n                <div className={`w-16 h-16 rounded-2xl bg-gradient-to-br ${f.color} flex items-center justify-center mb-8 shadow-xl`}>\n                  <f.icon className=\"w-8 h-8 text-white\" />\n                </div>\n                <h3 className=\"text-2xl font-bold mb-4\">{f.title}</h3>\n                <p className=\"text-white/60 leading-relaxed mb-6\">\n                  {f.desc}\n                </p>\n                <div className=\"h-1 w-0 group-hover:w-full bg-gradient-to-r from-violet-500 to-fuchsia-500 transition-all duration-500 rounded-full\" />\n              </div>\n            ))}\n          </div>\n        </div>\n      </section>\n\n      {/* Megsy Section Integration */}\n      <section className=\"relative py-24 sm:py-32 overflow-hidden\">\n        <div className=\"absolute top-0 left-1/2 -translate-x-1/2 w-full h-[1px] bg-gradient-to-r from-transparent via-white/10 to-transparent\" />\n        <div className={ui.container}>\n          <div className={`${ui.card} glass border-white/10 flex flex-col lg:flex-row items-center gap-12`}>\n            <div className=\"flex-1 space-y-6\">\n              <img src=\"https://megsyai.com/favicon.ico\" alt=\"\" className=\"w-16 h-16 drop-shadow-glow\" />\n              <h2 className=\"text-4xl sm:text-5xl font-black\">جزء من <span className=\"text-violet-400\">Megsy AI</span></h2>\n              <p className=\"text-white/70 text-lg\">\n                فخور بكوني المحرك التقني خلف العديد من الميزات التي تراها في Megsy. من أنظمة الدردشة المتقدمة إلى أدوات تحويل النص إلى صورة، نقوم ببناء نظام بيئي متكامل للذكاء الاصطناعي في الوطن العربي.\n              </p>\n              <ul className=\"space-y-4\">\n                {[\"تطوير نظام RAG المتقدم\", \"تحسين استجابة النماذج بـ 40%\", \"بناء لوحة تحكم المستخدمين الذكية\"].map((li, k) => (\n                  <li key={k} className=\"flex items-center gap-3 font-semibold text-white/90\">\n                    <div className=\"w-2 h-2 rounded-full bg-fuchsia-500 shadow-[0_0_10px_#d946ef]\" />\n                    {li}\n                  </li>\n                ))}\n              </ul>\n            </div>\n            <div className=\"flex-1\">\n              <img \n                src=\"https://images.pexels.com/photos/18069697/pexels-photo-18069697.png?auto=compress&cs=tinysrgb&dpr=2&h=650&w=940\" \n                className=\"rounded-3xl shadow-2xl border border-white/5\" \n                alt=\"AI work\" \n              />\n            </div>\n          </div>\n        </div>\n      </section>\n    </div>\n  );\n}","/lib/supabase.js":"import { createClient } from '@supabase/supabase-js';\n\nconst supabaseUrl = window.__SUPABASE_URL__;\nconst supabaseAnonKey = window.__SUPABASE_ANON_KEY__;\n\nexport const supabase = createClient(supabaseUrl, supabaseAnonKey);\n","/pages/NotFound.jsx":"import React from 'react';\nimport { Link } from 'react-router-dom';\nimport { Frown } from 'lucide-react';\nimport { ui } from '../lib/theme';\n\nconst NotFound = () => {\n  return (\n    <div className={`${ui.section} ${ui.container} text-center flex flex-col items-center justify-center min-h-[60vh]`}>\n        <Frown className=\"w-24 h-24 text-violet-400 mb-6\" />\n      <h1 className={`${ui.h1} ${ui.gradientText} mb-4`}>404</h1>\n      <h2 className=\"text-3xl font-bold mb-4\">Page Not Found</h2>\n      <p className=\"text-text-muted text-lg mb-8 max-w-md\">\n        Oops! The page you're looking for doesn't exist. It might have been moved or deleted.\n      </p>\n      <Link to=\"/\" className={ui.btnPrimary}>\n        Go Back Home\n      </Link>\n    </div>\n  );\n};\n\nexport default NotFound;\n","/pages/Store.jsx":"import { useState, useEffect } from \"react\";\nimport { ui } from \"../lib/theme\";\nimport { useCart } from \"../lib/cart\";\nimport { ShoppingBag, ChevronRight, Zap, Trophy, ShieldCheck, Sparkles, AlertCircle } from \"lucide-react\";\nimport { motion, AnimatePresence } from \"framer-motion\";\n\nconst PRODUCTS = [\n  {\n    id: \"prompt-pack-v1\",\n    name: \"مجموعة Prompt المهندسين العباقرة\",\n    desc: \"أكثر من 500 برومبت مختبر لـ GPT-4 و Midjourney لرفع إنتاجيتك بنسبة 300%.\",\n    price: 29,\n    image: \"https://images.pexels.com/photos/17485744/pexels-photo-17485744.png?auto=compress&cs=tinysrgb&w=800\",\n    badge: \"الأكثر مبيعاً\",\n    category: \"Prompts\"\n  },\n  {\n    id: \"ai-course-mini\",\n    name: \"كورس أساسيات هندسة الأوامر\",\n    desc: \"دليل شامل للمبتدئين لتعلم كيفية التحدث مع الآلة واستخراج أفضل النتائج منها.\",\n    price: 49,\n    image: \"https://images.pexels.com/photos/18069696/pexels-photo-18069696.png?auto=compress&cs=tinysrgb&w=800\",\n    badge: \"مستوى متوسط\",\n    category: \"Courses\"\n  },\n  {\n    id: \"megsy-ui-kit\",\n    name: \"مجموعة واجهات Megsy UI للـ AI\",\n    desc: \"مجموعة من مكونات React المصممة خصيصاً لتطبيقات الذكاء الاصطناعي (Chat UI, Bot widgets).\",\n    price: 79,\n    image: \"https://images.pexels.com/photos/18069695/pexels-photo-18069695.png?auto=compress&cs=tinysrgb&w=800\",\n    badge: \"Developer Tool\",\n    category: \"Templates\"\n  },\n  {\n    id: \"automation-flow-pack\",\n    name: \"حزمة أتمتة العمل للشركات\",\n    desc: \"سيناريوهات Make.com و Zapier جاهزة لأتمتة خدمة العملاء وصناعة المحتوى بالـ AI.\",\n    price: 99,\n    image: \"https://images.pexels.com/photos/28767589/pexels-photo-28767589.jpeg?auto=compress&cs=tinysrgb&w=800\",\n    badge: \"بريميوم\",\n    category: \"Automation\"\n  },\n  {\n    id: \"seo-ai-mastery\",\n    name: \"دليل SEO بالذكاء الاصطناعي\",\n    desc: \"كيف تستخدم AI لكتابة مقالات تتصدر محركات البحث في ثوانٍ معدودة.\",\n    price: 19,\n    image: \"https://images.pexels.com/photos/17483868/pexels-photo-17483868.jpeg?auto=compress&cs=tinysrgb&w=800\",\n    badge: \"كتاب إلكتروني\",\n    category: \"Guides\"\n  },\n  {\n    id: \"python-ai-scripts\",\n    name: \"مكتبة سكربتات AI بايثون\",\n    desc: \"سكربتات جاهزة لمعالجة الصور، استخراج النصوص، وتدريب نماذج مصغرة محلياً.\",\n    price: 55,\n    image: \"https://images.pexels.com/photos/18069697/pexels-photo-18069697.png?auto=compress&cs=tinysrgb&w=800\",\n    badge: \"للمبرمجين\",\n    category: \"Code\"\n  }\n];\n\nexport default function Store() {\n  const add = useCart(s => s.add);\n  const [addedId, setAddedId] = useState(null);\n  const [filter, setFilter] = useState(\"الكل\");\n\n  const categories = [\"الكل\", \"Prompts\", \"Courses\", \"Templates\", \"Automation\", \"Guides\", \"Code\"];\n  const filtered = filter === \"الكل\" ? PRODUCTS : PRODUCTS.filter(p => p.category === filter);\n\n  const handleAdd = (p) => {\n    add(p);\n    setAddedId(p.id);\n    setTimeout(() => setAddedId(null), 2000);\n  };\n\n  return (\n    <div className=\"pt-32 pb-20\">\n      <div className={ui.container}>\n        <div className=\"flex flex-col md:flex-row md:items-end justify-between gap-8 mb-16\">\n          <div className=\"max-w-2xl\">\n            <div className=\"inline-flex items-center gap-2 px-3 py-1 rounded-full bg-violet-500/10 border border-violet-500/20 text-violet-400 text-sm font-bold mb-4\">\n              <ShoppingBag className=\"w-4 h-4\" />\n              المتجر الرقمي\n            </div>\n            <h1 className={ui.h2}>أدوات <span className={ui.gradientText}>المستقبل</span> بين يديك</h1>\n            <p className={ui.p}>\n              حزم حصرية، دورات تدريبية، وأدوات تطوير صممتها بنفسي لمساعدتك على التفوق في عصر الذكاء الاصطناعي.\n            </p>\n          </div>\n\n          <div className=\"flex gap-4 overflow-x-auto pb-2 no-scrollbar\">\n            {categories.map(c => (\n              <button \n                key={c} \n                onClick={() => setFilter(c)}\n                className={`whitespace-nowrap px-6 py-2 rounded-full border transition-all font-bold text-sm ${filter === c ? \"bg-white text-black border-white shadow-lg\" : \"bg-white/5 border-white/10 text-white/60 hover:border-white/20\"}`}\n              >\n                {c}\n              </button>\n            ))}\n          </div>\n        </div>\n\n        <div className=\"grid sm:grid-cols-2 lg:grid-cols-3 gap-8\">\n          {filtered.map((p, i) => (\n            <motion.div \n              layout\n              initial={{ opacity: 0, y: 20 }}\n              whileInView={{ opacity: 1, y: 0 }}\n              viewport={{ once: true }}\n              transition={{ delay: i * 0.1 }}\n              key={p.id} \n              className={`${ui.card} ${ui.cardHover} group flex flex-col`}\n            >\n              <div className=\"relative aspect-[4/3] -mx-8 -mt-8 mb-6 overflow-hidden\">\n                <img src={p.image} className=\"w-full h-full object-cover group-hover:scale-110 transition-transform duration-700\" alt={p.name} />\n                <div className=\"absolute top-4 right-4 bg-black/60 backdrop-blur-md border border-white/10 px-3 py-1 rounded-full text-[10px] font-black uppercase text-fuchsia-400 tracking-widest\">\n                  {p.badge}\n                </div>\n                <div className=\"absolute inset-0 bg-gradient-to-t from-zinc-950 via-transparent to-transparent opacity-60\" />\n              </div>\n\n              <div className=\"flex-1\">\n                <div className=\"flex justify-between items-start mb-3\">\n                  <h3 className=\"text-xl font-bold leading-tight group-hover:text-violet-400 transition-colors uppercase tracking-tight\">{p.name}</h3>\n                </div>\n                <p className=\"text-sm text-white/50 mb-6 line-clamp-2\">{p.desc}</p>\n                \n                <div className=\"flex items-center gap-4 mb-8\">\n                  <div className=\"flex items-center gap-1.5 text-xs text-white/40\">\n                    <Zap className=\"w-3.5 h-3.5 text-amber-400\" /> الوصول فوري\n                  </div>\n                  <div className=\"flex items-center gap-1.5 text-xs text-white/40\">\n                    <ShieldCheck className=\"w-3.5 h-3.5 text-emerald-400\" /> فحص أمني\n                  </div>\n                </div>\n              </div>\n\n              <div className=\"mt-auto pt-6 border-t border-white/5 flex items-center justify-between\">\n                <div className=\"flex flex-col\">\n                  <span className=\"text-xs text-white/30 font-bold uppercase tracking-widest\">السعر</span>\n                  <span className=\"text-2xl font-black text-white\">${p.price}</span>\n                </div>\n                <button \n                  onClick={() => handleAdd(p)}\n                  className={`relative overflow-hidden px-6 py-3 rounded-2xl font-black text-sm transition-all active:scale-90 flex items-center gap-2 ${addedId === p.id ? \"bg-emerald-500 text-white shadow-[0_0_20px_rgba(16,185,129,0.3)]\" : \"bg-white text-black hover:bg-zinc-200\"}`}\n                >\n                  <AnimatePresence mode=\"wait\">\n                    {addedId === p.id ? (\n                      <motion.span initial={{ y: 20 }} animate={{ y: 0 }} exit={{ y: -20 }} key=\"added\" className=\"flex items-center gap-2\">\n                        <Trophy className=\"w-4 h-4\" /> تم الإضافة\n                      </motion.span>\n                    ) : (\n                      <motion.span initial={{ y: 20 }} animate={{ y: 0 }} exit={{ y: -20 }} key=\"add\" className=\"flex items-center gap-2\">\n                        شراء الآن <Sparkles className=\"w-4 h-4\" />\n                      </motion.span>\n                    )}\n                  </AnimatePresence>\n                </button>\n              </div>\n            </motion.div>\n          ))}\n        </div>\n\n        {/* Support Banner */}\n        <div className=\"mt-32 p-12 rounded-[2.5rem] bg-gradient-to-br from-violet-900/60 to-fuchsia-900/40 border border-white/10 relative overflow-hidden text-center md:text-right\">\n          <div className=\"absolute inset-0 bg-[url('https://www.transparenttextures.com/patterns/carbon-fibre.png')] opacity-20\" />\n          <div className=\"relative z-10 flex flex-col md:flex-row items-center justify-between gap-10\">\n            <div className=\"max-w-xl\">\n              <h2 className=\"text-3xl sm:text-4xl font-black mb-4 uppercase\">تحتاج لاقتراح مخصص؟</h2>\n              <p className=\"text-lg text-white/70 italic\">\n                لست متأكداً أي أداة تناسب احتياجك؟ تحدث مع مساعد حمزة الذكي ليقترح عليك الأنسب فوراً وبشكل مجاني.\n              </p>\n            </div>\n            <button className=\"px-10 py-5 rounded-full bg-white text-black font-black text-xl hover:bg-zinc-100 shadow-2xl transition-all\">\n              تكلم مع الـ AI\n            </button>\n          </div>\n        </div>\n      </div>\n    </div>\n  );\n}","/components/DigitalProductCard.jsx":"import React from 'react';\nimport { ShoppingCart } from 'lucide-react';\nimport { ui } from '../lib/theme';\n\nconst DigitalProductCard = ({ product }) => {\n  // In a real app, you would use a global state (like Zustand/Redux) to handle adding to cart.\n  const handleAddToCart = () => {\n    console.log(`Added ${product.name_en} to cart.`);\n    // useCartStore.getState().addItem(product);\n  };\n\n  return (\n    <div className={`${ui.card} ${ui.cardHover} flex flex-col h-full`}>\n      <div className=\"aspect-video w-full overflow-hidden rounded-lg mb-4\">\n        <img src={product.image_url} alt={product.name_en} className=\"w-full h-full object-cover\" />\n      </div>\n      <div className=\"flex-grow\">\n          <p className=\"text-sm text-violet-400 font-medium mb-1\">{product.category}</p>\n          <h3 className=\"text-lg font-bold mb-2\">{product.name_en}</h3>\n          <p className=\"text-text-muted text-sm flex-grow mb-4\">{product.description_en}</p>\n      </div>\n      <div className=\"flex items-center justify-between mt-4\">\n        <span className=\"text-2xl font-bold text-white\">${product.price.toFixed(2)}</span>\n        <button onClick={handleAddToCart} className={`${ui.btnGhost} !px-4 !py-2`}>\n          <ShoppingCart size={18} />\n          <span className=\"hidden sm:inline\">Add to Cart</span>\n        </button>\n      </div>\n    </div>\n  );\n};\n\nexport default DigitalProductCard;","/pages/About.jsx":"import React from 'react';\nimport { ui } from '../lib/theme';\nimport { motion } from 'framer-motion';\nimport { Briefcase, Cpu, Code, Zap, Target } from 'lucide-react';\n\nconst About = () => {\n  const aboutImageUrl = 'https://images.pexels.com/photos/33433724/pexels-photo-33433724.jpeg?auto=compress&cs=tinysrgb&dpr=2&h=650&w=940';\n\n  return (\n    <div className={`${ui.section} ${ui.container}`}>\n      <motion.div \n        initial={{ opacity: 0, y: 20 }}\n        animate={{ opacity: 1, y: 0 }}\n        transition={{ duration: 0.5 }}\n        className=\"text-center max-w-3xl mx-auto mb-16 sm:mb-24\"\n      >\n        <h1 className={`${ui.h1} ${ui.gradientText} mb-4`}>About Me</h1>\n        <p className=\"text-lg sm:text-xl text-text-muted\">\n          An AI Engineer driven by a passion for building intelligent, scalable, and impactful solutions that shape the future.\n        </p>\n      </motion.div>\n\n      <div className=\"grid grid-cols-1 lg:grid-cols-5 gap-12 lg:gap-16 items-center\">\n        <motion.div \n          initial={{ opacity: 0, x: -50 }}\n          animate={{ opacity: 1, x: 0 }}\n          transition={{ duration: 0.7 }}\n          className=\"lg:col-span-2\"\n        >\n          <div className=\"aspect-square relative rounded-3xl overflow-hidden glass p-2\">\n             <img src={aboutImageUrl} alt=\"Hamza Hassan Elgzairy\" className=\"w-full h-full object-cover rounded-2xl\" />\n             <div className=\"absolute bottom-4 left-4 right-4 p-4 bg-black/50 backdrop-blur-md rounded-xl border border-white/10\">\n                <p className='font-bold text-lg'>Hamza H. Elgzairy</p>\n                <p className='text-sm text-violet-300'>AI Engineer @ Megsy AI</p>\n             </div>\n          </div>\n        </motion.div>\n        <motion.div \n          initial={{ opacity: 0, x: 50 }}\n          animate={{ opacity: 1, x: 0 }}\n          transition={{ duration: 0.7, delay: 0.2 }}\n          className=\"lg:col-span-3\"\n        >\n          <h2 className={`${ui.h2} mb-6`}>From Curiosity to Creation</h2>\n          <div className=\"space-y-6 text-text-muted text-lg leading-relaxed\">\n            <p>\n              My journey into the world of Artificial Intelligence began not in a classroom, but with a profound curiosity about how complex systems learn and adapt. This curiosity evolved into a dedicated career focused on the intersection of data, algorithms, and user experience. As an AI Engineer at <a href='https://megsy.ai' target='_blank' rel='noopener noreferrer' className='text-violet-400 font-semibold'>Megsy AI</a>, I am on the front lines, architecting and implementing the core intelligence that powers our next-generation platform.\n            </p>\n            <p>\n              I specialize in the full development lifecycle of AI systems—from conceptualization and data processing to model training, deployment, and integration into full-stack applications. My work is not just about writing code; it's about solving real-world problems and creating tangible value through technology.\n            </p>\n             <p>\n              I thrive in dynamic environments where innovation is constant. Whether it's fine-tuning a large language model, designing a scalable API for an AI service, or collaborating with a team to bring a complex feature to life, my goal is always to build products that are not only intelligent but also reliable and intuitive.\n            </p>\n          </div>\n        </motion.div>\n      </div>\n      \n      {/* Core Competencies Section */}\n    <div className=\"mt-24 sm:mt-32\">\n        <div className=\"text-center max-w-3xl mx-auto\">\n            <h2 className={`${ui.h2} mb-4`}>Core Competencies</h2>\n             <p className=\"text-lg text-text-muted\">\n             I leverage a diverse skill set to translate complex technical challenges into elegant solutions.\n            </p>\n        </div>\n        <div className=\"mt-16 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8\">\n            <div className={`${ui.card} text-center`}>\n                <Cpu size={32} className=\"mx-auto text-violet-400 mb-4\"/>\n                <h3 className='font-bold text-xl mb-2'>Machine Learning</h3>\n                <p className='text-text-muted text-sm'>Expert in Scikit-learn, TensorFlow, PyTorch. Experience with NLP, Computer Vision and predictive modeling.</p>\n            </div>\n            <div className={`${ui.card} text-center`}>\n                <Code size={32} className=\"mx-auto text-sky-400 mb-4\"/>\n                <h3 className='font-bold text-xl mb-2'>Backend Development</h3>\n                <p className='text-text-muted text-sm'>Building robust APIs and data pipelines using Python (FastAPI), Node.js, and integrating with databases like PostgreSQL and Supabase.</p>\n            </div>\n            <div className={`${ui.card} text-center`}>\n                <Zap size={32} className=\"mx-auto text-amber-400 mb-4\"/>\n                <h3 className='font-bold text-xl mb-2'>MLOps & Deployment</h3>\n                <p className='text-text-muted text-sm'>Proficient in containerization with Docker, CI/CD pipelines, and deploying scalable models on cloud platforms (AWS, GCP).</p>\n            </div>\n            <div className={`${ui.card} text-center`}>\n                <Target size={32} className=\"mx-auto text-fuchsia-400 mb-4\"/>\n                <h3 className='font-bold text-xl mb-2'>Product Strategy</h3>\n                <p className='text-text-muted text-sm'>Adept at aligning technical possibilities with business goals to deliver AI features that have a measurable market impact.</p>\n            </div>\n        </div>\n    </div>\n\n    </div>\n  );\n};\n\nexport default About;\n","/pages/ResetPassword.jsx":"import React from 'react';\nimport { ui } from '../lib/theme';\n\nconst ResetPassword = () => {\n  return (\n    <div className={`${ui.section} ${ui.container} flex items-center justify-center`}>\n      <div className={`${ui.card} w-full max-w-md`}>\n        <h2 className=\"text-2xl font-bold mb-4 text-center\">Reset Password</h2>\n        <p className=\"text-text-muted text-center mb-6\">Enter your email and we'll send you a link to reset your password.</p>\n        <form className=\"space-y-4\">\n          <div>\n            <label className=\"block text-sm font-medium mb-2\">Email Address</label>\n            <input type=\"email\" className=\"w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 focus:border-violet-500 outline-none\" placeholder=\"name@example.com\" />\n          </div>\n          <button type=\"button\" className={`${ui.btnPrimary} w-full justify-center mt-4`}>\n            Send Reset Link\n          </button>\n        </form>\n      </div>\n    </div>\n  );\n};\n\nexport default ResetPassword;\n","/pages/Projects.jsx":"import { ui } from \"../lib/theme\";\nimport { Code, ExternalLink, Github, Cpu, Layout, Globe, Star, Users } from \"lucide-react\";\nimport { motion } from \"framer-motion\";\n\nconst PROJECTS = [\n  {\n    title: \"Megsy AI Platform\",\n    role: \"AI Core Engineer\",\n    desc: \"المسؤول عن بناء البنية التحتية لمعالجة اللغات الطبيعية وتطوير نظام الدردشة الموحد الذي يخدم آلاف المستخدمين يومياً.\",\n    tags: [\"Next.js\", \"Python\", \"GPT-4\", \"Redis\"],\n    stats: { stars: \"2.4k\", users: \"15k+\" },\n    image: \"https://images.pexels.com/photos/18069697/pexels-photo-18069697.png?auto=compress&cs=tinysrgb&w=800\"\n  },\n  {\n    title: \"Arabic Gen-AI Engine\",\n    role: \"Lead Developer\",\n    desc: \"محرك توليد نصوص متخصص في اللهجات العربية واللغة الفصحى، تم تدريبه على بيانات ضخمة لضمان الدقة اللغوية.\",\n    tags: [\"PyTorch\", \"HuggingFace\", \"FastAPI\"],\n    stats: { stars: \"850\", users: \"2k+\" },\n    image: \"https://images.pexels.com/photos/17483868/pexels-photo-17483868.jpeg?auto=compress&cs=tinysrgb&w=800\"\n  },\n  {\n    title: \"Vision Assist Dashboard\",\n    role: \"Full-Stack Dev\",\n    desc: \"لوحة تحكم ذكية تستخدم رؤية الحاسوب (Computer Vision) لتحليل بيانات الصور واستخراج المعلومات التجارية الهامة.\",\n    tags: [\"React\", \"TensorFlow\", \"Supabase\"],\n    stats: { stars: \"1.2k\", users: \"500+\" },\n    image: \"https://images.pexels.com/photos/18069695/pexels-photo-18069695.png?auto=compress&cs=tinysrgb&w=800\"\n  }\n];\n\nexport default function Projects() {\n  return (\n    <div className=\"pt-32 pb-20\">\n      <div className={ui.container}>\n        <div className=\"mb-20\">\n          <div className=\"inline-flex items-center gap-2 px-3 py-1 rounded-full bg-violet-500/10 border border-violet-500/20 text-violet-400 text-sm font-bold mb-4\">\n            <Code className=\"w-4 h-4\" /> معرض الأعمال\n          </div>\n          <h1 className={ui.h1}>مشاريع <span className={ui.gradientText}>الواقع الذكي</span></h1>\n          <p className={ui.p}>لمحة عن التحديات التقنية التي قمت بحلها والأدوات التي قمت ببنائها لتغيير طريقة تفاعلنا مع الآلة.</p>\n        </div>\n\n        <div className=\"grid lg:grid-cols-1 gap-12\">\n          {PROJECTS.map((p, i) => (\n            <motion.div \n              initial={{ opacity: 0, y: 30 }}\n              whileInView={{ opacity: 1, y: 0 }}\n              viewport={{ once: true }}\n              transition={{ delay: i * 0.1 }}\n              key={i} \n              className=\"group relative flex flex-col lg:flex-row items-center gap-12 p-8 lg:p-12 rounded-[3rem] bg-white/[0.02] border border-white/5 hover:border-violet-500/20 transition-all overflow-hidden\"\n            >\n              <div className=\"absolute top-0 right-0 p-12 opacity-5 pointer-events-none group-hover:scale-150 transition-transform duration-1000\">\n                 {i % 2 === 0 ? <Cpu className=\"w-40 h-40\" /> : <Layout className=\"w-40 h-40\" />}\n              </div>\n\n              <div className=\"w-full lg:w-1/2 aspect-video rounded-3xl overflow-hidden shadow-2xl relative\">\n                 <img src={p.image} alt={p.title} className=\"w-full h-full object-cover group-hover:scale-110 transition-transform duration-700\" />\n                 <div className=\"absolute inset-0 bg-gradient-to-t from-black via-transparent to-transparent opacity-60\" />\n                 <div className=\"absolute bottom-6 left-6 flex gap-3\">\n                    <div className=\"flex items-center gap-2 px-3 py-1.5 rounded-xl bg-black/60 backdrop-blur-md border border-white/10 text-xs font-bold\">\n                       <Star className=\"w-3 h-3 text-amber-400\" /> {p.stats.stars}\n                    </div>\n                    <div className=\"flex items-center gap-2 px-3 py-1.5 rounded-xl bg-black/60 backdrop-blur-md border border-white/10 text-xs font-bold\">\n                       <Users className=\"w-3 h-3 text-sky-400\" /> {p.stats.users}\n                    </div>\n                 </div>\n              </div>\n\n              <div className=\"w-full lg:w-1/2 space-y-6\">\n                 <div className=\"inline-block px-4 py-1.5 rounded-full bg-violet-500/20 text-violet-400 text-xs font-black uppercase tracking-widest border border-violet-500/30\">\n                    {p.role}\n                 </div>\n                 <h2 className=\"text-4xl font-black uppercase italic tracking-tighter\">{p.title}</h2>\n                 <p className=\"text-white/60 text-lg leading-relaxed font-medium\">\n                   {p.desc}\n                 </p>\n                 \n                 <div className=\"flex flex-wrap gap-2\">\n                    {p.tags.map(t => (\n                      <span key={t} className=\"px-4 py-1.5 rounded-xl bg-white/5 border border-white/10 text-xs font-bold text-white/50\">{t}</span>\n                    ))}\n                 </div>\n\n                 <div className=\"pt-8 flex gap-4\">\n                    <button className=\"flex-1 py-4 rounded-2xl bg-white text-black font-black text-sm flex items-center justify-center gap-2 hover:bg-zinc-200 transition active:scale-95 shadow-xl shadow-white/5\">\n                       مشاهدة المشروع <ExternalLink className=\"w-4 h-4\" />\n                    </button>\n                    <button className=\"px-6 py-4 rounded-2xl bg-white/5 border border-white/10 flex items-center justify-center hover:bg-white/10 transition active:scale-95\">\n                       <Github className=\"w-5 h-5\" />\n                    </button>\n                 </div>\n              </div>\n            </motion.div>\n          ))}\n        </div>\n\n        {/* GitHub Contribution Mockup */}\n        <div className=\"mt-32 p-12 rounded-[3.5rem] bg-zinc-950 border border-white/5 relative overflow-hidden\">\n           <div className=\"absolute inset-0 bg-gradient-to-br from-violet-600/5 to-transparent\" />\n           <div className=\"relative z-10 flex flex-col md:flex-row items-center justify-between gap-12\">\n              <div>\n                 <h2 className=\"text-3xl font-black mb-4 flex items-center gap-3 italic uppercase\">\n                    <Github className=\"w-8 h-8\" /> نشاط الكود اليومي\n                 </h2>\n                 <p className=\"text-white/40 font-bold\">أكثر من 2,500 مساهمة (Contributions) في العام الأخير عبر مشاريع مفتوحة المصدر.</p>\n              </div>\n              <div className=\"hidden md:flex gap-1.5\">\n                 {[...Array(20)].map((_, i) => (\n                    <div key={i} className=\"flex flex-col gap-1.5\">\n                       {[...Array(7)].map((_, j) => (\n                          <div key={j} className={`w-3 h-3 rounded-sm ${Math.random() > 0.5 ? 'bg-violet-600' : 'bg-zinc-900'}`} />\n                       ))}\n                    </div>\n                 ))}\n              </div>\n           </div>\n        </div>\n      </div>\n    </div>\n  );\n}","/pages/Cart.jsx":"import { useCart } from \"../lib/cart\";\nimport { ui } from \"../lib/theme\";\nimport { ShoppingCart, Trash2, Plus, Minus, ArrowLeft, ArrowRight, Wallet, ShieldCheck, Sparkles } from \"lucide-react\";\nimport { Link } from \"react-router-dom\";\nimport { motion } from \"framer-motion\";\n\nexport default function Cart() {\n  const { items, remove, update, total, clear } = useCart();\n  const totalPrice = total();\n\n  if (items.length === 0) {\n    return (\n      <div className=\"pt-40 pb-20 px-4 text-center\">\n        <div className=\"mx-auto w-24 h-24 rounded-full bg-white/5 border border-white/10 flex items-center justify-center mb-8\">\n          <ShoppingCart className=\"w-10 h-10 text-white/20\" />\n        </div>\n        <h1 className=\"text-4xl font-black mb-4\">سلتك <span className=\"text-fuchsia-500\">فارغة</span> حالياً</h1>\n        <p className=\"text-white/50 max-w-md mx-auto mb-10 text-lg\">\n          يبدو أنك لم تضف أي منتج لمستقبلك الرقمي بعد. ابدأ باستكشاف أدوات الذكاء الاصطناعي الآن!\n        </p>\n        <Link to=\"/store\" className={ui.btnPrimary}>\n          العودة للمتجر <ArrowLeft className=\"w-5 h-5 ml-2\" />\n        </Link>\n      </div>\n    );\n  }\n\n  return (\n    <div className=\"pt-32 pb-20 px-4\">\n      <div className={ui.container}>\n        <div className=\"flex items-center gap-4 mb-12\">\n          <div className=\"w-12 h-12 rounded-2xl bg-white/5 flex items-center justify-center border border-white/10\">\n            <ShoppingCart className=\"w-6 h-6\" />\n          </div>\n          <h1 className=\"text-4xl font-black\">سلة <span className={ui.gradientText}>المشتريات</span></h1>\n        </div>\n\n        <div className=\"grid lg:grid-cols-3 gap-12\">\n          <div className=\"lg:col-span-2 space-y-4\">\n            {items.map((item) => (\n              <motion.div \n                layout \n                key={item.id} \n                className=\"group relative flex flex-col sm:flex-row items-center gap-6 p-6 rounded-[2rem] bg-white/[0.03] border border-white/5 hover:border-white/10 transition-all\"\n              >\n                <div className=\"w-32 h-32 rounded-2xl overflow-hidden shrink-0\">\n                  <img src={item.image} className=\"w-full h-full object-cover\" alt={item.name} />\n                </div>\n                \n                <div className=\"flex-1 text-center sm:text-right\">\n                  <h3 className=\"text-xl font-bold mb-1 uppercase tracking-tight\">{item.name}</h3>\n                  <div className=\"text-sm text-white/40 mb-4\">{item.category}</div>\n                  \n                  <div className=\"flex items-center justify-center sm:justify-start gap-4\">\n                    <div className=\"flex items-center justify-center gap-4 bg-black/40 rounded-full border border-white/10 p-1\">\n                      <button onClick={() => update(item.id, item.qty - 1)} className=\"w-8 h-8 rounded-full flex items-center justify-center hover:bg-white/10 transition\"><Minus className=\"w-4 h-4\"/></button>\n                      <span className=\"w-8 text-center font-bold\">{item.qty}</span>\n                      <button onClick={() => update(item.id, item.qty + 1)} className=\"w-8 h-8 rounded-full flex items-center justify-center hover:bg-white/10 transition\"><Plus className=\"w-4 h-4\"/></button>\n                    </div>\n                    <button onClick={() => remove(item.id)} className=\"p-2 text-white/30 hover:text-red-500 transition\">\n                      <Trash2 className=\"w-5 h-5\" />\n                    </button>\n                  </div>\n                </div>\n\n                <div className=\"sm:text-left\">\n                  <div className=\"text-xs text-white/30 font-black uppercase tracking-widest mb-1\">المجموع</div>\n                  <div className=\"text-2xl font-black text-white\">${(item.price * item.qty).toFixed(2)}</div>\n                </div>\n              </motion.div>\n            ))}\n            \n            <button onClick={clear} className=\"text-sm font-bold text-white/30 hover:text-white transition flex items-center gap-2 mx-auto sm:mx-0\">\n              <Trash2 className=\"w-4 h-4\" /> مسح السلة بالكامل\n            </button>\n          </div>\n\n          <div className=\"space-y-6\">\n            <div className={`${ui.card} glass border-white/10 sticky top-32`}>\n              <h3 className=\"text-2xl font-black mb-6 uppercase border-b border-white/5 pb-4\">ملخص الطلب</h3>\n              \n              <div className=\"space-y-4 mb-8\">\n                <div className=\"flex justify-between text-white/60\">\n                  <span>المجموع الفرعي</span>\n                  <span className=\"font-bold text-white\">${totalPrice.toFixed(2)}</span>\n                </div>\n                <div className=\"flex justify-between text-white/60\">\n                  <span>رسوم المعالجة</span>\n                  <span className=\"font-bold text-white\">$0.00</span>\n                </div>\n                <div className=\"pt-4 border-t border-white/5 flex justify-between items-end\">\n                  <span className=\"text-lg font-bold\">الإجمالي النهائي</span>\n                  <span className=\"text-4xl font-black text-fuchsia-500 drop-shadow-[0_0_15px_rgba(217,70,239,0.3)]\">${totalPrice.toFixed(2)}</span>\n                </div>\n              </div>\n\n              <div className=\"space-y-4\">\n                <button className=\"w-full py-5 rounded-2xl bg-white text-black font-black text-xl flex items-center justify-center gap-3 hover:bg-zinc-100 transition shadow-xl shadow-white/5 active:scale-95\">\n                  إتمام الدفع <ArrowLeft className=\"w-6 h-6\" />\n                </button>\n                <div className=\"flex items-center justify-center gap-2 text-[10px] text-white/30 font-bold uppercase tracking-[0.2em]\">\n                  <ShieldCheck className=\"w-3 h-3\" /> مشفر وآمن 100%\n                </div>\n              </div>\n\n              <div className=\"mt-8 pt-8 border-t border-white/5\">\n                <div className=\"flex items-center gap-4 p-4 rounded-xl bg-violet-500/5 border border-violet-500/10\">\n                  <Wallet className=\"w-5 h-5 text-violet-400\" />\n                  <div>\n                    <div className=\"text-xs font-bold text-white\">طريقة دفع ذكية</div>\n                    <div className=\"text-[10px] text-white/50\">تشفير Megsy للحماية</div>\n                  </div>\n                </div>\n              </div>\n            </div>\n          </div>\n        </div>\n      </div>\n    </div>\n  );\n}","/pages/Auth.jsx":"import { useState, useEffect } from \"react\";\nimport { Link, useNavigate } from \"react-router-dom\";\nimport { ui } from \"../lib/theme\";\nimport { User, LogIn, Mail, Lock, CheckCircle, ShieldAlert, ArrowRight, Github } from \"lucide-react\";\nimport { motion, AnimatePresence } from \"framer-motion\";\n\nexport default function Auth() {\n  const nav = useNavigate();\n  const [mode, setMode] = useState(\"signin\"); // signin | signup | reset\n  const [email, setEmail] = useState(\"\");\n  const [password, setPassword] = useState(\"\");\n  const [loading, setLoading] = useState(false);\n  const [msg, setMsg] = useState({ type: \"\", text: \"\" });\n\n  useEffect(() => {\n    window.supabase?.auth?.getSession?.().then(({ data: { session } }) => {\n      if (session) nav(\"/account\", { replace: true });\n    });\n  }, [nav]);\n\n  async function handleSubmit(e) {\n    e.preventDefault();\n    setLoading(true);\n    setMsg({ type: \"\", text: \"\" });\n\n    try {\n      if (mode === \"signup\") {\n        const { error } = await window.supabase.auth.signUp({ \n          email, \n          password, \n          options: { emailRedirectTo: window.location.origin } \n        });\n        if (error) throw error;\n        setMsg({ type: \"success\", text: \"تم! تحقق من بريدك لتفعيل الحساب.\" });\n      } else if (mode === \"signin\") {\n        const { error } = await window.supabase.auth.signInWithPassword({ email, password });\n        if (error) throw error;\n        nav(\"/account\");\n      } else {\n        const { error } = await window.supabase.auth.resetPasswordForEmail(email, { \n          redirectTo: window.location.origin + \"/reset-password\" \n        });\n        if (error) throw error;\n        setMsg({ type: \"success\", text: \"أرسلنا رابط الاستعادة لبريدك.\" });\n      }\n    } catch (err) {\n      setMsg({ type: \"error\", text: err.message });\n    } finally {\n      setLoading(false);\n    }\n  }\n\n  return (\n    <div className=\"min-h-screen grid lg:grid-cols-2\">\n      {/* Visual Side */}\n      <div className=\"hidden lg:flex flex-col justify-center p-20 bg-gradient-to-br from-violet-950 to-black border-r border-white/5 relative overflow-hidden\">\n        <div className=\"absolute top-1/4 left-1/4 w-96 h-96 bg-fuchsia-600/10 blur-[120px] rounded-full\" />\n        <div className=\"relative z-10\">\n          <div className=\"w-16 h-16 rounded-3xl bg-white/5 border border-white/10 flex items-center justify-center mb-8\">\n            <User className=\"w-8 h-8 text-violet-400\" />\n          </div>\n          <h2 className=\"text-6xl font-black mb-6 uppercase leading-tight tracking-tighter\">\n            انضم إلى <br />\n            <span className={ui.gradientText}>مجتمع الـ AI</span>\n          </h2>\n          <p className=\"text-xl text-white/50 leading-relaxed max-w-md\">\n            سجل دخولك الآن للوصول إلى منتجاتك الرقمية وحفظ تقدمك في دوراتنا التعليمية.\n          </p>\n          \n          <div className=\"mt-20 space-y-6\">\n             <div className=\"flex items-center gap-4 text-white/40 font-bold uppercase tracking-widest text-xs\">\n                <div className=\"h-px w-10 bg-white/10\" /> مميزات الحساب\n             </div>\n             {[\"وصول مدى الحياة للمنتجات\", \"تواصل مباشر مع حمزة\", \"تحديثات حصرية للأعضاء\"].map((f, idx) => (\n                <div key={idx} className=\"flex items-center gap-3\">\n                  <CheckCircle className=\"w-5 h-5 text-emerald-400\" />\n                  <span className=\"font-bold text-white/70\">{f}</span>\n                </div>\n             ))}\n          </div>\n        </div>\n      </div>\n\n      {/* Form Side */}\n      <div className=\"flex flex-col justify-center items-center px-6 py-20 relative\">\n        <div className=\"w-full max-w-md\">\n          <motion.div \n            initial={{ opacity: 0, y: 20 }}\n            animate={{ opacity: 1, y: 0 }}\n            className=\"text-center mb-12\"\n          >\n             <h1 className=\"text-4xl font-black mb-4 tracking-tight uppercase\">\n                {mode === \"signin\" ? \"مرحباً بعودتك\" : mode === \"signup\" ? \"إنشاء حساب\" : \"استعادة الرقم\"}\n             </h1>\n             <p className=\"text-white/40 font-bold\">يرجى إدخال تفاصيل حسابك أدناه</p>\n          </motion.div>\n\n          {/* Mode Switcher */}\n          <div className=\"flex gap-2 p-1.5 rounded-2xl bg-white/5 border border-white/5 mb-8\">\n            {[\"signin\", \"signup\"].map((m) => (\n              <button \n                key={m} \n                onClick={() => setMode(m)}\n                className={`flex-1 py-3 rounded-xl text-sm font-black transition-all ${mode === m ? \"bg-white text-black shadow-lg\" : \"text-white/40 hover:text-white\"}`}\n              >\n                {m === \"signin\" ? \"تسجيل دخول\" : \"حساب جديد\"}\n              </button>\n            ))}\n          </div>\n\n          <form onSubmit={handleSubmit} className=\"space-y-4\">\n            <div className=\"relative group\">\n              <Mail className=\"absolute right-4 top-1/2 -translate-y-1/2 w-5 h-5 text-white/20 group-focus-within:text-violet-500 transition-colors\" />\n              <input \n                type=\"email\" \n                required \n                value={email} \n                onChange={e => setEmail(e.target.value)} \n                placeholder=\"البريد الإلكتروني\" \n                className=\"w-full bg-white/5 border border-white/10 rounded-2xl py-4 pr-12 pl-4 outline-none focus:border-violet-500 focus:bg-white/[0.08] transition-all font-bold text-sm\"\n              />\n            </div>\n            \n            {mode !== \"reset\" && (\n              <div className=\"relative group\">\n                <Lock className=\"absolute right-4 top-1/2 -translate-y-1/2 w-5 h-5 text-white/20 group-focus-within:text-fuchsia-500 transition-colors\" />\n                <input \n                  type=\"password\" \n                  required \n                  minLength={6} \n                  value={password} \n                  onChange={e => setPassword(e.target.value)} \n                  placeholder=\"كلمة المرور\" \n                  className=\"w-full bg-white/5 border border-white/10 rounded-2xl py-4 pr-12 pl-4 outline-none focus:border-fuchsia-500 focus:bg-white/[0.08] transition-all font-bold text-sm\"\n                />\n              </div>\n            )}\n\n            {mode === \"signin\" && (\n              <div className=\"text-left\">\n                <button type=\"button\" onClick={() => setMode(\"reset\")} className=\"text-xs font-bold text-violet-400 hover:text-white transition\">نسيت كلمة المرور؟</button>\n              </div>\n            )}\n\n            <button \n              disabled={loading} \n              className=\"w-full py-5 rounded-2xl bg-gradient-to-r from-violet-600 to-fuchsia-600 font-black text-xl hover:shadow-[0_0_30px_rgba(139,92,246,0.3)] transition-all disabled:opacity-50 active:scale-95 mt-4\"\n            >\n              {loading ? \"جاري المعالجة...\" : mode === \"signin\" ? \"دخول\" : mode === \"signup\" ? \"ابدأ الآن\" : \"إرسال رابط الاستعادة\"}\n            </button>\n          </form>\n\n          <AnimatePresence>\n            {msg.text && (\n              <motion.div \n                initial={{ opacity: 0, scale: 0.95 }}\n                animate={{ opacity: 1, scale: 1 }}\n                exit={{ opacity: 0 }}\n                className={`mt-6 p-4 rounded-xl flex items-center gap-3 border ${msg.type === \"success\" ? \"bg-emerald-500/10 border-emerald-500/20 text-emerald-400\" : \"bg-red-500/10 border-red-500/20 text-red-400\"}`}\n              >\n                {msg.type === \"success\" ? <CheckCircle className=\"w-5 h-5 shrink-0\" /> : <ShieldAlert className=\"w-5 h-5 shrink-0\" />}\n                <span className=\"text-sm font-bold\">{msg.text}</span>\n              </motion.div>\n            )}\n          </AnimatePresence>\n          \n          <div className=\"mt-12 pt-8 border-t border-white/5\">\n             <div className=\"flex items-center gap-4 mb-6\">\n                <div className=\"h-px flex-1 bg-white/10\" />\n                <span className=\"text-[10px] font-black text-white/20 uppercase tracking-[0.3em]\">أو بواسطة</span>\n                <div className=\"h-px flex-1 bg-white/10\" />\n             </div>\n             <button className=\"w-full py-4 rounded-2xl bg-white/5 border border-white/10 flex items-center justify-center gap-3 text-sm font-bold hover:bg-white hover:text-black transition-all\">\n                <Github className=\"w-5 h-5\" /> متابعة بواسطة GitHub\n             </button>\n          </div>\n        </div>\n      </div>\n    </div>\n  );\n}","/pages/Account.jsx":"import { useState, useEffect } from \"react\";\nimport { Link, useNavigate } from \"react-router-dom\";\nimport { ui } from \"../lib/theme\";\nimport { User, Package, Settings, LogOut, ShieldCheck, Mail, Calendar, Key, Check } from \"lucide-react\";\nimport { useCart } from \"../lib/cart\";\n\nexport default function Account() {\n  const [user, setUser] = useState(null);\n  const [loading, setLoading] = useState(true);\n  const nav = useNavigate();\n  const cartItems = useCart(s => s.items);\n\n  useEffect(() => {\n    window.supabase?.auth?.getUser?.().then(({ data }) => {\n      if (!data?.user) {\n        nav(\"/auth\");\n      } else {\n        setUser(data.user);\n      }\n      setLoading(false);\n    });\n  }, [nav]);\n\n  const handleLogout = async () => {\n    await window.supabase.auth.signOut();\n    nav(\"/auth\");\n  };\n\n  if (loading) return (\n    <div className=\"min-h-screen flex items-center justify-center bg-black\">\n      <div className=\"w-12 h-12 border-4 border-violet-500 border-t-transparent rounded-full animate-spin\" />\n    </div>\n  );\n\n  return (\n    <div className=\"pt-32 pb-20 px-4\">\n      <div className={ui.container}>\n        <div className=\"grid lg:grid-cols-4 gap-12\">\n          \n          {/* Sidebar */}\n          <aside className=\"lg:col-span-1 space-y-4\">\n             <div className=\"p-8 rounded-[2.5rem] bg-gradient-to-br from-zinc-900 to-black border border-white/10 text-center relative overflow-hidden\">\n                <div className=\"absolute top-0 inset-x-0 h-1 bg-gradient-to-r from-violet-500 to-fuchsia-500\" />\n                <div className=\"w-24 h-24 rounded-full bg-violet-600 mx-auto mb-6 flex items-center justify-center text-4xl font-black shadow-2xl shadow-violet-500/20\">\n                  {user?.email?.charAt(0).toUpperCase()}\n                </div>\n                <h3 className=\"text-xl font-bold truncate mb-1\">{user?.email?.split('@')[0]}</h3>\n                <p className=\"text-xs text-white/30 truncate mb-8\">{user?.email}</p>\n                <div className=\"inline-flex items-center gap-2 px-3 py-1 rounded-full bg-emerald-500/10 text-emerald-400 text-[10px] font-black uppercase tracking-widest border border-emerald-500/20\">\n                  <ShieldCheck className=\"w-3 h-3\" /> حساب مؤمن\n                </div>\n             </div>\n\n             <nav className=\"space-y-2\">\n                {[\n                  { icon: User, label: \"الملف الشخصي\", active: true },\n                  { icon: Package, label: \"طلباتي\" },\n                  { icon: Key, label: \"تغيير المرور\" },\n                  { icon: Settings, label: \"الإعدادات\" }\n                ].map((item, idx) => (\n                  <button key={idx} className={`w-full flex items-center gap-4 px-6 py-4 rounded-2xl transition-all font-bold text-sm ${item.active ? \"bg-white text-black\" : \"text-white/50 hover:bg-white/5\"}`}>\n                    <item.icon className=\"w-5 h-5\" />\n                    {item.label}\n                  </button>\n                ))}\n                <button \n                  onClick={handleLogout}\n                  className=\"w-full flex items-center gap-4 px-6 py-4 rounded-2xl font-bold text-sm text-red-400 hover:bg-red-500/10 transition-all mt-8\"\n                >\n                  <LogOut className=\"w-5 h-5\" />\n                  تسجيل خروج\n                </button>\n             </nav>\n          </aside>\n\n          {/* Main Content */}\n          <main className=\"lg:col-span-3 space-y-8\">\n             <div className=\"grid md:grid-cols-3 gap-6\">\n                {[\n                  { label: \"إجمالي المشتروات\", value: \"$0.00\", icon: Package },\n                  { label: \"البريد الإلكتروني\", value: \"مؤكد بنجاح\", icon: Mail },\n                  { label: \"تاريخ الانضمام\", value: new Date(user?.created_at).toLocaleDateString(), icon: Calendar }\n                ].map((stat, i) => (\n                  <div key={i} className=\"p-6 rounded-3xl bg-white/[0.02] border border-white/5 group hover:border-violet-500/20 transition-all\">\n                    <stat.icon className=\"w-6 h-6 text-violet-400 mb-4\" />\n                    <div className=\"text-xs font-black text-white/30 uppercase tracking-widest mb-1\">{stat.label}</div>\n                    <div className=\"text-xl font-bold\">{stat.value}</div>\n                  </div>\n                ))}\n             </div>\n\n             <div className={`${ui.card} glass`}>\n                <div className=\"flex items-center justify-between mb-8\">\n                  <h3 className=\"text-2xl font-black uppercase tracking-tight\">آخر المشتريات الرقمية</h3>\n                  <Link to=\"/store\" className=\"text-sm font-black text-fuchsia-400 hover:underline\">المتجر الرقمي ←</Link>\n                </div>\n                \n                <div className=\"text-center py-20 px-8 border-2 border-dashed border-white/5 rounded-3xl\">\n                   <div className=\"w-16 h-16 rounded-full bg-white/5 flex items-center justify-center mx-auto mb-6\">\n                      <Package className=\"w-8 h-8 text-white/20\" />\n                   </div>\n                   <h4 className=\"text-xl font-bold mb-2\">لا توجد طلبات بعد</h4>\n                   <p className=\"text-white/40 max-w-xs mx-auto text-sm mb-8\">لم تقم بشراء أي منتجات رقمية حتى الآن. ابدأ رحلتك التكنولوجية اليوم.</p>\n                   <Link to=\"/store\" className={ui.btnPrimary + \" px-10 py-3\"}>استعرض المنتجات</Link>\n                </div>\n             </div>\n\n             <div className=\"grid md:grid-cols-2 gap-8\">\n                <div className={`${ui.card} glass border-white/10`}>\n                   <h3 className=\"text-xl font-black mb-6 flex items-center gap-2\">\n                      <ShieldCheck className=\"w-6 h-6 text-emerald-400\" /> أمان الحساب\n                   </h3>\n                   <ul className=\"space-y-4\">\n                      <li className=\"flex items-center justify-between\">\n                         <span className=\"text-sm font-bold text-white/60\">التوثيق الثنائي (2FA)</span>\n                         <span className=\"text-[10px] font-black bg-red-500/10 text-red-500 px-2 py-1 rounded-md\">مغلق</span>\n                      </li>\n                      <li className=\"flex items-center justify-between\">\n                         <span className=\"text-sm font-bold text-white/60\">سجل الدخول</span>\n                         <span className=\"text-[10px] font-black text-emerald-400\">آخر 24 ساعة نشط</span>\n                      </li>\n                   </ul>\n                </div>\n                <div className={`${ui.card} bg-violet-600/10 border-violet-500/20`}>\n                   <h3 className=\"text-xl font-black mb-4\">هل تحتاج مساعدة؟</h3>\n                   <p className=\"text-sm text-white/60 mb-8 font-medium\">فريق الدعم الفني المعتمد على الذكاء الاصطناعي متاح لك دائماً لحل أي مشكلة تقنية.</p>\n                   <Link to=\"/support\" className=\"text-sm font-black text-violet-400 hover:text-white flex items-center justify-center gap-2 py-3 rounded-xl border border-violet-500/30 hover:bg-violet-500/10 transition-all\">تحدث معنا الآن</Link>\n                </div>\n             </div>\n          </main>\n\n        </div>\n      </div>\n    </div>\n  );\n}","/pages/Support.jsx":"import { useTheme } from \"../lib/theme\";\nimport AIChat from \"../components/AIChat\";\nimport { ui } from \"../lib/theme\";\nimport { MessageSquare, Zap, Globe, ShieldCheck, Mail, Twitter, Github, Linkedin, HelpCircle } from \"lucide-react\";\n\nexport default function Support() {\n  const faqs = [\n    {\n      q: \"كيف يمكنني الوصول لمنتجاتي بعد الشراء؟\",\n      a: \"فور إتمام الدفع، ستتلقى رابطاً بريدياً للتحميل المباشر، كما ستكون كافة منتجاتك متاحة دائماً في صفحة 'حسابي'.\"\n    },\n    {\n      q: \"هل البرومبتس (Prompts) تعمل مع ChatGPT المجاني؟\",\n      a: \"نعم، البرومبتس مصممة لتعمل مع كافة نماذج GPT، ولكنها تعطي نتائج استثنائية مع GPT-4 و Claude 3 Opus.\"\n    },\n    {\n      q: \"هل تقدم استشارات برمجية للذكاء الاصطناعي؟\",\n      a: \"نعم، يمكنك حجز جلسة مباشرة معي عبر صفحة التواصل أو التحدث مع المساعد الذكي لمعرفة المزيد.\"\n    }\n  ];\n\n  return (\n    <div className=\"pt-32 pb-20\">\n      <div className={ui.container}>\n        <div className=\"text-center mb-20 max-w-3xl mx-auto\">\n          <div className=\"inline-flex items-center gap-2 px-4 py-2 rounded-full bg-fuchsia-500/10 border border-fuchsia-500/20 text-fuchsia-400 text-sm font-black mb-6 uppercase tracking-widest\">\n            Support Center\n          </div>\n          <h1 className={ui.h1}>مركز <span className={ui.gradientText}>الدعم الذكي</span></h1>\n          <p className={ui.p + \" mx-auto\"}>\n            نحن هنا لضمان رحلتك في عالم الذكاء الاصطناعي بسلاسة. ابحث في الأسئلة الشائعة أو تحدث فوراً مع مساعدي الافتراضي المدعوم بـ Megsy AI.\n          </p>\n        </div>\n\n        <div className=\"grid lg:grid-cols-2 gap-16 items-start\">\n          {/* FAQ Area */}\n          <div className=\"space-y-8\">\n            <div className=\"flex items-center gap-3 mb-8\">\n              <HelpCircle className=\"w-8 h-8 text-violet-500\" />\n              <h2 className=\"text-3xl font-bold uppercase tracking-tight\">الأسئلة الشائعة</h2>\n            </div>\n            \n            {faqs.map((faq, i) => (\n              <div key={i} className=\"p-8 rounded-3xl bg-white/[0.03] border border-white/5 hover:border-violet-500/20 transition-all\">\n                <h3 className=\"text-lg font-black mb-3 text-white italic\">{faq.q}</h3>\n                <p className=\"text-white/50 leading-relaxed font-medium\">{faq.a}</p>\n              </div>\n            ))}\n\n            <div className=\"pt-12 border-t border-white/5\">\n              <h3 className=\"text-xl font-bold mb-6 flex items-center gap-2\">تواصل مباشر <div className=\"h-px flex-1 bg-white/5\" /></h3>\n              <div className=\"flex flex-wrap gap-4\">\n                {[\n                  { icon: Mail, label: \"البريد\", link: \"mailto:hamza@megsyai.com\" },\n                  { icon: Twitter, label: \"Twitter\", link: \"#\" },\n                  { icon: Linkedin, label: \"LinkedIn\", link: \"#\" },\n                  { icon: Github, label: \"GitHub\", link: \"#\" }\n                ].map((social, idx) => (\n                  <a key={idx} href={social.link} className=\"flex items-center gap-2 px-6 py-3 rounded-2xl bg-white/5 border border-white/10 hover:bg-violet-500 hover:border-violet-500 transition-all font-bold\">\n                    <social.icon className=\"w-5 h-5\" />\n                    {social.label}\n                  </a>\n                ))}\n              </div>\n            </div>\n          </div>\n\n          {/* AI Helper Teaser */}\n          <div className=\"relative\">\n            <div className=\"absolute inset-0 bg-violet-600/10 blur-[100px] rounded-full\" />\n            <div className={`${ui.card} relative z-10 glass border-white/10 p-10 text-center`}>\n              <div className=\"w-24 h-24 rounded-full bg-gradient-to-br from-violet-600 to-fuchsia-600 mx-auto mb-8 flex items-center justify-center shadow-2xl shadow-violet-500/40 relative\">\n                <MessageSquare className=\"w-10 h-10 text-white\" />\n                <div className=\"absolute -top-2 -right-2 bg-emerald-500 w-6 h-6 rounded-full border-4 border-black\" />\n              </div>\n              \n              <h3 className=\"text-3xl font-black mb-4 uppercase\">المساعد الافتراضي</h3>\n              <p className=\"text-white/60 mb-10 leading-relaxed\">\n                مساعد حمزة الذكي مبرمج للإجابة على جميع تساؤلاتك حول المنتجات، خبرات حمزة، وطريقة استخدام Megsy AI. متاح 24/7.\n              </p>\n\n              <div className=\"space-y-4\">\n                <div className=\"flex items-center gap-3 p-4 rounded-2xl bg-white/5 text-sm font-bold text-white/50\">\n                  <Zap className=\"w-5 h-5 text-amber-500\" /> ردود فورية في أقل من ثانية\n                </div>\n                <div className=\"flex items-center gap-3 p-4 rounded-2xl bg-white/5 text-sm font-bold text-white/50\">\n                  <Globe className=\"w-5 h-5 text-sky-500\" /> متمكن بـ 15+ لغة منها العربية\n                </div>\n                <div className=\"flex items-center gap-3 p-4 rounded-2xl bg-white/5 text-sm font-bold text-white/50\">\n                  <ShieldCheck className=\"w-5 h-5 text-emerald-500\" /> بياناتك آمنة ومدروسة كلياً\n                </div>\n              </div>\n\n              <div className=\"mt-12\">\n                <p className=\"text-xs font-black uppercase tracking-[0.3em] text-white/20 mb-4 animate-pulse\">Waiting for your message...</p>\n                <div className=\"text-sm italic text-violet-400\">انقر على أيقونة الدردشة في الركن السفلي الأيسر ↓</div>\n              </div>\n            </div>\n          </div>\n        </div>\n      </div>\n\n      <AIChat \n        system={`أنت المساعد الذكي الرسمي لحمزة الجزايري (Hamza Hassan Elgzairy). \nحمزة هو مهندس ذكاء اصطناعي (AI Engineer) يعمل في Megsy AI.\nهذا الموقع يبيع منتجات رقمية: \n1. برومبت مهندسين ($29)\n2. كورس أساسيات ($49)\n3. Megsy UI Kit ($79)\nأنت تعرف كل شيء عن حمزة وشغفه بالـ Generative AI. \nردودك احترافية، قصيرة، مشجعة، وبالعربية الفصحى أو العامية المصرية حسب السائل.`}\n      />\n    </div>\n  );\n}","/lib/theme.js":"export const ui = {\n  card: \"rounded-3xl border border-white/10 bg-white/[0.02] backdrop-blur-xl p-6 sm:p-8 overflow-hidden relative\",\n  cardHover: \"transition-all duration-300 hover:border-white/20 hover:bg-white/[0.05] hover:-translate-y-1 hover:shadow-[0_20px_40px_-15px_rgba(0,0,0,0.5)]\",\n  btnPrimary: \"inline-flex items-center justify-center gap-2 rounded-full bg-gradient-to-r from-violet-600 to-fuchsia-600 px-8 py-4 font-bold text-white shadow-lg hover:shadow-violet-500/20 transition-all active:scale-95 disabled:opacity-50\",\n  btnGhost: \"inline-flex items-center justify-center gap-2 rounded-full border border-white/10 bg-white/5 px-8 py-4 font-semibold text-white hover:bg-white/10 transition-all active:scale-95\",\n  section: \"py-24 sm:py-32 px-4 sm:px-6 lg:px-8\",\n  container: \"mx-auto max-w-7xl\",\n  h1: \"text-5xl sm:text-7xl lg:text-9xl font-black tracking-tighter leading-none mb-6\",\n  h2: \"text-3xl sm:text-5xl lg:text-6xl font-bold tracking-tight mb-8\",\n  p: \"text-lg sm:text-xl text-white/60 leading-relaxed max-w-3xl\",\n  gradientText: \"bg-gradient-to-r from-violet-400 via-fuchsia-300 to-sky-400 bg-clip-text text-transparent\",\n};","/App.jsx":"import React from \"react\";\nimport { Routes, Route } from \"react-router-dom\";\nimport Navbar from \"./components/Navbar\";\nimport Footer from \"./components/Footer\";\nimport Home from \"./pages/Home\";\nimport Store from \"./pages/Store\";\nimport Cart from \"./pages/Cart\";\nimport Auth from \"./pages/Auth\";\nimport Projects from \"./pages/Projects\";\nimport Support from \"./pages/Support\";\nimport Account from \"./pages/Account\";\nimport ResetPassword from \"./pages/ResetPassword\";\nimport NotFound from \"./pages/NotFound\";\nimport { useCart } from \"./lib/cart\";\nimport \"./styles/tokens.css\";\nimport \"./styles.css\";\n\nexport default function App() {\n  const cartCount = useCart(s => s.count());\n\n  const navLinks = [\n    { label: \"الرئيسية\", to: \"/\" },\n    { label: \"المتجر\", to: \"/store\" },\n    { label: \"المشاريع\", to: \"/projects\" },\n    { label: \"دعم الـ AI\", to: \"/support\" }\n  ];\n\n  return (\n    <div className=\"min-h-screen flex flex-col selection:bg-violet-500/30\">\n      <Navbar links={navLinks} cartCount={cartCount} />\n      <main className=\"flex-grow\">\n        <Routes>\n          <Route path=\"/\" element={<Home />} />\n          <Route path=\"/store\" element={<Store />} />\n          <Route path=\"/cart\" element={<Cart />} />\n          <Route path=\"/auth\" element={<Auth />} />\n          <Route path=\"/reset-password\" element={<ResetPassword />} />\n          <Route path=\"/projects\" element={<Projects />} />\n          <Route path=\"/support\" element={<Support />} />\n          <Route path=\"/account\" element={<Account />} />\n          <Route path=\"*\" element={<NotFound />} />\n        </Routes>\n      </main>\n      <Footer />\n    </div>\n  );\n}","/components/Navbar.jsx":"import { useState, useEffect } from \"react\";\nimport { Link, NavLink, useNavigate } from \"react-router-dom\";\nimport { Menu, X, ShoppingCart, User, LogOut, Terminal } from \"lucide-react\";\n\nexport default function Navbar({ links = [], cartCount = 0 }) {\n  const [open, setOpen] = useState(false);\n  const [user, setUser] = useState(null);\n  const [scrolled, setScrolled] = useState(false);\n  const nav = useNavigate();\n\n  useEffect(() => {\n    window.supabase?.auth?.getUser?.().then(({ data }) => setUser(data?.user || null));\n    const { data: sub } = window.supabase?.auth?.onAuthStateChange?.((_e, s) => setUser(s?.user || null)) || {};\n    \n    const onScroll = () => setScrolled(window.scrollY > 20);\n    window.addEventListener(\"scroll\", onScroll);\n    return () => { \n      sub?.subscription?.unsubscribe?.(); \n      window.removeEventListener(\"scroll\", onScroll); \n    };\n  }, []);\n\n  const handleLogout = async () => {\n    await window.supabase.auth.signOut();\n    nav(\"/auth\");\n  };\n\n  return (\n    <header className={`fixed top-0 inset-x-0 z-50 transition-all duration-300 ${scrolled ? \"bg-black/60 backdrop-blur-2xl border-b border-white/5 py-3\" : \"bg-transparent py-5\"}`}>\n      <nav className=\"mx-auto max-w-7xl px-4 sm:px-6 lg:px-8 flex items-center justify-between gap-4\">\n        <Link to=\"/\" className=\"flex items-center gap-2 group\">\n          <div className=\"w-10 h-10 rounded-xl bg-gradient-to-br from-violet-600 to-fuchsia-600 flex items-center justify-center shadow-lg shadow-violet-500/20 group-hover:rotate-12 transition-transform\">\n            <Terminal className=\"w-6 h-6 text-white\" />\n          </div>\n          <div className=\"flex flex-col\">\n            <span className=\"text-lg font-black tracking-tight leading-none\">HAMZA</span>\n            <span className=\"text-[10px] text-fuchsia-400 font-bold tracking-widest uppercase\">MEGSY AI</span>\n          </div>\n        </Link>\n        \n        <div className=\"hidden md:flex items-center gap-1 bg-white/5 rounded-full p-1 border border-white/5\">\n          {links.map(l => (\n            <NavLink \n              key={l.to} \n              to={l.to} \n              className={({isActive}) => `px-5 py-2 rounded-full text-sm font-medium transition ${isActive ? \"bg-white text-black shadow-lg\" : \"text-white/70 hover:text-white hover:bg-white/5\"}`}\n            >\n              {l.label}\n            </NavLink>\n          ))}\n        </div>\n\n        <div className=\"flex items-center gap-3\">\n          <Link to=\"/cart\" className=\"relative p-2.5 rounded-full bg-white/5 border border-white/5 hover:bg-white/10 transition group\">\n            <ShoppingCart className=\"w-5 h-5 text-white/80 group-hover:text-white\" />\n            {cartCount > 0 && (\n              <span className=\"absolute -top-1.5 -right-1.5 bg-gradient-to-r from-fuchsia-500 to-pink-500 text-[10px] font-bold text-white rounded-full w-5 h-5 flex items-center justify-center border-2 border-black\">\n                {cartCount}\n              </span>\n            )}\n          </Link>\n\n          {user ? (\n            <div className=\"flex items-center gap-2\">\n              <Link to=\"/account\" className=\"hidden sm:flex items-center gap-2 px-4 py-2 rounded-full bg-white/5 border border-white/10 text-xs font-semibold hover:bg-white/10\">\n                <User className=\"w-4 h-4\" />\n                حسابي\n              </Link>\n              <button \n                onClick={handleLogout}\n                className=\"p-2.5 rounded-full bg-red-500/10 border border-red-500/20 text-red-500 hover:bg-red-500 hover:text-white transition\"\n              >\n                <LogOut className=\"w-5 h-5\" />\n              </button>\n            </div>\n          ) : (\n            <Link to=\"/auth\" className=\"hidden sm:inline-flex px-6 py-2.5 rounded-full bg-white text-black text-sm font-black hover:bg-zinc-200 transition active:scale-95 shadow-lg shadow-white/5\">\n              دخول\n            </Link>\n          )}\n\n          <button onClick={() => setOpen(!open)} className=\"md:hidden p-2.5 rounded-full bg-white/5 border border-white/5 text-white\">\n            {open ? <X className=\"w-5 h-5\"/> : <Menu className=\"w-5 h-5\"/>}\n          </button>\n        </div>\n      </nav>\n\n      {open && (\n        <div className=\"md:hidden absolute top-full inset-x-0 bg-black/95 backdrop-blur-3xl border-b border-white/10 px-4 py-8 flex flex-col gap-2 animate-in slide-in-from-top duration-300\">\n          {links.map(l => (\n            <NavLink key={l.to} to={l.to} onClick={() => setOpen(false)} className=\"px-6 py-4 rounded-2xl text-lg font-bold hover:bg-white/5 border border-transparent hover:border-white/5 transition flex justify-between items-center group\">\n              {l.label}\n              <div className=\"w-2 h-2 rounded-full bg-violet-600 opacity-0 group-hover:opacity-100 transition\" />\n            </NavLink>\n          ))}\n          {!user && (\n            <Link to=\"/auth\" onClick={() => setOpen(false)} className=\"mt-4 w-full py-5 rounded-2xl bg-gradient-to-r from-violet-600 to-fuchsia-600 text-center font-black text-xl shadow-xl shadow-fuchsia-600/20\">\n              دخول للأعضاء\n            </Link>\n          )}\n        </div>\n      )}\n    </header>\n  );\n}","/components/Footer.jsx":"import { ui } from \"../lib/theme\";\nimport { Link } from \"react-router-dom\";\nimport { Terminal, Github, Twitter, Linkedin, Heart } from \"lucide-react\";\n\nexport default function Footer() {\n  const currentYear = new Date().getFullYear();\n\n  return (\n    <footer className=\"bg-black border-t border-white/5 pt-20 pb-10 overflow-hidden relative\">\n      <div className=\"absolute top-0 left-1/2 -translate-x-1/2 w-full h-[1px] bg-gradient-to-r from-transparent via-violet-500/50 to-transparent\" />\n      \n      <div className={ui.container}>\n        <div className=\"grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-12 mb-20 px-4\">\n          <div className=\"space-y-6\">\n            <Link to=\"/\" className=\"flex items-center gap-2 group\">\n              <div className=\"w-12 h-12 rounded-xl bg-gradient-to-br from-violet-600 to-fuchsia-600 flex items-center justify-center shadow-lg transform group-hover:rotate-6 transition-transform\">\n                <Terminal className=\"w-7 h-7 text-white\" />\n              </div>\n              <div className=\"flex flex-col\">\n                <span className=\"text-xl font-black tracking-tight leading-none uppercase\">HAMZA</span>\n                <span className=\"text-[10px] text-fuchsia-400 font-bold tracking-widest uppercase\">AI ENGINEER</span>\n              </div>\n            </Link>\n            <p className=\"text-white/40 font-medium leading-relaxed max-w-xs\">\n              نبني جسوراً من الأكواد والذكاء الاصطناعي لنصل بمشاريعكم إلى آفاق غير مسبوقة. انطلق معنا في رحلة الابتكار.\n            </p>\n            <div className=\"flex gap-4\">\n              {[Github, Twitter, Linkedin].map((Icon, i) => (\n                <Link key={i} to=\"#\" className=\"w-10 h-10 rounded-full bg-white/5 border border-white/10 flex items-center justify-center hover:bg-white hover:text-black transition\">\n                  <Icon className=\"w-5 h-5\" />\n                </Link>\n              ))}\n            </div>\n          </div>\n\n          <div>\n            <h4 className=\"text-sm font-black uppercase tracking-[0.2em] mb-8 text-white\">الملاحة</h4>\n            <ul className=\"space-y-4\">\n              {[\"الرئيسية\", \"المتجر الرقمي\", \"المشاريع\", \"دعم العملاء\"].map((link, idx) => (\n                <li key={idx}>\n                  <Link to=\"#\" className=\"text-white/40 hover:text-violet-400 transition font-bold\">{link}</Link>\n                </li>\n              ))}\n            </ul>\n          </div>\n\n          <div>\n            <h4 className=\"text-sm font-black uppercase tracking-[0.2em] mb-8 text-white\">الأدوات</h4>\n            <ul className=\"space-y-4\">\n              {[\"Megsy AI\", \"Prompt Engineering\", \"Custom LLMs\", \"Automation\"].map((tool, idx) => (\n                <li key={idx}>\n                  <Link to=\"#\" className=\"text-white/40 hover:text-fuchsia-400 transition font-bold\">{tool}</Link>\n                </li>\n              ))}\n            </ul>\n          </div>\n\n          <div className=\"p-8 rounded-3xl bg-zinc-900/50 border border-white/5 relative overflow-hidden group\">\n            <div className=\"absolute top-0 right-0 p-4 opacity-10 group-hover:scale-150 transition-transform duration-700\">\n               <Terminal className=\"w-20 h-20\" />\n            </div>\n            <h4 className=\"text-lg font-black mb-4\">اشترك في النشرة</h4>\n            <p className=\"text-xs text-white/40 mb-6 font-bold leading-relaxed\">احصل على آخر التحديثات في عالم الذكاء الاصطناعي أسبوعياً.</p>\n            <div className=\"flex gap-2\">\n              <input type=\"email\" placeholder=\"بريدك..\" className=\"flex-1 bg-black border border-white/10 rounded-xl px-4 text-xs outline-none focus:border-violet-500\" />\n              <button className=\"px-4 py-3 rounded-xl bg-white text-black text-xs font-black\">انضم</button>\n            </div>\n          </div>\n        </div>\n\n        <div className=\"border-t border-white/5 pt-10 flex flex-col md:flex-row items-center justify-between gap-6 px-4\">\n          <div className=\"text-[10px] sm:text-xs font-black text-white/30 uppercase tracking-[0.3em]\">\n            © {currentYear} HAMZA HASSAN ELGZAIRY — ALL RIGHTS RESERVED\n          </div>\n          <div className=\"flex items-center gap-2 text-xs font-bold text-white/40\">\n            صنع بـ <Heart className=\"w-3.5 h-3.5 text-red-500 fill-red-500\" /> في <span className=\"text-white\">MEGSY AI</span>\n          </div>\n        </div>\n      </div>\n    </footer>\n  );\n}","/styles/tokens.css":":root {\n  --bg: #030303;\n  --surface: #0a0a0c;\n  --surface-2: #121216;\n  --border: rgba(255, 255, 255, 0.08);\n  --text: #f8fafc;\n  --text-muted: rgba(248, 250, 252, 0.6);\n  --primary: #8b5cf6;\n  --accent: #d946ef;\n  --radius-card: 1.5rem;\n  --radius-pill: 9999px;\n  --font-arabic: 'Cairo', sans-serif;\n  --font-english: 'Inter', sans-serif;\n}\n\n* {\n  box-sizing: border-box;\n  margin: 0;\n  padding: 0;\n}\n\nbody {\n  background-color: var(--bg);\n  color: var(--text);\n  font-family: var(--font-arabic);\n  overflow-x: hidden;\n  line-height: 1.6;\n}\n\n[dir=\"ltr\"] {\n  font-family: var(--font-english);\n}\n\n.glass {\n  background: rgba(255, 255, 255, 0.03);\n  backdrop-filter: blur(12px);\n  -webkit-backdrop-filter: blur(12px);\n  border: 1px solid var(--border);\n}\n\n.text-gradient {\n  background: linear-gradient(to right, #a78bfa, #f472b6, #fb923c);\n  -webkit-background-clip: text;\n  -webkit-text-fill-color: transparent;\n}\n\n.glow-btn {\n  box-shadow: 0 0 20px rgba(139, 92, 246, 0.3);\n  transition: all 0.3s ease;\n}\n\n.glow-btn:hover {\n  box-shadow: 0 0 30px rgba(139, 92, 246, 0.6);\n  transform: translateY(-2px);\n}\n\n::-webkit-scrollbar {\n  width: 8px;\n}\n\n::-webkit-scrollbar-track {\n  background: var(--bg);\n}\n\n::-webkit-scrollbar-thumb {\n  background: var(--surface-2);\n  border-radius: 10px;\n}\n\n::-webkit-scrollbar-thumb:hover {\n  background: var(--primary);\n}","/lib/cart.js":"import { create } from \"zustand\";\nimport { persist } from \"zustand/middleware\";\n\nexport const useCart = create(persist((set, get) => ({\n  items: [],\n  add: (p, qty = 1) => set(s => {\n    const ex = s.items.find(i => i.id === p.id);\n    if (ex) {\n      return { items: s.items.map(i => i.id === p.id ? { ...i, qty: i.qty + qty } : i) };\n    }\n    return { items: [...s.items, { ...p, qty }] };\n  }),\n  remove: (id) => set(s => ({ items: s.items.filter(i => i.id !== id) })),\n  update: (id, qty) => set(s => ({\n    items: qty <= 0 ? s.items.filter(i => i.id !== id) : s.items.map(i => i.id === id ? { ...i, qty } : i)\n  })),\n  clear: () => set({ items: [] }),\n  total: () => get().items.reduce((sum, i) => sum + i.price * i.qty, 0),\n  count: () => get().items.reduce((sum, i) => sum + i.qty, 0),\n}), { name: \"hamza-cart-v1\" }));","/components/AIChat.jsx":"import { useState, useRef, useEffect } from \"react\";\nimport { MessageCircle, X, Send, Loader2, Bot, Sparkles } from \"lucide-react\";\n\nexport default function AIChat({ sys       const re2 = new RegExp(IMPORT_RE.source, 'g');
      code = code.replace(re2, function(_full, prefix, q, spec, q2){
        if (depUrls[spec]) return prefix + q + depUrls[spec] + q2;
        return _full;
      });

      // Shim 1: ensure a default export exists so 'import X from "./mod"' never fails.
      const hasDefault = /export\s+default\b/.test(code)
        || /export\s*\{[^}]*\bdefault\b[^}]*\}/.test(code)
        || /export\s*\{[^}]*\bas\s+default\b[^}]*\}/.test(code);
      if (!hasDefault) {
        code += "\n;export default {};\n";
      }

      // Named local imports are converted to namespace imports above, so we no
      // longer mutate a module's export table here. Mutating exports caused hard
      // browser syntax errors like "Duplicate export of 'seedProducts'".
    }

    const blob = new Blob([code], { type: 'text/javascript' });
    const url = URL.createObjectURL(blob);
    moduleCache[path] = url;
    return url;
  }

  // Pre-pass: scan every file's raw source so that requiredExports is fully
  // populated BEFORE any module is transformed/cached. Without this, a module
  // loaded earlier than one of its consumers wouldn't get the backfill.
  function prescanRequiredExports() {
    for (const filePath of Object.keys(FILES)) {
      if (!/\.(jsx?|tsx?)$/.test(filePath)) continue;
      const code = FILES[filePath];
      const re = new RegExp(IMPORT_RE.source, 'g');
      let m;
      while ((m = re.exec(code)) !== null) {
        const prefix = m[1];
        const spec = m[3];
        const resolved = resolvePath(filePath, spec);
        if (resolved) noteRequired(resolved, extractNamedBindings(prefix));
      }
    }
  }

  (async () => {
    try {
      prescanRequiredExports();
      const entryUrl = await loadModule(ENTRY);
      await import(entryUrl);
    } catch (err) {
      console.error('[Webly]', err);
      const msg = (err && err.stack) ? err.stack : String(err);
      document.getElementById('root').innerHTML =
        '<div style="padding:24px;font-family:ui-monospace,monospace;direction:ltr;text-align:left;min-height:100vh;background:#0f172a">' +
        '<h2 style="color:#f87171;margin:0 0 12px">Webly Runtime Error</h2>' +
        '<pre style="white-space:pre-wrap;color:#fecaca;background:#1e293b;padding:16px;border-radius:8px;border:1px solid #b91c1c;font-size:13px">' +
        msg.replace(/[&<>]/g, function(c){ return ({ '&':'&amp;','<':'&lt;','>':'&gt;' })[c]; }) +
        '</pre></div>';
    }
  })();
</script>
</body>
</html>
