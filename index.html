  (function(){
    function buildQuery(table){
      const filters = [];
      const state = { order: null, limit: null, single: false, range: null };

      api.neq     = function(col, val){ filters.push({ op:'neq', col, val }); return clone(); };
      api.gt      = function(col, val){ filters.push({ op:'gt', col, val }); return clone(); };
      api.gte     = function(col, val){ filters.push({ op:'gte', col, val }); return clone(); };
      api.lt      = function(col, val){ filters.push({ op:'lt', col, val }); return clone(); };
      api.lte     = function(col, val){ filters.push({ op:'lte', col, val }); return clone(); };

      api.ilike   = function(col, val){ filters.push({ op:'ilike', col, val }); return clone(); };
      api['in']   = function(col, vals){ filters.push({ op:'in', col, vals }); return clone(); };
      api.match   = function(obj){ Object.keys(obj||{}).forEach(function(k){ filters.push({ op:'eq', col:k, val:obj[k] }); }); return clone(); };
      api.order   = function(col, opts){ state.order = { col: col, asc: !(opts && opts.ascending === false) }; return clone(); };

            out = out.filter(function(r){ return r && f.vals && f.vals.indexOf(r[f.col]) !== -1; });

          });
        });

      };

    ];

        note.textContent = '✨ قاعدة البيانات الافتراضية مفعّلة — يمكنك المتابعة.';

        candidates.sort(function(a,b){ return (b.children?b.children.length:0) - (a.children?a.children.length:0); });

 transition={{ duration: 0.8 }}\n            >\n              <div className=\"inline-flex items-center gap-2 px-4 py-2 rounded-full bg-white/5 border border-white/10 text-violet-400 text-sm mb-6\">\n                <Sparkles size={16} />\n                <span>مستقبل الذكاء الاصطناعي يبدأ هنا</span>\n              </div>\n              <h1 className={ui.h1}>\n                حمزة <br />\n                <span className={ui.gradientText}>الجزايري</span>\n              </h1>\n              <p className=\"mt-8 text-xl text-gray-400 leading-relaxed max-w-xl\">\n                مهندس ذكاء اصطناعي ومطور واجهات في <Link to=\"https://megsyai.com\" className=\"text-white hover:underline\">Megsy AI</Link>. \n                أبني تجارب رقمية ذكية تدمج بين الابتكار والجمال البصري. متخصص في بناء تطبيقات الـ Generative AI وأنظمة التعلم العميق.\n              </p>\n              <div className=\"mt-12 flex flex-wrap gap-6\">\n                <Link to=\"/store\" className={ui.btnPrimary}>\n                  تصفح المنتجات الرقمية\n                </Link>\n                <Link to=\"/projects\" className={ui.btnGhost}>\n                  شاهد أعمالي\n                  <ArrowLeft size={20} className=\"mr-2 rotate-180\" />\n                </Link>\n              </div>\n              \n              <div className=\"mt-16 flex items-center gap-8 text-gray-500\">\n                  <span className=\"text-sm font-medium uppercase tracking-widest px-4 border-l border-white/10\">Follow Me</span>\n                  <div className=\"flex gap-4\">\n                      <a href=\"#\" className=\"hover:text-white transition-colors\"><Github size={20} /></a>\n                      <a href=\"#\" className=\"hover:text-white transition-colors\"><Twitter size={20} /></a>\n                      <a href=\"#\" className=\"hover:text-white transition-colors\"><Linkedin size={20} /></a>\n                  </div>\n              </div>\n            </motion.div>\n\n            <motion.div \n              initial={{ opacity: 0, scale: 0.8 }}\n              animate={{ opacity: 1, scale: 1 }}\n              transition={{ duration: 1 }}\n              className=\"relative\"\n            >\n              <div className=\"relative z-10 rounded-[2rem] overflow-hidden border border-white/10 shadow-2xl\">\n                <img \n                  src=\"https://images.pexels.com/photos/5474034/pexels-photo-5474034.jpeg?auto=compress&cs=tinysrgb&h=800\" \n                  alt=\"Hamza Elgzairy\" \n                  className=\"w-full h-auto grayscale hover:grayscale-0 transition-all duration-700\"\n                />\n              </div>\n              {/* Floating Cards */}\n              <div className=\"absolute -bottom-10 -right-10 glass p-6 rounded-3xl z-20 hidden md:block animate-bounce shadow-glow\">\n                <div className=\"flex items-center gap-4\">\n                    <div className=\"w-12 h-12 bg-emerald-500/20 rounded-full flex items-center justify-center text-emerald-400\">\n                        <Cpu size={24} />\n                    </div>\n                    <div>\n                        <div className=\"font-bold\">AI Engineer</div>\n                        <div className=\"text-xs text-gray-400\">@ Megsy AI Platform</div>\n                    </div>\n                </div>\n              </div>\n            </motion.div>\n          </div>\n        </div>\n      </section>\n\n      {/* Services/Experties */}\n      <section className={`${ui.section} bg-zinc-950/50`}>\n        <div className={ui.container}>\n            <div className=\"text-center mb-20\">\n                <h2 className={ui.h2}>خبرات مدفوعة <span className={ui.gradientText}>بالذكاء الاصطناعي</span></h2>\n                <p className=\"text-gray-400 max-w-2xl mx-auto\">نحول الأفكار المعقدة إلى أدوات ذكية سهلة الاستخدام، مع التركيز على الكفاءة والابتكار المستمر.</p>\n            </div>\n            \n            <div className=\"grid md:grid-cols-3 gap-8\">\n                {[\n                    {\n                        title: \"تطوير وكلاء الذكاء الاصطناعي\",\n                        desc: \"بناء وكلاء ذكاء اصطناعي (AI Agents) قادرين على أداء المهام المعقدة، التخطيط، والتفاعل مع المستخدمين بشكل طبيعي وسلس عبر أدوات مثل LangChain و AutoGPT.\",\n                        icon: <Rocket className=\"text-violet-400\" />\n                    },\n                    {\n                        title: \"واجهات المستخدم الذكية\",\n                        desc: \"تصميم وتطوير واجهات React عصرية تستفيد من قدرات AI لتقديم تجربة مخصصة لكل مستخدم، مع التركيز على السرعة والتصميم البصري الفائق.\",\n                        icon: <Sparkles className=\"text-fuchsia-400\" />\n                    },\n                    {\n                        title: \"استشارات الـ Generative AI\",\n                        desc: \"مساعدة الشركات والمبدعين في دمج نماذج اللغة الكبيرة (LLMs) وصناعة الصور في سير عملهم اليومي لزيادة الإنتاجية بنسبة تصل إلى 300%.\",\n                        icon: <Cpu className=\"text-sky-400\" />\n                    }\n                ].map((s, idx) => (\n                    <div key={idx} className={`${ui.card} ${ui.cardHover}`}>\n                        <div className=\"mb-6 w-14 h-14 rounded-2xl bg-white/5 flex items-center justify-center\">\n                            {s.icon}\n                        </div>\n                        <h3 className={ui.h3}>{s.title}</h3>\n                        <p className=\"text-gray-400 leading-relaxed\">{s.desc}</p>\n                    </div>\n                ))}\n            </div>\n        </div>\n      </section>\n    </div>\n  );\n};\n\nexport default Home;\n","/lib/supabase.js":"import { createClient } from '@supabase/supabase-js';\n\nconst supabaseUrl = window.__SUPABASE_URL__;\nconst supabaseAnonKey = window.__SUPABASE_ANON_KEY__;\n\nexport const supabase = createClient(supabaseUrl, supabaseAnonKey);\n","/pages/NotFound.jsx":"import React from 'react';\nimport { Link } from 'react-router-dom';\nimport { Frown } from 'lucide-react';\nimport { ui } from '../lib/theme';\n\nconst NotFound = () => {\n  return (\n    <div className={`${ui.section} ${ui.container} text-center flex flex-col items-center justify-center min-h-[60vh]`}>\n        <Frown className=\"w-24 h-24 text-violet-400 mb-6\" />\n      <h1 className={`${ui.h1} ${ui.gradientText} mb-4`}>404</h1>\n      <h2 className=\"text-3xl font-bold mb-4\">Page Not Found</h2>\n      <p className=\"text-text-muted text-lg mb-8 max-w-md\">\n        Oops! The page you're looking for doesn't exist. It might have been moved or deleted.\n      </p>\n      <Link to=\"/\" className={ui.btnPrimary}>\n        Go Back Home\n      </Link>\n    </div>\n  );\n};\n\nexport default NotFound;\n","/pages/Store.jsx":"import React, { useState, useEffect } from \"react\";\nimport { ui } from \"../lib/theme\";\nimport { ShoppingCart, Plus, Check } from \"lucide-react\";\nimport { motion, AnimatePresence } from \"framer-motion\";\n\nconst Store = () => {\n  const [products, setProducts] = useState([]);\n  const [loading, setLoading] = useState(true);\n  const [addedId, setAddedId] = useState(null);\n\n  useEffect(() => {\n    const fetchProducts = async () => {\n      try {\n        const res = await fetch(\"/api/data/products\");\n        const data = await res.json();\n        setProducts(data);\n      } catch (e) {\n        console.error(\"Failed to fetch products\", e);\n      } finally {\n        setLoading(false);\n      }\n    };\n    fetchProducts();\n  }, []);\n\n  const addToCart = (product) => {\n    const cart = JSON.parse(localStorage.getItem(\"cart\") || \"[]\");\n    const existing = cart.find((item) => item.id === product.id);\n    if (existing) {\n      existing.quantity += 1;\n    } else {\n      cart.push({ ...product, quantity: 1 });\n    }\n    localStorage.setItem(\"cart\", JSON.stringify(cart));\n    window.dispatchEvent(new Event(\"cart-updated\"));\n    \n    setAddedId(product.id);\n    setTimeout(() => setAddedId(null), 2000);\n  };\n\n  if (loading) return <div className=\"min-h-screen pt-40 text-center\">جاري تحميل المنتجات...</div>;\n\n  return (\n    <div className=\"pt-24 min-h-screen\">\n      <section className={ui.section}>\n        <div className={ui.container}>\n          <div className=\"max-w-3xl mb-16\">\n            <h1 className={ui.h2}>متجر <span className={ui.gradientText}>الأدوات الرقمية</span></h1>\n            <p className=\"text-xl text-gray-400\">\n              مجموعتي المختارة من الموارد المتقدمة لمطوري ومصممي الذكاء الاصطناعي. برومبتس جاهزة، شفرات مصدرية، ودورات مكثفة.\n            </p>\n          </div>\n\n          <div className=\"grid sm:grid-cols-2 lg:grid-cols-3 gap-8\">\n            {products.map((p) => (\n              <motion.div \n                layout\n                key={p.id} \n                className={`${ui.card} flex flex-col group`}\n              >\n                <div className=\"aspect-[4/3] rounded-2xl overflow-hidden mb-6 relative\">\n                   <img \n                    src={p.image_url} \n                    alt={p.name_ar} \n                    className=\"w-full h-full object-cover group-hover:scale-110 transition-transform duration-500\"\n                   />\n                   <div className=\"absolute top-4 right-4\">\n                        <span className=\"bg-black/60 backdrop-blur-md px-3 py-1 rounded-full text-xs font-bold border border-white/10 uppercase tracking-widest\">\n                            {p.category}\n                        </span>\n                   </div>\n                </div>\n                <h3 className=\"text-2xl font-bold mb-3\">{p.name_ar}</h3>\n                <p className=\"text-gray-400 text-sm mb-6 flex-grow\">{p.description_ar}</p>\n                <div className=\"flex items-center justify-between mt-auto pt-6 border-t border-white/5\">\n                  <span className=\"text-3xl font-black text-white\">${p.price}</span>\n                  <button \n                    onClick={() => addToCart(p)}\n                    className={`p-4 rounded-2xl transition-all ${addedId === p.id ? \"bg-emerald-500 text-white\" : \"bg-violet-600 hover:bg-violet-500 text-white shadow-lg shadow-violet-600/20\"}`}\n                  >\n                    {addedId === p.id ? <Check size={24} /> : <ShoppingCart size={24} />}\n                  </button>\n                </div>\n              </motion.div>\n            ))}\n          </div>\n        </div>\n      </section>\n    </div>\n  );\n};\n\nexport default Store;\n","/components/DigitalProductCard.jsx":"import React from 'react';\nimport { ShoppingCart } from 'lucide-react';\nimport { ui } from '../lib/theme';\n\nconst DigitalProductCard = ({ product }) => {\n  // In a real app, you would use a global state (like Zustand/Redux) to handle adding to cart.\n  const handleAddToCart = () => {\n    console.log(`Added ${product.name_en} to cart.`);\n    // useCartStore.getState().addItem(product);\n  };\n\n  return (\n    <div className={`${ui.card} ${ui.cardHover} flex flex-col h-full`}>\n      <div className=\"aspect-video w-full overflow-hidden rounded-lg mb-4\">\n        <img src={product.image_url} alt={product.name_en} className=\"w-full h-full object-cover\" />\n      </div>\n      <div className=\"flex-grow\">\n          <p className=\"text-sm text-violet-400 font-medium mb-1\">{product.category}</p>\n          <h3 className=\"text-lg font-bold mb-2\">{product.name_en}</h3>\n          <p className=\"text-text-muted text-sm flex-grow mb-4\">{product.description_en}</p>\n      </div>\n      <div className=\"flex items-center justify-between mt-4\">\n        <span className=\"text-2xl font-bold text-white\">${product.price.toFixed(2)}</span>\n        <button onClick={handleAddToCart} className={`${ui.btnGhost} !px-4 !py-2`}>\n          <ShoppingCart size={18} />\n          <span className=\"hidden sm:inline\">Add to Cart</span>\n        </button>\n      </div>\n    </div>\n  );\n};\n\nexport default DigitalProductCard;","/pages/About.jsx":"import React from 'react';\nimport { ui } from '../lib/theme';\nimport { motion } from 'framer-motion';\nimport { Briefcase, Cpu, Code, Zap, Target } from 'lucide-react';\n\nconst About = () => {\n  const aboutImageUrl = 'https://images.pexels.com/photos/33433724/pexels-photo-33433724.jpeg?auto=compress&cs=tinysrgb&dpr=2&h=650&w=940';\n\n  return (\n    <div className={`${ui.section} ${ui.container}`}>\n      <motion.div \n        initial={{ opacity: 0, y: 20 }}\n        animate={{ opacity: 1, y: 0 }}\n        transition={{ duration: 0.5 }}\n        className=\"text-center max-w-3xl mx-auto mb-16 sm:mb-24\"\n      >\n        <h1 className={`${ui.h1} ${ui.gradientText} mb-4`}>About Me</h1>\n        <p className=\"text-lg sm:text-xl text-text-muted\">\n          An AI Engineer driven by a passion for building intelligent, scalable, and impactful solutions that shape the future.\n        </p>\n      </motion.div>\n\n      <div className=\"grid grid-cols-1 lg:grid-cols-5 gap-12 lg:gap-16 items-center\">\n        <motion.div \n          initial={{ opacity: 0, x: -50 }}\n          animate={{ opacity: 1, x: 0 }}\n          transition={{ duration: 0.7 }}\n          className=\"lg:col-span-2\"\n        >\n          <div className=\"aspect-square relative rounded-3xl overflow-hidden glass p-2\">\n             <img src={aboutImageUrl} alt=\"Hamza Hassan Elgzairy\" className=\"w-full h-full object-cover rounded-2xl\" />\n             <div className=\"absolute bottom-4 left-4 right-4 p-4 bg-black/50 backdrop-blur-md rounded-xl border border-white/10\">\n                <p className='font-bold text-lg'>Hamza H. Elgzairy</p>\n                <p className='text-sm text-violet-300'>AI Engineer @ Megsy AI</p>\n             </div>\n          </div>\n        </motion.div>\n        <motion.div \n          initial={{ opacity: 0, x: 50 }}\n          animate={{ opacity: 1, x: 0 }}\n          transition={{ duration: 0.7, delay: 0.2 }}\n          className=\"lg:col-span-3\"\n        >\n          <h2 className={`${ui.h2} mb-6`}>From Curiosity to Creation</h2>\n          <div className=\"space-y-6 text-text-muted text-lg leading-relaxed\">\n            <p>\n              My journey into the world of Artificial Intelligence began not in a classroom, but with a profound curiosity about how complex systems learn and adapt. This curiosity evolved into a dedicated career focused on the intersection of data, algorithms, and user experience. As an AI Engineer at <a href='https://megsy.ai' target='_blank' rel='noopener noreferrer' className='text-violet-400 font-semibold'>Megsy AI</a>, I am on the front lines, architecting and implementing the core intelligence that powers our next-generation platform.\n            </p>\n            <p>\n              I specialize in the full development lifecycle of AI systems—from conceptualization and data processing to model training, deployment, and integration into full-stack applications. My work is not just about writing code; it's about solving real-world problems and creating tangible value through technology.\n            </p>\n             <p>\n              I thrive in dynamic environments where innovation is constant. Whether it's fine-tuning a large language model, designing a scalable API for an AI service, or collaborating with a team to bring a complex feature to life, my goal is always to build products that are not only intelligent but also reliable and intuitive.\n            </p>\n          </div>\n        </motion.div>\n      </div>\n      \n      {/* Core Competencies Section */}\n    <div className=\"mt-24 sm:mt-32\">\n        <div className=\"text-center max-w-3xl mx-auto\">\n            <h2 className={`${ui.h2} mb-4`}>Core Competencies</h2>\n             <p className=\"text-lg text-text-muted\">\n             I leverage a diverse skill set to translate complex technical challenges into elegant solutions.\n            </p>\n        </div>\n        <div className=\"mt-16 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8\">\n            <div className={`${ui.card} text-center`}>\n                <Cpu size={32} className=\"mx-auto text-violet-400 mb-4\"/>\n                <h3 className='font-bold text-xl mb-2'>Machine Learning</h3>\n                <p className='text-text-muted text-sm'>Expert in Scikit-learn, TensorFlow, PyTorch. Experience with NLP, Computer Vision and predictive modeling.</p>\n            </div>\n            <div className={`${ui.card} text-center`}>\n                <Code size={32} className=\"mx-auto text-sky-400 mb-4\"/>\n                <h3 className='font-bold text-xl mb-2'>Backend Development</h3>\n                <p className='text-text-muted text-sm'>Building robust APIs and data pipelines using Python (FastAPI), Node.js, and integrating with databases like PostgreSQL and Supabase.</p>\n            </div>\n            <div className={`${ui.card} text-center`}>\n                <Zap size={32} className=\"mx-auto text-amber-400 mb-4\"/>\n                <h3 className='font-bold text-xl mb-2'>MLOps & Deployment</h3>\n                <p className='text-text-muted text-sm'>Proficient in containerization with Docker, CI/CD pipelines, and deploying scalable models on cloud platforms (AWS, GCP).</p>\n            </div>\n            <div className={`${ui.card} text-center`}>\n                <Target size={32} className=\"mx-auto text-fuchsia-400 mb-4\"/>\n                <h3 className='font-bold text-xl mb-2'>Product Strategy</h3>\n                <p className='text-text-muted text-sm'>Adept at aligning technical possibilities with business goals to deliver AI features that have a measurable market impact.</p>\n            </div>\n        </div>\n    </div>\n\n    </div>\n  );\n};\n\nexport default About;\n","/pages/ResetPassword.jsx":"import React from 'react';\nimport { ui } from '../lib/theme';\n\nconst ResetPassword = () => {\n  return (\n    <div className={`${ui.section} ${ui.container} flex items-center justify-center`}>\n      <div className={`${ui.card} w-full max-w-md`}>\n        <h2 className=\"text-2xl font-bold mb-4 text-center\">Reset Password</h2>\n        <p className=\"text-text-muted text-center mb-6\">Enter your email and we'll send you a link to reset your password.</p>\n        <form className=\"space-y-4\">\n          <div>\n            <label className=\"block text-sm font-medium mb-2\">Email Address</label>\n            <input type=\"email\" className=\"w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 focus:border-violet-500 outline-none\" placeholder=\"name@example.com\" />\n          </div>\n          <button type=\"button\" className={`${ui.btnPrimary} w-full justify-center mt-4`}>\n            Send Reset Link\n          </button>\n        </form>\n      </div>\n    </div>\n  );\n};\n\nexport default ResetPassword;\n","/pages/Projects.jsx":"import React from \"react\";\nimport { ui } from \"../lib/theme\";\nimport { Link } from \"react-router-dom\";\nimport { Code, Server, Smartphone, Globe, ArrowRight, Layout } from \"lucide-react\";\n\nconst Projects = () => {\n  const projects = [\n    {\n      title: \"Megsy AI - Voice Agent\",\n      desc: \"نظام ذكاء اصطناعي صوتي يتحدث العربية بطلاقة، مصمم لخدمة العملاء في الشركات الكبرى. يعتمد على نماذج OpenAI Whisper و ElevenLabs.\",\n      tags: [\"Python\", \"WebSocket\", \"React\", \"AI\"],\n      image: \"https://images.pexels.com/photos/1181671/pexels-photo-1181671.jpeg?auto=compress&cs=tinysrgb&w=800\",\n      link: \"#\"\n    },\n    {\n      title: \"Smart Vision Dashboard\",\n      desc: \"لوحة تحكم ذكية تستخدم رؤية الحاسوب (Computer Vision) لتحليل حركة المرور وسلوك المشاة في المدن الذكية بشكل لحظي.\",\n      tags: [\"TensorFlow\", \"FastAPI\", \"Next.js\"],\n      image: \"https://images.pexels.com/photos/11035481/pexels-photo-11035481.jpeg?auto=compress&cs=tinysrgb&w=800\",\n      link: \"#\"\n    },\n    {\n      title: \"GPT-Powered CMS\",\n      desc: \"نظام إدارة محتوى يقوم بكتابة وتنسيق وجدولة المقالات تلقائياً بناءً على الكلمات المفتاحية الرائجة باستخدام GPT-4.\",\n      tags: [\"Node.js\", \"GPT-4\", \"Tailwind\"],\n      image: \"https://images.pexels.com/photos/1139457/pexels-photo-1139457.jpeg?auto=compress&cs=tinysrgb&w=800\",\n      link: \"#\"\n    }\n  ];\n\n  return (\n    <div className=\"pt-24 min-h-screen\">\n      <section className={ui.section}>\n        <div className={ui.container}>\n          <div className=\"max-w-3xl mb-20 text-center mx-auto\">\n            <h1 className={ui.h1 + \" mb-8\"}>مشاريع <br/><span className={ui.gradientText}>تم إنشاؤها بالذكاء</span></h1>\n            <p className=\"text-xl text-gray-400\">\n              مزيج من الابتكار التقني والتصميم الفائق. كل مشروع هنا هو محاولة لدفع حدود الممكن باستخدام الأدوات الحديثة.\n            </p>\n          </div>\n\n          <div className=\"grid gap-16\">\n            {projects.map((p, idx) => (\n              <div key={idx} className={`${ui.card} grid md:grid-cols-2 gap-12 group overflow-hidden items-center`}>\n                <div className={`overflow-hidden rounded-3xl ${idx % 2 === 0 ? \"md:order-1\" : \"md:order-2\"}`}>\n                   <img \n                    src={p.image} \n                    alt={p.title} \n                    className=\"w-full h-[400px] object-cover group-hover:scale-105 transition-transform duration-700\"\n                   />\n                </div>\n                <div className={idx % 2 === 0 ? \"md:order-2\" : \"md:order-1\"}>\n                   <div className=\"flex gap-2 mb-6\">\n                      {p.tags.map(tag => <span key={tag} className={ui.badge}>{tag}</span>)}\n                   </div>\n                   <h2 className={ui.h2}>{p.title}</h2>\n                   <p className=\"text-gray-400 text-lg leading-relaxed mb-8\">{p.desc}</p>\n                   <Link to={p.link} className={ui.btnGhost}>\n                      عرض المشروع\n                      <ArrowRight size={20} className=\"mr-2 rotate-180\" />\n                   </Link>\n                </div>\n              </div>\n            ))}\n          </div>\n        </div>\n      </section>\n\n      {/* Tech Stack Marquee (Static) */}\n      <section className=\"py-20 border-y border-white/5 bg-zinc-950/30 overflow-hidden\">\n        <div className=\"flex gap-20 items-center justify-center grayscale opacity-30 animate-pulse\">\n            <div className=\"flex items-center gap-4 text-3xl font-bold\"><Code size={32}/> REACT</div>\n            <div className=\"flex items-center gap-4 text-3xl font-bold\"><Server size={32}/> PYTORCH</div>\n            <div className=\"flex items-center gap-4 text-3xl font-bold\"><Globe size={32}/> FASTAPI</div>\n            <div className=\"flex items-center gap-4 text-3xl font-bold\"><Smartphone size={32}/> TAILWIND</div>\n            <div className=\"flex items-center gap-4 text-3xl font-bold\"><Layout size={32}/> SUPABASE</div>\n        </div>\n      </section>\n    </div>\n  );\n};\n\nexport default Projects;\n","/pages/Cart.jsx":"import React, { useState, useEffect } from \"react\";\nimport { ui } from \"../lib/theme\";\nimport { Trash2, Plus, Minus, CreditCard, ShoppingBag, ArrowRight } from \"lucide-react\";\nimport { Link } from \"react-router-dom\";\n\nconst Cart = () => {\n  const [items, setItems] = useState([]);\n  const [isLoading, setIsLoading] = useState(true);\n\n  useEffect(() => {\n    const loadCart = () => {\n      const saved = JSON.parse(localStorage.getItem(\"cart\") || \"[]\");\n      setItems(saved);\n      setIsLoading(false);\n    };\n    loadCart();\n  }, []);\n\n  const saveCart = (newItems) => {\n    setItems(newItems);\n    localStorage.setItem(\"cart\", JSON.stringify(newItems));\n    window.dispatchEvent(new Event(\"cart-updated\"));\n  };\n\n  const updateQuantity = (id, delta) => {\n    const newItems = items.map(item => {\n      if (item.id === id) {\n        const newQty = Math.max(1, item.quantity + delta);\n        return { ...item, quantity: newQty };\n      }\n      return item;\n    });\n    saveCart(newItems);\n  };\n\n  const removeItem = (id) => {\n    const newItems = items.filter(item => item.id !== id);\n    saveCart(newItems);\n  };\n\n  const total = items.reduce((acc, item) => acc + (item.price * item.quantity), 0);\n\n  if (isLoading) return <div className=\"pt-40 text-center\">جاري التحميل...</div>;\n\n  return (\n    <div className=\"pt-24 min-h-screen\">\n      <section className={ui.section}>\n        <div className={ui.container}>\n          <h1 className={ui.h2 + \" mb-12 text-center\"}>سلة <span className={ui.gradientText}>المشتريات</span></h1>\n\n          {items.length === 0 ? (\n            <div className=\"text-center py-20 bg-white/[0.02] rounded-[3rem] border border-dashed border-white/10\">\n              <div className=\"w-20 h-20 bg-white/5 rounded-full flex items-center justify-center mx-auto mb-6\">\n                <ShoppingBag size={40} className=\"text-gray-500\" />\n              </div>\n              <p className=\"text-2xl text-gray-400 mb-8\">سلة التسوق فارغة حالياً</p>\n              <Link to=\"/store\" className={ui.btnPrimary}>ابدأ التسوق الآن</Link>\n            </div>\n          ) : (\n            <div className=\"grid lg:grid-cols-3 gap-12\">\n              {/* Items List */}\n              <div className=\"lg:col-span-2 space-y-6\">\n                {items.map((item) => (\n                  <div key={item.id} className={`${ui.card} flex flex-col sm:flex-row items-center gap-6 group`}>\n                    <img src={item.image_url} alt={item.name_ar} className=\"w-32 h-32 rounded-2xl object-cover\" />\n                    <div className=\"flex-1 text-center sm:text-right\">\n                      <h3 className=\"text-xl font-bold mb-1\">{item.name_ar}</h3>\n                      <p className=\"text-gray-400 text-sm mb-4\">{item.category}</p>\n                      <div className=\"flex items-center justify-center sm:justify-start gap-4\">\n                         <div className=\"flex items-center bg-white/5 rounded-xl border border-white/10 p-1\">\n                            <button onClick={() => updateQuantity(item.id, -1)} className=\"p-2 hover:text-violet-400\"><Minus size={16}/></button>\n                            <span className=\"w-10 text-center font-bold\">{item.quantity}</span>\n                            <button onClick={() => updateQuantity(item.id, 1)} className=\"p-2 hover:text-violet-400\"><Plus size={16}/></button>\n                         </div>\n                         <button onClick={() => removeItem(item.id)} className=\"text-red-500/50 hover:text-red-500 p-2 transition-colors\">\n                            <Trash2 size={20} />\n                         </button>\n                      </div>\n                    </div>\n                    <div className=\"text-2xl font-black text-white\">\n                      ${(item.price * item.quantity).toFixed(2)}\n                    </div>\n                  </div>\n                ))}\n              </div>\n\n              {/* Summary */}\n              <div className=\"lg:col-span-1\">\n                <div className={`${ui.card} sticky top-28 bg-violet-600/5 border-violet-500/20`}>\n                  <h3 className=\"text-2xl font-bold mb-8\">ملخص الطلب</h3>\n                  <div className=\"space-y-4 mb-8\">\n                    <div className=\"flex justify-between text-gray-400\">\n                      <span>الإجمالي الفرعي</span>\n                      <span>${total.toFixed(2)}</span>\n                    </div>\n                    <div className=\"flex justify-between text-gray-400\">\n                      <span>الضريبة (0%)</span>\n                      <span>$0.00</span>\n                    </div>\n                    <div className=\"pt-4 border-t border-white/10 flex justify-between text-2xl font-black text-white\">\n                      <span>الإجمالي</span>\n                      <span>${total.toFixed(2)}</span>\n                    </div>\n                  </div>\n                  <button className={`${ui.btnPrimary} w-full`}>\n                    إتمام الشراء\n                    <CreditCard size={20} className=\"mr-2\" />\n                  </button>\n                  <p className=\"text-center text-xs text-gray-500 mt-6\">\n                    الدفع آمن ومحمي بأعلى معايير التشفير (SSL)\n                  </p>\n                </div>\n              </div>\n            </div>\n          )}\n        </div>\n      </section>\n    </div>\n  );\n};\n\nexport default Cart;\n","/pages/Auth.jsx":"import React, { useState } from \"react\";\nimport { ui } from \"../lib/theme\";\nimport { Mail, Lock, User, Github, Loader2 } from \"lucide-react\";\nimport { useNavigate } from \"react-router-dom\";\n\nconst Auth = () => {\n  const [isLogin, setIsLogin] = useState(true);\n  const [loading, setLoading] = useState(false);\n  const [formData, setFormData] = useState({ email: \"\", password: \"\", name: \"\" });\n  const navigate = useNavigate();\n\n  const handleAuth = async (e) => {\n    e.preventDefault();\n    setLoading(true);\n    \n    // Simulating Auth for this agent environment \n    // In real app: await window.supabase.auth.signInWithPassword/signUp\n    setTimeout(() => {\n      setLoading(false);\n      navigate(\"/account\");\n    }, 1500);\n  };\n\n  return (\n    <div className=\"pt-24 min-h-screen flex items-center justify-center p-4\">\n      <div className=\"absolute inset-0 z-0 overflow-hidden\">\n        <div className=\"absolute top-1/4 left-1/4 w-[400px] h-[400px] bg-violet-600/10 blur-[100px] rounded-full\" />\n        <div className=\"absolute bottom-1/4 right-1/4 w-[400px] h-[400px] bg-fuchsia-600/10 blur-[100px] rounded-full\" />\n      </div>\n\n      <div className={`${ui.card} w-full max-w-md relative z-10`}>\n        <div className=\"text-center mb-10\">\n          <h2 className={ui.h3}>{isLogin ? \"تسجيل الدخول\" : \"إنشاء حساب جديد\"}</h2>\n          <p className=\"text-gray-400 mt-2\">انضم إلى مجتمع مهندسي الذكاء الاصطناعي</p>\n        </div>\n\n        <form onSubmit={handleAuth} className=\"space-y-6\">\n          {!isLogin && (\n            <div className=\"space-y-2\">\n              <label className=\"text-sm font-medium text-gray-400 px-1\">الاسم الكامل</label>\n              <div className=\"relative\">\n                <User className=\"absolute left-4 top-1/2 -translate-y-1/2 text-gray-500\" size={20} />\n                <input\n                  type=\"text\"\n                  required\n                  placeholder=\"محمد أحمد\"\n                  className={ui.input + \" pl-12\"}\n                  onChange={(e) => setFormData({...formData, name: e.target.value})}\n                />\n              </div>\n            </div>\n          )}\n\n          <div className=\"space-y-2\">\n            <label className=\"text-sm font-medium text-gray-400 px-1\">البريد الإلكتروني</label>\n            <div className=\"relative\">\n              <Mail className=\"absolute left-4 top-1/2 -translate-y-1/2 text-gray-500\" size={20} />\n              <input\n                type=\"email\"\n                required\n                placeholder=\"name@example.com\"\n                className={ui.input + \" pl-12\"}\n                onChange={(e) => setFormData({...formData, email: e.target.value})}\n              />\n            </div>\n          </div>\n\n          <div className=\"space-y-2\">\n            <label className=\"text-sm font-medium text-gray-400 px-1 flex justify-between\">\n              كلمة المرور\n              {isLogin && <button type=\"button\" className=\"text-violet-400 hover:underline text-xs\">نسيت كلمة المرور؟</button>}\n            </label>\n            <div className=\"relative\">\n              <Lock className=\"absolute left-4 top-1/2 -translate-y-1/2 text-gray-500\" size={20} />\n              <input\n                type=\"password\"\n                required\n                placeholder=\"••••••••\"\n                className={ui.input + \" pl-12\"}\n                onChange={(e) => setFormData({...formData, password: e.target.value})}\n              />\n            </div>\n          </div>\n\n          <button disabled={loading} className={ui.btnPrimary + \" w-full mt-4 h-14\"}>\n            {loading ? <Loader2 className=\"animate-spin\" /> : (isLogin ? \"دخول\" : \"إنشاء حساب\")}\n          </button>\n        </form>\n\n        <div className=\"mt-8 relative\">\n          <div className=\"absolute inset-0 flex items-center\"><div className=\"w-full border-t border-white/10\"></div></div>\n          <div className=\"relative flex justify-center text-xs uppercase\"><span className=\"bg-zinc-950 px-2 text-gray-500 font-medium\">أو أكمل بواسطة</span></div>\n        </div>\n\n        <div className=\"mt-6 flex gap-4\">\n          <button className=\"flex-1 bg-white/[0.03] border border-white/10 p-3 rounded-2xl hover:bg-white/10 transition-colors flex items-center justify-center gap-2\">\n            <Github size={20} />\n            Github\n          </button>\n          <button className=\"flex-1 bg-white/[0.03] border border-white/10 p-3 rounded-2xl hover:bg-white/10 transition-colors flex items-center justify-center gap-2 font-bold text-lg\">\n            G\n          </button>\n        </div>\n\n        <p className=\"mt-10 text-center text-gray-400 text-sm\">\n          {isLogin ? \"ليس لديك حساب؟\" : \"لديك حساب بالفعل؟\"}\n          <button \n            onClick={() => setIsLogin(!isLogin)}\n            className=\"text-violet-400 hover:underline font-bold mr-2\"\n          >\n            {isLogin ? \"سجل الآن\" : \"سجل دخولك\"}\n          </button>\n        </p>\n      </div>\n    </div>\n  );\n};\n\nexport default Auth;\n","/pages/Account.jsx":"import React from \"react\";\nimport { ui } from \"../lib/theme\";\nimport { User, Shield, Package, Settings, LogOut, ExternalLink } from \"lucide-react\";\nimport { useNavigate } from \"react-router-dom\";\n\nconst Account = () => {\n  const navigate = useNavigate();\n\n  const handleLogout = () => {\n    // In real app: await window.supabase.auth.signOut()\n    navigate(\"/auth\");\n  };\n\n  return (\n    <div className=\"pt-24 min-h-screen\">\n      <section className={ui.section}>\n        <div className={ui.container}>\n          <div className=\"flex flex-col md:flex-row gap-12\">\n            {/* Sidebar */}\n            <aside className=\"w-full md:w-80 space-y-4\">\n              <div className={`${ui.card} text-center`}>\n                <div className=\"w-24 h-24 bg-gradient-to-br from-violet-600 to-fuchsia-600 rounded-full flex items-center justify-center text-4xl mb-4 mx-auto border-4 border-black shadow-glow\">\n                  H\n                </div>\n                <h3 className=\"text-xl font-bold\">زائر متألق</h3>\n                <p className=\"text-gray-500 text-sm mb-6\">عضو منذ 2024</p>\n                <div className=\"flex justify-center gap-4\">\n                  <div className=\"text-center\">\n                    <div className=\"font-bold\">0</div>\n                    <div className=\"text-[10px] text-gray-500 uppercase tracking-widest\">طلبات</div>\n                  </div>\n                  <div className=\"w-px h-8 bg-white/10\" />\n                  <div className=\"text-center\">\n                    <div className=\"font-bold\">0</div>\n                    <div className=\"text-[10px] text-gray-500 uppercase tracking-widest\">تحميلات</div>\n                  </div>\n                </div>\n              </div>\n\n              <nav className={`${ui.card} p-2`}>\n                <button className=\"w-full flex items-center gap-3 p-4 rounded-2xl bg-violet-600/10 text-violet-400 font-bold transition-all\">\n                  <User size={20} /> الملف الشخصي\n                </button>\n                <button className=\"w-full flex items-center gap-3 p-4 rounded-2xl text-gray-400 hover:bg-white/5 transition-all\">\n                  <Package size={20} /> طلباتي الرقمية\n                </button>\n                <button className=\"w-full flex items-center gap-3 p-4 rounded-2xl text-gray-400 hover:bg-white/5 transition-all\">\n                  <Shield size={20} /> الأمان\n                </button>\n                <button className=\"w-full flex items-center gap-3 p-4 rounded-2xl text-gray-400 hover:bg-white/5 transition-all\">\n                  <Settings size={20} /> الإعدادات\n                </button>\n                <div className=\"h-px bg-white/10 my-2\" />\n                <button \n                  onClick={handleLogout}\n                  className=\"w-full flex items-center gap-3 p-4 rounded-2xl text-red-500 hover:bg-red-500/10 transition-all\"\n                >\n                  <LogOut size={20} /> تسجيل الخروج\n                </button>\n              </nav>\n            </aside>\n\n            {/* Main Content */}\n            <main className=\"flex-1 space-y-8\">\n               <div className={ui.card}>\n                 <h2 className=\"text-2xl font-bold mb-8\">تفاصيل الحساب</h2>\n                 <div className=\"grid sm:grid-cols-2 gap-8\">\n                   <div className=\"space-y-4\">\n                      <label className=\"text-sm text-gray-500 block\">الاسم بالكامل</label>\n                      <input type=\"text\" defaultValue=\"زائر متحمس\" className={ui.input} />\n                   </div>\n                   <div className=\"space-y-4\">\n                      <label className=\"text-sm text-gray-500 block\">البريد الإلكتروني</label>\n                      <input type=\"email\" defaultValue=\"visitor@example.com\" className={ui.input} />\n                   </div>\n                 </div>\n                 <button className={ui.btnPrimary + \" mt-8\"}>حفظ التعديلات</button>\n               </div>\n\n               <div className={ui.card}>\n                 <div className=\"flex justify-between items-center mb-8\">\n                    <h2 className=\"text-2xl font-bold\">المنتجات التي تمتلكها</h2>\n                    <Link to=\"/store\" className=\"text-violet-400 flex items-center gap-2 hover:underline\">\n                      زيارة المتجر <ExternalLink size={16} />\n                    </Link>\n                 </div>\n                 \n                 <div className=\"text-center py-20 bg-white/[0.01] rounded-2xl border border-dashed border-white/5\">\n                    <p className=\"text-gray-500 italic\">لم تقم بشراء أي منتج رقمي بعد.</p>\n                 </div>\n               </div>\n            </main>\n          </div>\n        </div>\n      </section>\n    </div>\n  );\n};\n\nexport default Account;\n","/pages/Support.jsx":"import React, { useState, useEffect, useRef } from \"react\";\nimport { ui } from \"../lib/theme\";\nimport { Send, Bot, User, Sparkles, Loader2 } from \"lucide-react\";\n\nconst Support = () => {\n  const [messages, setMessages] = useState([\n    { role: \"assistant\", content: \"أهلاً بك! أنا المساعد الذكي لحمزة الجزايري. كيف يمكنني مساعدتك في مجال الذكاء الاصطناعي أو منتجاتنا الرقمية اليوم؟\" }\n  ]);\n  const [input, setInput] = useState(\"\");\n  const [loading, setLoading] = useState(false);\n  const scrollRef = useRef(null);\n\n  useEffect(() => {\n    if (scrollRef.current) {\n      scrollRef.current.scrollTop = scrollRef.current.scrollHeight;\n    }\n  }, [messages]);\n\n  const handleSend = async (e) => {\n    e.preventDefault();\n    if (!input.trim() || loading) return;\n\n    const userMsg = { role: \"user\", content: input };\n    setMessages(prev => [...prev, userMsg]);\n    setInput(\"\");\n    setLoading(true);\n\n    try {\n      const response = await fetch(\"/api/proxy/lemondata/v1/chat/completions\", {\n        method: \"POST\",\n        headers: {\n          \"Content-Type\": \"application/json\",\n          \"Authorization\": `Bearer sk-mxr7hvA0iwxgxRQfXB6QUXGRINYX7dl0Y8dNyr2S2b499e6W`\n        },\n        body: JSON.stringify({\n          model: \"gpt-3.5-turbo\",\n          messages: [\n            { \n                role: \"system\", \n                content: \"أنت مساعد ذكي لموقع حمزة الجزايري (Hamza Elgzairy). حمزة مهندس AI في Megsy AI. الموقع يبيع منتجات رقمية (Prompt packs, Courses, Scripts). كن ودوداً، مهنياً، ومختصراً. دائماً تحدث بالعربية بلهجة مصرية مهذبة أو فصحى بسيطة.\" \n            },\n            ...messages.slice(-5), // Send last 5 context\n            userMsg\n          ]\n        })\n      });\n\n      const data = await response.json();\n      const aiReply = data.choices[0].message.content;\n      setMessages(prev => [...prev, { role: \"assistant\", content: aiReply }]);\n    } catch (err) {\n      setMessages(prev => [...prev, { role: \"assistant\", content: \"عذراً، حدث خطأ في الاتصال. برجاء المحاولة لاحقاً.\" }]);\n    } finally {\n      setLoading(false);\n    }\n  };\n\n  return (\n    <div className=\"pt-24 min-h-screen bg-black\">\n      <section className={ui.section}>\n        <div className={ui.container}>\n          <div className=\"max-w-4xl mx-auto\">\n            <div className=\"text-center mb-12\">\n                <div className=\"inline-block p-4 rounded-3xl bg-violet-600/10 border border-violet-600/20 text-violet-400 mb-6\">\n                    <Bot size={48} />\n                </div>\n                <h1 className={ui.h2}>دعم <span className={ui.gradientText}>ذكي مباشر</span></h1>\n                <p className=\"text-gray-400\">تحدث مع وكيل الذكاء الاصطناعي الخاص بي للحصول على إجابات فورية حول الخدمات والمنتجات.</p>\n            </div>\n\n            <div className=\"bg-zinc-900/50 border border-white/10 rounded-[2.5rem] overflow-hidden flex flex-col h-[600px] shadow-2xl backdrop-blur-xl\">\n              {/* Messages Area */}\n              <div ref={scrollRef} className=\"flex-1 overflow-y-auto p-6 space-y-6\">\n                {messages.map((m, i) => (\n                  <div key={i} className={`flex ${m.role === \"user\" ? \"justify-start\" :           if (!source || !isLocal(source) || !path.node.specifiers.length) return;
          const ns = path.scope.generateUidIdentifier('webly_reexport');
          const replacements = [t.importDeclaration([t.importNamespaceSpecifier(ns)], t.stringLiteral(source))];
          const exportSpecs = [];
          for (const spec of path.node.specifiers) {
            const imported = spec.local && (spec.local.name || spec.local.value);
            if (!imported) continue;
            const local = path.scope.generateUidIdentifierBasedOnNode(spec.exported);
            replacements.push(t.variableDeclaration('const', [
              t.variableDeclarator(local, pickCall(ns, imported)),
            ]));
            exportSpecs.push(t.exportSpecifier(local, spec.exported));
          }
          if (exportSpecs.length) replacements.push(t.exportNamedDeclaration(null, exportSpecs));
          path.replaceWithMultiple(replacements);
        },
      }};
    };
  }

  function transformJs(code, path) {
    const presets = [['react', { runtime: 'classic' }]];
    if (/\.tsx?$/.test(path)) presets.push(['typescript', { allExtensions: true, isTSX: true }]);
    const helperName = '__webly_pick_' + Math.random().toString(36).slice(2, 8);
    const transformed = Babel.transform(code, {
      presets,
      plugins: [noDefaultExternalImportPlugin, safeReactRouterPlugin, localNamedImportFallbackPlugin(path, helperName)],
      filename: path,
      sourceType: 'module',
    }).code;
    return [
      'const ' + helperName + '_noop = function(){};',
      'const ' + helperName + '_wrapHook = function(fn){',
      '  if (typeof fn !== "function") return fn;',
      '  return function(){',
      '    try {',
      '      const r = fn.apply(this, arguments);',
      '      if (r === undefined || r === null) return ' + helperName + '_noop;',
      '      if (typeof r === "object") {',
      '        return new Proxy(r, { get: function(t, k){ const v = t[k]; return v === undefined ? ' + helperName + '_noop : v; } });',
      '      }',
      '      return r;',
      '    } catch (_e) { return ' + helperName + '_noop; }',
      '  };',
      '};',
      'const ' + helperName + ' = function(mod, name){',
      '  if (mod && Object.prototype.hasOwnProperty.call(mod, name) && mod[name] !== undefined) return mod[name];',
      '  if (mod && name in Object(mod) && mod[name] !== undefined) return mod[name];',
      '  const d = mod && mod.default;',
      '  if (d && (typeof d === "object" || typeof d === "function") && name in Object(d) && d[name] !== undefined) return d[name];',
      // Last-resort fallback: if default is callable (likely a hook), wrap it so missing selector results become safe.
      '  if (typeof d === "function") return ' + helperName + '_wrapHook(d);',
      '  if (d !== undefined && d !== null) return d;',
      '  return undefined;',
      '};',
      transformed,
    ].join('\n');
  }

  function hasDirectNamedExport(code, exportName, path) {
    let found = false;
    try {
      Babel.transform(code, {
        filename: path,
        sourceType: 'module',
        plugins: [function(babel){
          const t = babel.types;
          return { visitor: {
            ExportNamedDeclaration(p) {
              const node = p.node;
              if (node.declaration) {
                const decl = node.declaration;
                if ((t.isFunctionDeclaration(decl) || t.isClassDeclaration(decl)) && decl.id && decl.id.name === exportName) found = true;
                if (t.isVariableDeclaration(decl)) {
                  for (const d of decl.declarations) if (t.isIdentifier(d.id) && d.id.name === exportName) found = true;
                }
              }
              for (const s of node.specifiers || []) {
                const exported = s.exported && (s.exported.name || s.exported.value);
                if (exported === exportName) found = true;
              }
            },
          }};
        }],
      });
    } catch (_) {
      return code.indexOf('export') !== -1 && code.indexOf(exportName) !== -1;
    }
    return found;
  }

  // CSS imports → JS module that injects a <style> tag and exports {}
  function makeCssModule(cssText, path) {
    const safe = JSON.stringify(cssText);
    return [
      "const __css = " + safe + ";",
      "const __style = document.createElement('style');",
      "__style.setAttribute('data-webly-css', " + JSON.stringify(path) + ");",
      "__style.textContent = __css;",
      "document.head.appendChild(__style);",
      "export default __css;",
    ].join('\n');
  }

  // Match import / export-from / dynamic import statements (handles single + double quotes)
  const IMPORT_RE = /(\bimport\s+(?:[\w*\s{},$]+\s+from\s+)?|\bexport\s+\*\s+from\s+|\bexport\s+\{[^}]*\}\s+from\s+|\bimport\s*\(\s*)(["'])([^"']+)(\2)/g;

  // Pull named bindings out of an import/export-from prefix like 'import Foo, { a, b as c } from '
  function extractNamedBindings(prefix) {
    const out = [];
    const braceMatch = prefix && prefix.match(/\{([^}]*)\}/);
    if (braceMatch) {
      for (const part of braceMatch[1].split(',')) {
        const seg = part.trim();
        if (!seg) continue;
        const name = seg.split(/\s+as\s+/i)[0].trim();
        if (name && name !== 'default' && /^[A-Za-z_$][A-Za-z0-9_$]*$/.test(name)) out.push(name);
      }
    }
    return out;
  }

  // Track which named bindings each local module must expose so we can
  // backfill missing ones from the default export instead of crashing.
  const requiredExports = Object.create(null);
  function noteRequired(modulePath, names) {
    if (!names.length) return;
    if (!requiredExports[modulePath]) requiredExports[modulePath] = new Set();
    for (const n of names) requiredExports[modulePath].add(n);
  }

  async function loadModule(path) {
    if (moduleCache[path]) return moduleCache[path];
    const src = FILES[path];
    if (src === undefined) throw new Error('Module not found: ' + path);

    let code;
    if (path.endsWith('.css')) {
      code = makeCssModule(src, path);
    } else {
      code = transformJs(src, path);

      // Find every relative dep and pre-load it (also note named bindings consumers want)
      const deps = [];
      let m;
      const re = new RegExp(IMPORT_RE.source, 'g');
      while ((m = re.exec(code)) !== null) {
        const prefix = m[1];
        const spec = m[3];
        const resolved = resolvePath(path, spec);
        if (resolved) {
          deps.push({ spec, resolved });
          noteRequired(resolved, extractNamedBindings(prefix));
        }
      }
      const depUrls = {};
      for (const d of deps) {
        depUrls[d.spec] = await loadModule(d.resolved);
      }
      const re2 = new RegExp(IMPORT_RE.source, 'g');
      code = code.replace(re2, function(_full, prefix, q, spec, q2){
        if (depUrls[spec]) return prefix + q + depUrls[spec] + q2;
        return _full;
      });

      // Shim 1: ensure a default export exists so 'import X from "./mod"' never fails.
      const hasDefault = /export\s+default\b/.test(code)
        || /export\s*\{[^}]*\bdefault\b[^}]*\}/.test(code)
        || /export\s*\{[^}]*\bas\s+default\b[^}]*\}/.test(code);
      if (!hasDefault) {
        code += "\n;export default {};\n";
      }

      // Named local imports are converted to namespace imports above, so we no
      // longer mutate a module's export table here. Mutating exports caused hard
      // browser syntax errors like "Duplicate export of 'seedProducts'".
    }

    const blob = new Blob([code], { type: 'text/javascript' });
    const url = URL.createObjectURL(blob);
    moduleCache[path] = url;
    return url;
  }

  // Pre-pass: scan every file's raw source so that requiredExports is fully
  // populated BEFORE any module is transformed/cached. Without this, a module
  // loaded earlier than one of its consumers wouldn't get the backfill.
  function prescanRequiredExports() {
    for (const filePath of Object.keys(FILES)) {
      if (!/\.(jsx?|tsx?)$/.test(filePath)) continue;
      const code = FILES[filePath];
      const re = new RegExp(IMPORT_RE.source, 'g');
      let m;
      while ((m = re.exec(code)) !== null) {
        const prefix = m[1];
        const spec = m[3];
        const resolved = resolvePath(filePath, spec);
        if (resolved) noteRequired(resolved, extractNamedBindings(prefix));
      }
    }
  }

  (async () => {
    try {
      prescanRequiredExports();
      const entryUrl = await loadModule(ENTRY);
      await import(entryUrl);
    } catch (err) {
      console.error('[Webly]', err);
      const msg = (err && err.stack) ? err.stack : String(err);
      document.getElementById('root').innerHTML =
        '<div style="padding:24px;font-family:ui-monospace,monospace;direction:ltr;text-align:left;min-height:100vh;background:#0f172a">' +
        '<h2 style="color:#f87171;margin:0 0 12px">Webly Runtime Error</h2>' +
        '<pre style="white-space:pre-wrap;color:#fecaca;background:#1e293b;padding:16px;border-radius:8px;border:1px solid #b91c1c;font-size:13px">' +
        msg.replace(/[&<>]/g, function(c){ return ({ '&':'&amp;','<':'&lt;','>':'&gt;' })[c]; }) +
        '</pre></div>';
    }
  })();
</script>
</body>
</html>
