  (function(){
    function buildQuery(table){
      const filters = [];
      const state = { order: null, limit: null, single: false, range: null };

      api.neq     = function(col, val){ filters.push({ op:'neq', col, val }); return clone(); };
      api.gt      = function(col, val){ filters.push({ op:'gt', col, val }); return clone(); };
      api.gte     = function(col, val){ filters.push({ op:'gte', col, val }); return clone(); };
      api.lt      = function(col, val){ filters.push({ op:'lt', col, val }); return clone(); };

      api.ilike   = function(col, val){ filters.push({ op:'ilike', col, val }); return clone(); };

olet-600/20 blur-[120px] rounded-full\" />\n          <div className=\"absolute bottom-1/4 -left-20 w-[500px] h-[500px] bg-fuchsia-600/20 blur-[120px] rounded-full\" />\n        </div>\n\n        <div className={ui.container + \" relative z-10 px-4\"}>\n          <div className=\"grid lg:grid-cols-2 gap-16 items-center\">\n            <motion.div \n              initial={{ opacity: 0, x: 50 }}\n              animate={{ opacity: 1, x: 0 }}\n              transition={{ duration: 0.8 }}\n              className=\"text-right\"\n            >\n              <div className=\"inline-flex items-center gap-2 px-4 py-2 rounded-full bg-white/5 border border-white/10 mb-8\">\n                <span className=\"w-2 h-2 rounded-full bg-emerald-500 animate-pulse\" />\n                <span className=\"text-sm font-bold text-white/70 tracking-wide uppercase\">AI Engineer @ Megsy AI</span>\n              </div>\n              <h1 className={ui.h1 + \" mb-8\"}>\n                نصنع المستقبل <br /> \n                <span className={ui.gradientText}>بالذكاء الاصطناعي</span>\n              </h1>\n              <p className=\"text-xl text-white/60 mb-10 leading-relaxed max-w-2xl\">\n                أنا حمزة الجزايري، مطور أنظمة ذكاء اصطناعي في منصة Megsy AI. أساعد الشركات والأفراد على تسخير قوة الـ Generative AI لتحقيق قفزات نوعية في الإنتاجية والابتكار.\n              </p>\n              <div className=\"flex flex-wrap gap-4 justify-end\">\n                <Link to=\"/store\" className={ui.btnPrimary + \" text-lg px-8 py-4\"}>\n                  استكشف المتجر الرقمي\n                  <ArrowLeft size={20} />\n                </Link>\n                <Link to=\"/projects\" className={ui.btnGhost + \" text-lg px-8 py-4\"}>\n                  رؤية أعمالي\n                </Link>\n              </div>\n            </motion.div>\n\n            <motion.div \n              initial={{ opacity: 0, scale: 0.8 }}\n              animate={{ opacity: 1, scale: 1 }}\n              transition={{ duration: 0.8, delay: 0.2 }}\n              className=\"relative\"\n            >\n              <div className=\"relative z-10 rounded-[40px] overflow-hidden border border-white/10 bg-zinc-900 shadow-2xl\">\n                <img \n                  src=\"https://images.pexels.com/photos/373543/pexels-photo-373543.jpeg?auto=compress&cs=tinysrgb&w=1260&h=750&dpr=2\" \n                  alt=\"Hamza Hassan\"\n                  className=\"w-full aspect-[4/5] object-cover grayscale hover:grayscale-0 transition-all duration-700 mx-auto\"\n                />\n              </div>\n              <div className=\"absolute -bottom-10 -right-10 z-20 hidden sm:block\">\n                <div className={ui.card + \" flex items-center gap-4 bg-black/80 ring-1 ring-white/20\"}>\n                  <div className=\"w-12 h-12 bg-emerald-500/20 rounded-full flex items-center justify-center\">\n                    <Zap className=\"text-emerald-400\" />\n                  </div>\n                  <div>\n                    <div className=\"text-white font-bold\">نشط الآن</div>\n                    <div className=\"text-white/50 text-xs\">يعمل على Megsy v2.0</div>\n                  </div>\n                </div>\n              </div>\n            </motion.div>\n          </div>\n        </div>\n      </section>\n\n      {/* Stats */}\n      <section className=\"py-20 border-y border-white/5\">\n        <div className={ui.container + \" px-4\"}>\n          <div className=\"grid grid-cols-2 lg:grid-cols-4 gap-6\">\n            <StatCard icon={Star} label=\"تقييم العملاء\" value=\"+4.9\" />\n            <StatCard icon={Users} label=\"مستخدم نشط\" value=\"+250K\" />\n            <StatCard icon={Briefcase} label=\"مشروع ناجح\" value=\"+150\" />\n            <StatCard icon={Rocket} label=\"سنة خبرة\" value=\"+5\" />\n          </div>\n        </div>\n      </section>\n\n      {/* Features */}\n      <section className={ui.section}>\n        <div className={ui.container}>\n          <div className=\"text-center mb-20\">\n            <h2 className={ui.h2 + \" mb-6\"}>لماذا تختار <span className={ui.gradientText}>Megsy AI</span>؟</h2>\n            <p className=\"text-white/50 max-w-2xl mx-auto\">\n              تكنولوجيا متطورة مصممة خصيصاً لتلبية احتياجات السوق العربي الرقمي، مع دقة متناهية في الفهم والتنفيذ.\n            </p>\n          </div>\n\n          <div className=\"grid md:grid-cols-2 lg:grid-cols-3 gap-12 text-right\" dir=\"rtl\">\n            <Feature \n              icon={Cpu}\n              title=\"محركات معالجة فائقة\"\n              desc=\"نستخدم أحدث بوارج الـ LLM مع تحسينات خاصة للغة العربية للهجاتها المختلفة لضمان أدق النتائج.\"\n            />\n            <Feature \n              icon={Shield}\n              title=\"خصوصية وأمان تام\"\n              desc=\"بياناتك مشفرة بالكامل. نحن في Megsy نؤمن بأن الخصوصية هي حق أساسي وليست مجرد ميزة تقنية.\"\n            />\n            <Feature \n              icon={Zap}\n              title=\"سرعة استجابة مذهلة\"\n              desc=\"أنظمتنا مصممة للعمل في الوقت الحقيقي (Real-time) لتوفر لك وقتك الثمين وتزيد من إنتاجيتك.\"\n            />\n          </div>\n        </div>\n      </section>\n\n      {/* CTA */}\n      <section className=\"pb-32 px-4\">\n        <div className={ui.container + \" relative overflow-hidden rounded-[40px] bg-gradient-to-br from-violet-600 to-fuchsia-700 p-12 lg:p-20 text-center\"}>\n          <div className=\"absolute inset-0 bg-[url('https://www.transparenttextures.com/patterns/carbon-fibre.png')] opacity-20\" />\n          <h2 className=\"text-4xl md:text-6xl font-black text-white mb-8 relative z-10\">هل أنت مستعد لبناء مشروعك القادم؟</h2>\n          <p className=\"text-white/80 text-xl mb-12 max-w-2xl mx-auto relative z-10 leading-relaxed\">\n            انضم إلى آلاف المحترفين الذين يستخدمون أدواتنا ومنتجاتنا يومياً لتطوير أعمالهم بالذكاء الاصطناعي.\n          </p>\n          <div className=\"flex flex-col sm:flex-row gap-6 justify-center relative z-10\">\n            <Link to=\"/auth\" className=\"px-12 py-4 bg-white text-violet-600 font-bold rounded-full text-xl hover:shadow-[0_20px_60px_-10px_rgba(255,255,255,0.4)] transition-all\">\n              سجل مجاناً\n            </Link>\n            <Link to=\"/support\" className=\"px-12 py-4 bg-white/10 backdrop-blur-md text-white border border-white/20 font-bold rounded-full text-xl hover:bg-white/20 transition-all\">\n              تحدث مع المساعد الذكي\n            </Link>\n          </div>\n        </div>\n      </section>\n    </div>\n  );\n}\n","/lib/supabase.js":"import { createClient } from '@supabase/supabase-js';\n\nconst supabaseUrl = window.__SUPABASE_URL__;\nconst supabaseAnonKey = window.__SUPABASE_ANON_KEY__;\n\nexport const supabase = createClient(supabaseUrl, supabaseAnonKey);\n","/pages/NotFound.jsx":"import React from 'react';\nimport { ui } from '../lib/theme';\nimport { ArrowLeft } from 'lucide-react';\nimport { Link } from 'react-router-dom';\n\nexport default function NotFound() {\n  return (\n    <div className=\"min-h-screen flex items-center justify-center text-center px-4 bg-black\">\n      <div className=\"relative\">\n        <div className=\"absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[300px] h-[300px] bg-violet-600/20 blur-[100px] rounded-full -z-10\" />\n        <h1 className=\"text-[150px] font-black leading-none bg-gradient-to-b from-white/20 to-transparent bg-clip-text text-transparent mb-8\">\n          404\n        </h1>\n        <h2 className=\"text-4xl font-bold mb-6 italic\">الصفحة مفقودة في الفضاء الرقمي</h2>\n        <p className=\"text-white/50 mb-10 max-w-md mx-auto\">\n          يبدو أنك حاولت الوصول لعنوان غير موجود أو تم نقله. لا تقلق، ذكاؤنا الاصطناعي وجد لك طريقاً للعودة.\n        </p>\n        <Link to=\"/\" className={ui.btnPrimary + \" mx-auto\"}>\n          العودة للرئيسية\n          <ArrowLeft size={20} />\n        </Link>\n      </div>\n    </div>\n  );\n}\n","/pages/Store.jsx":"import React from 'react';\nimport { motion } from 'framer-motion';\nimport { ShoppingCart, Star, Sparkles, Zap, BookOpen, Terminal } from 'lucide-react';\nimport { ui } from '../lib/theme';\nimport { useCart } from '../lib/cart';\n\nconst products = [\n  {\n    id: 'p1',\n    name: 'حزمة إتقان Midjourney v6',\n    desc: 'أكثر من 500 برومبت احترافي لتوليد صور واقعية وفنية مذهلة مع شرح التقنيات المتقدمة.',\n    price: 99,\n    category: 'Prompts',\n    image: 'https://images.pexels.com/photos/17483874/pexels-photo-17483874.jpeg?auto=compress&cs=tinysrgb&w=800',\n    icon: Sparkles\n  },\n  {\n    id: 'p2',\n    name: 'كورس هندسة الأوامر (Prompt Engineering)',\n    desc: 'انتقل من مبتدئ إلى محترف في مخاطبة نماذج الذكاء الاصطناعي GPT-4 و Claude 3.',\n    price: 299,\n    category: 'Courses',\n    image: 'https://images.pexels.com/photos/17483868/pexels-photo-17483868.jpeg?auto=compress&cs=tinysrgb&w=800',\n    icon: BookOpen\n  },\n  {\n    id: 'p3',\n    name: 'قالب Megsy AI للشركات الناشئة',\n    desc: 'قالب React + Tailwind جاهز للربط مع OpenAI API لبناء SaaS ذكاء اصطناعي في دقائق.',\n    price: 450,\n    category: 'Templates',\n    image: 'https://images.pexels.com/photos/17483912/pexels-photo-17483912.jpeg?auto=compress&cs=tinysrgb&w=800',\n    icon: Terminal\n  },\n  {\n    id: 'p4',\n    name: 'دليل أتمتة الأعمال بـ Make & AI',\n    desc: 'تعلم كيف تربط أدواتك اليومية بالذكاء الاصطناعي لتوفر 20 ساعة عمل أسبوعياً.',\n    price: 150,\n    category: 'E-Books',\n    image: 'https://images.pexels.com/photos/8386440/pexels-photo-8386440.jpeg?auto=compress&cs=tinysrgb&w=800',\n    icon: Zap\n  },\n  {\n    id: 'p5',\n    name: 'مجموعة برومبتات كتابة المحتوى العربي',\n    desc: 'توليد مقالات، سكربتات يوتيوب، وبوستات سوشيال ميديا بلهجة طبيعية وجذابة.',\n    price: 75,\n    category: 'Prompts',\n    image: 'https://images.pexels.com/photos/7367/design-working-work-office.jpg?auto=compress&cs=tinysrgb&w=800',\n    icon: Star\n  },\n  {\n    id: 'p6',\n    name: 'استشارة تقنية خاصة (1 ساعة)',\n    desc: 'جلسة فيديو مباشرة مع حمزة الجزايري لمناقشة مشروعك أو تطوير مهاراتك في الـ AI.',\n    price: 600,\n    category: 'Consulting',\n    image: 'https://images.pexels.com/photos/3183150/pexels-photo-3183150.jpeg?auto=compress&cs=tinysrgb&w=800',\n    icon: Users\n  }\n];\n\nexport default function Store() {\n  const { addItem } = useCart();\n  const [activeTab, setActiveTab] = React.useState('All');\n  const categories = ['All', ...new Set(products.map(p => p.category))];\n\n  const filteredProducts = activeTab === 'All' \n    ? products \n    : products.filter(p => p.category === activeTab);\n\n  return (\n    <div className={ui.section + \" pt-32\"}>\n      <div className={ui.container}>\n        <div className=\"text-center mb-16\">\n          <h1 className={ui.h1 + \" mb-6\"}>\n            المتجر <span className={ui.gradientText}>الرقمي</span>\n          </h1>\n          <p className=\"text-white/50 max-w-2xl mx-auto text-lg leading-relaxed px-4\">\n            أدوات وبرامج تدريبية تم تصميمها بعناية لتمكينك من قيادة ثورة الذكاء الاصطناعي في مجالك. محتوى رقمي جاهز للتحميل المباشر.\n          </p>\n        </div>\n\n        {/* Categories Tab */}\n        <div className=\"flex flex-wrap justify-center gap-4 mb-16 overflow-x-auto px-4\">\n          {categories.map(cat => (\n            <button\n              key={cat}\n              onClick={() => setActiveTab(cat)}\n              className={`px-8 py-3 rounded-full font-bold transition-all border ${\n                activeTab === cat \n                ? 'bg-violet-600 border-violet-500 text-white shadow-[0_10px_30px_-5px_rgba(124,58,237,0.5)]' \n                : 'bg-white/5 border-white/10 text-white/50 hover:bg-white/10'\n              }`}\n            >\n              {cat === 'All' ? 'الكل' : cat}\n            </button>\n          ))}\n        </div>\n\n        {/* Products Grid */}\n        <div className=\"grid md:grid-cols-2 lg:grid-cols-3 gap-8 px-4\">\n          {filteredProducts.map((product, idx) => (\n            <motion.div\n              layout\n              initial={{ opacity: 0, y: 20 }}\n              animate={{ opacity: 1, y: 0 }}\n              transition={{ delay: idx * 0.1 }}\n              key={product.id}\n              className={ui.card + \" flex flex-col group h-full\"}\n            >\n              <div className=\"relative aspect-video rounded-2xl mb-6 overflow-hidden border border-white/10\">\n                <img \n                  src={product.image} \n                  alt={product.name} \n                  className=\"w-full h-full object-cover group-hover:scale-110 transition-transform duration-700\"\n                />\n                <div className=\"absolute top-4 left-4\">\n                  <span className=\"px-3 py-1 rounded-full bg-black/60 backdrop-blur-md border border-white/20 text-xs font-bold text-fuchsia-400\">\n                    {product.category}\n                  </span>\n                </div>\n              </div>\n\n              <div className=\"flex-grow\">\n                <div className=\"flex justify-between items-start mb-4\">\n                  <h3 className=\"text-2xl font-bold group-hover:text-violet-400 transition-colors\">{product.name}</h3>\n                  <div className=\"text-2xl font-black text-white\">{product.price} <span className=\"text-sm text-white/40\">ر.س</span></div>\n                </div>\n                <p className=\"text-white/50 leading-relaxed mb-8\">{product.desc}</p>\n              </div>\n\n              <button\n                onClick={() => {\n                  addItem(product);\n                  // Notification or feedback could go here\n                }}\n                className={ui.btnPrimary + \" w-full justify-center group/btn\"}\n              >\n                <span>إضافة للسلة</span>\n                <ShoppingCart size={18} className=\"group-hover/btn:translate-x-1 transition-transform\" />\n              </button>\n            </motion.div>\n          ))}\n        </div>\n      </div>\n    </div>\n  );\n}\n\nconst Users = ({size}) => <svg width={size} height={size} viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" strokeWidth=\"2\" strokeLinecap=\"round\" strokeLinejoin=\"round\" className=\"lucide lucide-users\"><path d=\"M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2\"/><circle cx=\"9\" cy=\"7\" r=\"4\"/><path d=\"M22 21v-2a4 4 0 0 0-3-3.87\"/><path d=\"M16 3.13a4 4 0 0 1 0 7.75\"/></svg>;\n","/components/DigitalProductCard.jsx":"import React from 'react';\nimport { ShoppingCart } from 'lucide-react';\nimport { ui } from '../lib/theme';\n\nconst DigitalProductCard = ({ product }) => {\n  // In a real app, you would use a global state (like Zustand/Redux) to handle adding to cart.\n  const handleAddToCart = () => {\n    console.log(`Added ${product.name_en} to cart.`);\n    // useCartStore.getState().addItem(product);\n  };\n\n  return (\n    <div className={`${ui.card} ${ui.cardHover} flex flex-col h-full`}>\n      <div className=\"aspect-video w-full overflow-hidden rounded-lg mb-4\">\n        <img src={product.image_url} alt={product.name_en} className=\"w-full h-full object-cover\" />\n      </div>\n      <div className=\"flex-grow\">\n          <p className=\"text-sm text-violet-400 font-medium mb-1\">{product.category}</p>\n          <h3 className=\"text-lg font-bold mb-2\">{product.name_en}</h3>\n          <p className=\"text-text-muted text-sm flex-grow mb-4\">{product.description_en}</p>\n      </div>\n      <div className=\"flex items-center justify-between mt-4\">\n        <span className=\"text-2xl font-bold text-white\">${product.price.toFixed(2)}</span>\n        <button onClick={handleAddToCart} className={`${ui.btnGhost} !px-4 !py-2`}>\n          <ShoppingCart size={18} />\n          <span className=\"hidden sm:inline\">Add to Cart</span>\n        </button>\n      </div>\n    </div>\n  );\n};\n\nexport default DigitalProductCard;","/pages/About.jsx":"import React from 'react';\nimport { ui } from '../lib/theme';\nimport { motion } from 'framer-motion';\nimport { Briefcase, Cpu, Code, Zap, Target } from 'lucide-react';\n\nconst About = () => {\n  const aboutImageUrl = 'https://images.pexels.com/photos/33433724/pexels-photo-33433724.jpeg?auto=compress&cs=tinysrgb&dpr=2&h=650&w=940';\n\n  return (\n    <div className={`${ui.section} ${ui.container}`}>\n      <motion.div \n        initial={{ opacity: 0, y: 20 }}\n        animate={{ opacity: 1, y: 0 }}\n        transition={{ duration: 0.5 }}\n        className=\"text-center max-w-3xl mx-auto mb-16 sm:mb-24\"\n      >\n        <h1 className={`${ui.h1} ${ui.gradientText} mb-4`}>About Me</h1>\n        <p className=\"text-lg sm:text-xl text-text-muted\">\n          An AI Engineer driven by a passion for building intelligent, scalable, and impactful solutions that shape the future.\n        </p>\n      </motion.div>\n\n      <div className=\"grid grid-cols-1 lg:grid-cols-5 gap-12 lg:gap-16 items-center\">\n        <motion.div \n          initial={{ opacity: 0, x: -50 }}\n          animate={{ opacity: 1, x: 0 }}\n          transition={{ duration: 0.7 }}\n          className=\"lg:col-span-2\"\n        >\n          <div className=\"aspect-square relative rounded-3xl overflow-hidden glass p-2\">\n             <img src={aboutImageUrl} alt=\"Hamza Hassan Elgzairy\" className=\"w-full h-full object-cover rounded-2xl\" />\n             <div className=\"absolute bottom-4 left-4 right-4 p-4 bg-black/50 backdrop-blur-md rounded-xl border border-white/10\">\n                <p className='font-bold text-lg'>Hamza H. Elgzairy</p>\n                <p className='text-sm text-violet-300'>AI Engineer @ Megsy AI</p>\n             </div>\n          </div>\n        </motion.div>\n        <motion.div \n          initial={{ opacity: 0, x: 50 }}\n          animate={{ opacity: 1, x: 0 }}\n          transition={{ duration: 0.7, delay: 0.2 }}\n          className=\"lg:col-span-3\"\n        >\n          <h2 className={`${ui.h2} mb-6`}>From Curiosity to Creation</h2>\n          <div className=\"space-y-6 text-text-muted text-lg leading-relaxed\">\n            <p>\n              My journey into the world of Artificial Intelligence began not in a classroom, but with a profound curiosity about how complex systems learn and adapt. This curiosity evolved into a dedicated career focused on the intersection of data, algorithms, and user experience. As an AI Engineer at <a href='https://megsy.ai' target='_blank' rel='noopener noreferrer' className='text-violet-400 font-semibold'>Megsy AI</a>, I am on the front lines, architecting and implementing the core intelligence that powers our next-generation platform.\n            </p>\n            <p>\n              I specialize in the full development lifecycle of AI systems—from conceptualization and data processing to model training, deployment, and integration into full-stack applications. My work is not just about writing code; it's about solving real-world problems and creating tangible value through technology.\n            </p>\n             <p>\n              I thrive in dynamic environments where innovation is constant. Whether it's fine-tuning a large language model, designing a scalable API for an AI service, or collaborating with a team to bring a complex feature to life, my goal is always to build products that are not only intelligent but also reliable and intuitive.\n            </p>\n          </div>\n        </motion.div>\n      </div>\n      \n      {/* Core Competencies Section */}\n    <div className=\"mt-24 sm:mt-32\">\n        <div className=\"text-center max-w-3xl mx-auto\">\n            <h2 className={`${ui.h2} mb-4`}>Core Competencies</h2>\n             <p className=\"text-lg text-text-muted\">\n             I leverage a diverse skill set to translate complex technical challenges into elegant solutions.\n            </p>\n        </div>\n        <div className=\"mt-16 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8\">\n            <div className={`${ui.card} text-center`}>\n                <Cpu size={32} className=\"mx-auto text-violet-400 mb-4\"/>\n                <h3 className='font-bold text-xl mb-2'>Machine Learning</h3>\n                <p className='text-text-muted text-sm'>Expert in Scikit-learn, TensorFlow, PyTorch. Experience with NLP, Computer Vision and predictive modeling.</p>\n            </div>\n            <div className={`${ui.card} text-center`}>\n                <Code size={32} className=\"mx-auto text-sky-400 mb-4\"/>\n                <h3 className='font-bold text-xl mb-2'>Backend Development</h3>\n                <p className='text-text-muted text-sm'>Building robust APIs and data pipelines using Python (FastAPI), Node.js, and integrating with databases like PostgreSQL and Supabase.</p>\n            </div>\n            <div className={`${ui.card} text-center`}>\n                <Zap size={32} className=\"mx-auto text-amber-400 mb-4\"/>\n                <h3 className='font-bold text-xl mb-2'>MLOps & Deployment</h3>\n                <p className='text-text-muted text-sm'>Proficient in containerization with Docker, CI/CD pipelines, and deploying scalable models on cloud platforms (AWS, GCP).</p>\n            </div>\n            <div className={`${ui.card} text-center`}>\n                <Target size={32} className=\"mx-auto text-fuchsia-400 mb-4\"/>\n                <h3 className='font-bold text-xl mb-2'>Product Strategy</h3>\n                <p className='text-text-muted text-sm'>Adept at aligning technical possibilities with business goals to deliver AI features that have a measurable market impact.</p>\n            </div>\n        </div>\n    </div>\n\n    </div>\n  );\n};\n\nexport default About;\n","/pages/ResetPassword.jsx":"import React from 'react';\nimport { ui } from '../lib/theme';\n\nconst ResetPassword = () => {\n  return (\n    <div className={`${ui.section} ${ui.container} flex items-center justify-center`}>\n      <div className={`${ui.card} w-full max-w-md`}>\n        <h2 className=\"text-2xl font-bold mb-4 text-center\">Reset Password</h2>\n        <p className=\"text-text-muted text-center mb-6\">Enter your email and we'll send you a link to reset your password.</p>\n        <form className=\"space-y-4\">\n          <div>\n            <label className=\"block text-sm font-medium mb-2\">Email Address</label>\n            <input type=\"email\" className=\"w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 focus:border-violet-500 outline-none\" placeholder=\"name@example.com\" />\n          </div>\n          <button type=\"button\" className={`${ui.btnPrimary} w-full justify-center mt-4`}>\n            Send Reset Link\n          </button>\n        </form>\n      </div>\n    </div>\n  );\n};\n\nexport default ResetPassword;\n","/pages/Projects.jsx":"import React from 'react';\nimport { ExternalLink, Github, Code, Sparkles, ArrowUpRight } from 'lucide-react';\nimport { ui } from '../lib/theme';\n\nconst works = [\n  {\n    title: 'Megsy AI Engine',\n    desc: 'المحرك الأساسي لبناء الوكلاء الأذكياء الذي يدير حالياً أكثر من 50,000 محادثة يومياً بدقة محتوى فائقة.',\n    tags: ['Next.js', 'PostgreSQL', 'OpenAI'],\n    image: 'https://images.pexels.com/photos/17483874/pexels-photo-17483874.png'\n  },\n  {\n    title: 'Prompt-Pro Architecture',\n    desc: 'نظام هيكلي لترجمة متطلبات العميل المعقدة إلى أوامر LLMs متقدمة مع نظام اختبار تلقائي.',\n    tags: ['Python', 'LangChain', 'RAG'],\n    image: 'https://images.pexels.com/photos/17483873/pexels-photo-17483873.png'\n  },\n  {\n    title: 'Visual AI Designer',\n    desc: 'أداة تعتمد على Stable Diffusion لتصميم واجهات المواقع بمجرد كتابة وصف بسيط للفكرة.',\n    tags: ['React', 'Diffusers', 'FastAPI'],\n    image: 'https://images.pexels.com/photos/17483868/pexels-photo-17483868.png'\n  }\n];\n\nexport default function Projects() {\n  return (\n    <div className={ui.section + \" min-h-screen pt-32\"}>\n      <div className={ui.container + \" px-4\"}>\n        <div className=\"max-w-3xl mb-24\">\n            <h1 className={ui.h1 + \" mb-8\"}>أعمالي في <br /> <span className={ui.gradientText}>عالم الـ AI</span></h1>\n            <p className=\"text-white/50 text-xl leading-relaxed\">\n                هنا استعرض بعض المشاريع التي أعمل عليها في Megsy AI بشكل خاص، وتجاربي المستمرة في هندسة اللغة وبناء الأنظمة المستقلة.\n            </p>\n        </div>\n\n        <div className=\"space-y-32 mb-20\">\n          {works.map((item, i) => (\n            <div key={i} className={`flex flex-col ${i % 2 === 0 ? 'lg:flex-row' : 'lg:flex-row-reverse'} gap-12 lg:gap-24 items-center`}>\n              <div className=\"flex-1 w-full group\">\n                <div className=\"relative rounded-[3rem] overflow-hidden border border-white/10 aspect-video\">\n                  <img src={item.image} alt={item.title} className=\"w-full h-full object-cover group-hover:scale-110 transition-transform duration-[1.5s]\" />\n                  <div className=\"absolute inset-0 bg-gradient-to-t from-black/80 via-transparent to-transparent opacity-0 group-hover:opacity-100 transition-opacity flex items-end p-12\">\n                     <button className={ui.btnPrimary}>\n                        شغال الآن\n                        <ExternalLink size={18} />\n                     </button>\n                  </div>\n                </div>\n              </div>\n              \n              <div className=\"flex-1 space-y-8\">\n                <div className=\"flex items-center gap-4\">\n                    <span className=\"w-12 h-12 rounded-2xl bg-violet-600/20 flex items-center justify-center text-violet-400\">\n                        <Code size={24} />\n                    </span>\n                    <h3 className=\"text-4xl font-black uppercase tracking-tighter\">{item.title}</h3>\n                </div>\n                \n                <p className=\"text-white/50 text-xl leading-relaxed\">\n                  {item.desc}\n                </p>\n\n                <div className=\"flex flex-wrap gap-3\">\n                  {item.tags.map(tag => (\n                    <span key={tag} className=\"px-5 py-2 rounded-full border border-white/10 bg-white/5 text-sm font-medium text-white/70\">\n                        {tag}\n                    </span>\n                  ))}\n                </div>\n\n                <div className=\"pt-8\">\n                    <button className=\"flex items-center gap-2 text-white font-bold group\">\n                        استكشاف تفاصيل المشروع\n                        <ArrowUpRight className=\"group-hover:translate-x-1 group-hover:-translate-y-1 transition-transform\" />\n                    </button>\n                </div>\n              </div>\n            </div>\n          ))}\n        </div>\n      </div>\n    </div>\n  );\n}","/pages/Cart.jsx":"import React from 'react';\nimport { ShoppingBag, ArrowLeft, Trash2, Plus, Minus, CreditCard } from 'lucide-react';\nimport { Link } from 'react-router-dom';\nimport { useCart } from '../lib/cart';\nimport { ui } from '../lib/theme';\n\nexport default function Cart() {\n  const { items, removeItem, updateQuantity, total } = useCart();\n  const cartTotal = total();\n\n  if (items.length === 0) {\n    return (\n      <div className={ui.section + \" min-h-[70vh] flex flex-center flex-col items-center justify-center text-center pt-40\"}>\n        <div className=\"w-24 h-24 bg-white/5 rounded-full flex items-center justify-center mb-8\">\n          <ShoppingBag size={48} className=\"text-white/20\" />\n        </div>\n        <h1 className=\"text-3xl font-bold mb-4\">سلة المشتريات فارغة</h1>\n        <p className=\"text-white/50 mb-10 max-w-sm\">يبدو أنك لم تضف أي منتج رقمي إلى سلتك بعد. استكشف متجرنا الآن!</p>\n        <Link to=\"/store\" className={ui.btnPrimary}>\n          الذهاب للمتجر\n          <ArrowLeft size={18} />\n        </Link>\n      </div>\n    );\n  }\n\n  return (\n    <div className={ui.section + \" pt-32\"}>\n      <div className={ui.container}>\n        <h1 className={ui.h2 + \" mb-12 text-center\"}>\n          سلة <span className={ui.gradientText}>المشتريات</span>\n        </h1>\n\n        <div className=\"grid lg:grid-cols-3 gap-12\">\n          {/* Items List */}\n          <div className=\"lg:col-span-2 flex flex-col gap-6\">\n            {items.map((item) => (\n              <div key={item.id} className={ui.card + \" flex items-center gap-6 group\"}>\n                <div className=\"w-24 h-24 rounded-2xl overflow-hidden flex-shrink-0 border border-white/10\">\n                  <img src={item.image} alt={item.name} className=\"w-full h-full object-cover\" />\n                </div>\n                \n                <div className=\"flex-grow\">\n                  <h3 className=\"text-xl font-bold mb-1\">{item.name}</h3>\n                  <div className=\"text-violet-400 font-bold mb-4\">{item.price} ر.س</div>\n                  \n                  <div className=\"flex items-center gap-4\">\n                    <div className=\"flex items-center gap-2 bg-white/5 rounded-full p-1 border border-white/10\">\n                      <button \n                        onClick={() => updateQuantity(item.id, item.quantity - 1)}\n                        className=\"p-1 px-3 hover:bg-white/10 rounded-full transition-colors\"\n                      >\n                        <Minus size={14} />\n                      </button>\n                      <span className=\"w-8 text-center font-bold\">{item.quantity}</span>\n                      <button \n                        onClick={() => updateQuantity(item.id, item.quantity + 1)}\n                        className=\"p-1 px-3 hover:bg-white/10 rounded-full transition-colors\"\n                      >\n                        <Plus size={14} />\n                      </button>\n                    </div>\n                  </div>\n                </div>\n\n                <button \n                  onClick={() => removeItem(item.id)}\n                  className=\"p-3 text-white/30 hover:text-red-400 hover:bg-red-400/10 rounded-2xl transition-all\"\n                >\n                  <Trash2 size={24} />\n                </button>\n              </div>\n            ))}\n          </div>\n\n          {/* Summary Card */}\n          <div className=\"lg:col-span-1\">\n            <div className={ui.card + \" sticky top-32\"}>\n              <h3 className=\"text-2xl font-bold mb-8 flex items-center gap-2\">\n                <CreditCard className=\"text-violet-400\" />\n                ملخص الطلب\n              </h3>\n              \n              <div className=\"flex flex-col gap-4 mb-8\">\n                <div className=\"flex justify-between text-white/60\">\n                  <span>المجموع الفرعي</span>\n                  <span>{cartTotal} ر.س</span>\n                </div>\n                <div className=\"flex justify-between text-white/60\">\n                  <span>ضريبة القيمة المضافة</span>\n                  <span>0 ر.س</span>\n                </div>\n                <div className=\"pt-4 border-t border-white/10 flex justify-between text-2xl font-black\">\n                  <span>الإجمالي العام</span>\n                  <span className={ui.gradientText}>{cartTotal} ر.س</span>\n                </div>\n              </div>\n\n              <button className={ui.btnPrimary + \" w-full py-4 text-xl justify-center\"}>\n                إتمام الدفع الآمن\n              </button>\n              \n              <p className=\"text-center text-white/40 text-sm mt-6\">\n                بمجرد الدفع، ستصلك روابط تحميل المحتوى الرقمي فوراً على إيميلك المسجل.\n              </p>\n            </div>\n          </div>\n        </div>\n      </div>\n    </div>\n  );\n}\n","/pages/Auth.jsx":"import React from 'react';\nimport { Mail, Lock, Sparkles, ArrowLeft, Github, Chrome } from 'lucide-react';\nimport { Link } from 'react-router-dom';\nimport { ui } from '../lib/theme';\n\nexport default function Auth() {\n  const [isLogin, setIsLogin] = React.useState(true);\n\n  return (\n    <div className=\"min-h-screen pt-32 pb-20 px-4 relative flex items-center justify-center\">\n      <div className=\"absolute inset-0 -z-10 bg-[radial-gradient(circle_at_bottom_left,_var(--tw-gradient-stops))] from-violet-600/10 via-transparent to-transparent\"></div>\n      \n      <div className={ui.card + \" max-w-lg w-full p-8 md:p-12 relative overflow-hidden\"}>\n        <div className=\"absolute top-0 right-0 p-8 opacity-5\">\n            <Lock size={150} />\n        </div>\n        \n        <div className=\"text-center mb-10 relative\">\n          <div className=\"inline-flex w-16 h-16 bg-violet-600/20 rounded-2xl items-center justify-center text-violet-400 mb-6\">\n            <Sparkles size={32} />\n          </div>\n          <h2 className=\"text-3xl font-black mb-3\">{isLogin ? 'مرحباً بعودتك' : 'انضم لعالم Megsy'}</h2>\n          <p className=\"text-white/40\">{isLogin ? 'أكمل رحلتك في تعلم الذكاء الاصطناعي اليوم' : 'أنشئ حساباً مجانياً وابدأ استثمارك في المستقبل'}</p>\n        </div>\n\n        <form className=\"space-y-6\" onSubmit={(e) => e.preventDefault()}>\n          {!isLogin && (\n            <div className=\"space-y-2\">\n                <label className=\"text-sm font-bold text-white/70 block px-1\">الاسم الكامل</label>\n                <div className=\"relative\">\n                    <input type=\"text\" className=\"w-full bg-white/5 border border-white/10 rounded-2xl py-4 px-6 focus:outline-none focus:border-violet-500/50 transition-all\" placeholder=\"حمزة الجزايري\" />\n                </div>\n            </div>\n          )}\n          \n          <div className=\"space-y-2\">\n            <label className=\"text-sm font-bold text-white/70 block px-1\">البريد الإلكتروني</label>\n            <div className=\"relative\">\n              <input type=\"email\" className=\"w-full bg-white/5 border border-white/10 rounded-2xl py-4 px-6 focus:outline-none focus:border-violet-500/50 transition-all\" placeholder=\"name@email.com\" />\n              <Mail className=\"absolute left-6 top-1/2 -translate-y-1/2 text-white/20\" size={18} />\n            </div>\n          </div>\n\n          <div className=\"space-y-2\">\n            <div className=\"flex justify-between px-1\">\n                <label className=\"text-sm font-bold text-white/70 block\">كلمة المرور</label>\n                {isLogin && <button className=\"text-xs text-violet-400 hover:underline\">نسيت كلمة المرور؟</button>}\n            </div>\n            <div className=\"relative\">\n              <input type=\"password\" className=\"w-full bg-white/5 border border-white/10 rounded-2xl py-4 px-6 focus:outline-none focus:border-violet-500/50 transition-all\" placeholder=\"••••••••\" />\n              <Lock className=\"absolute left-6 top-1/2 -translate-y-1/2 text-white/20\" size={18} />\n            </div>\n          </div>\n\n          <button className={ui.btnPrimary + \" w-full py-4 text-lg mt-4 shadow-violet-500/40\"}>\n            {isLogin ? 'تسجيل الدخول' : 'إنشاء حساب جديد'}\n          </button>\n\n          <div className=\"relative flex items-center justify-center py-4\">\n             <div className=\"absolute w-full h-[1px] bg-white/10\"></div>\n             <span className=\"bg-zinc-950 px-4 text-xs text-white/30 uppercase tracking-widest relative\">أو عبر</span>\n          </div>\n\n          <div className=\"grid grid-cols-2 gap-4\">\n             <button className={ui.btnGhost + \" py-3 px-4 border-white/5\"}>\n                <Chrome size={18} />\n                Google\n             </button>\n             <button className={ui.btnGhost + \" py-3 px-4 border-white/5\"}>\n                <Github size={18} />\n                GitHub\n             </button>\n          </div>\n        </form>\n\n        <p className=\"text-center mt-10 text-white/40\">\n          {isLogin ? 'ليس لديك حساب؟' : 'لديك حساب بالفعل؟'}\n          <button \n            onClick={() => setIsLogin(!isLogin)}\n            className=\"text-violet-400 font-bold mr-2 hover:underline\"\n          >\n            {isLogin ? 'سجل الآن' : 'ادخل لحسابك'}\n          </button>\n        </p>\n      </div>\n    </div>\n  );\n}","/pages/Account.jsx":"import React from 'react';\nimport { User, Settings, Package, CreditCard, LogOut, ChevronRight, Bell, Shield } from 'lucide-react';\nimport { ui } from '../lib/theme';\n\nexport default function Account() {\n  return (\n    <div className={ui.section + \" min-h-screen pt-32\"}>\n      <div className={ui.container + \" px-4\"}>\n        <div className=\"grid grid-cols-1 lg:grid-cols-4 gap-12\">\n          {/* Sidebar */}\n          <aside className=\"lg:col-span-1 space-y-4\">\n            <div className={ui.card + \" p-8 text-center\"}>\n              <div className=\"w-24 h-24 rounded-full bg-gradient-to-br from-violet-500 to-fuchsia-500 mx-auto mb-6 flex items-center justify-center text-3xl font-black border-4 border-white/5 shadow-2xl\">\n                H\n              </div>\n              <h3 className=\"text-xl font-bold mb-1\">حمزة الجزايري</h3>\n              <p className=\"text-white/40 text-sm mb-6\">عضو بريميوم في Megsy AI</p>\n              <button className=\"w-full py-3 rounded-xl bg-white/5 border border-white/10 text-red-400 hover:bg-red-500/10 transition-all font-bold flex items-center justify-center gap-2\">\n                <LogOut size={18} />\n                تسجيل الخروج\n              </button>\n            </div>\n\n            <nav className={ui.card + \" p-4 space-y-2\"}>\n              {[\n                { icon: User, label: 'الملف الشخصي', active: true },\n                { icon: Package, label: 'مشترياتي', active: false },\n                { icon: Bell, label: 'الإشعارات', active: false },\n                { icon: Shield, label: 'الأمان', active: false },\n                { icon: CreditCard, label: 'طرق الدفع', active: false },\n              ].map((item, i) => (\n                <button \n                    key={i} \n                    className={`w-full flex items-center justify-between p-4 rounded-xl transition-all ${\n                        item.active ? 'bg-violet-600 text-white shadow-lg shadow-violet-500/20' : 'text-white/50 hover:bg-white/5'\n                    }`}\n                >\n                  <div className=\"flex items-center gap-3\">\n                    <item.icon size={20} />\n                    <span className=\"font-bold\">{item.label}</span>\n                  </div>\n                  <ChevronRight size={16} />\n                </button>\n              ))}\n            </nav>\n          </aside>\n\n          {/* Main Content */}\n          <main className=\"lg:col-span-3 space-y-8\">\n            <div className={ui.card}>\n              <h3 className=\"text-2xl font-bold mb-8\">معلومات الحساب</h3>\n              <form className=\"grid grid-cols-1 md:grid-cols-2 gap-6\">\n                <div className=\"space-y-2\">\n                    <label className=\"text-xs font-bold text-white/30 uppercase tracking-widest px-1\">الاسم الأول</label>\n                    <input type=\"text\" defaultValue=\"حمزة\" className=\"w-full bg-white/5 border border-white/10 rounded-2xl py-4 px-6 focus:outline-none focus:border-violet-500/50\" />\n                </div>\n                <div className=\"space-y-2\">\n                    <label className=\"text-xs font-bold text-white/30 uppercase tracking-widest px-1\">اسم العائلة</label>\n                    <input type=\"text\" defaultValue=\"الجزايري\" className=\"w-full bg-white/5 border border-white/10 rounded-2xl py-4 px-6 focus:outline-none focus:border-violet-500/50\" />\n                </div>\n                <div className=\"md:col-span-2 space-y-2\">\n                    <label className=\"text-xs font-bold text-white/30 uppercase tracking-widest px-1\">البريد الإلكتروني</label>\n                    <input type=\"email\" defaultValue=\"hamza@megsy.ai\" className=\"w-full bg-white/10 border border-white/10 rounded-2xl py-4 px-6 opacity-60 cursor-not-allowed\" disabled />\n                    <p className=\"text-[10px] text-white/20 mt-2 px-1\">* لا يمكن تغيير البريد الإلكتروني الأساسي حالياً</p>\n                </div>\n                <div className=\"md:col-span-2 pt-6\">\n                    <button className={ui.btnPrimary + \" px-12\"}>حفظ التغييرات</button>\n                </div>\n              </form>\n            </div>\n\n            <div className={ui.card}>\n              <h3 className=\"text-2xl font-bold mb-8\">المشتريات الأخيرة</h3>\n              <div className=\"space-y-4\">\n                {[\n                    { name: 'Prompt Engineering Masterclass', date: '12 تشرين، 2023', price: 99 },\n                    { name: 'SaaS AI Builder Templates', date: '05 تشرين، 2023', price: 149 }\n                ].map((order, i) => (\n                    <div key={i} className=\"flex items-center justify-between p-6 bg-white/[0.02] border border-white/5 rounded-2xl\">\n                        <div>\n                            <h4 className=\"font-bold text-white uppercase text-sm mb-1\">{order.name}</h4>\n                            <p className=\"text-white/30 text-xs\">تاريخ الشراء: {order.date}</p>\n                        </div>\n                        <div className=\"text-right\">\n                            <span className=\"block text-violet-400 font-black text-xl\">${order.price}</span>\n                            <span className=\"text-[10px] text-emerald-500 font-bold uppercase tracking-widest\">مكتمل</span>\n                        </div>\n                    </div>\n                ))}\n              </div>\n            </div>\n          </main>\n        </div>\n      </div>\n    </div>\n  );\n}","/pages/Support.jsx":"import React from 'react';\nimport { motion, AnimatePresence } from 'framer-motion';\nimport { Send, Bot, User, Sparkles, HelpCircle, Loader2 } from 'lucide-react';\nimport { ui } from '../lib/theme';\n\nexport default function Support() {\n  const [messages, setMessages] = React.useState([\n    { role: 'assistant', content: 'مرحباً بك! أنا مساعد حمزة الذكي. كيف يمكنني مساعدتك في استكشاف منتجاتنا الرقمية أو خدمات Megsy AI اليوم؟' }\n  ]);\n  const [input, setInput] = React.useState('');\n  const [loading, setLoading] = React.useState(false);\n  const scrollRef = React.useRef(null);\n\n  React.useEffect(() => {\n    if (scrollRef.current) {\n      scrollRef.current.scrollTop = scrollRef.current.scrollHeight;\n    }\n  }, [messages]);\n\n  const handleSend = async (e) => {\n    e.preventDefault();\n    if (!input.trim() || loading) return;\n\n    const userMessage = input.trim();\n    setInput('');\n    setMessages(prev => [...prev, { role: 'user', content: userMessage }]);\n    setLoading(true);\n\n    try {\n      const response = await fetch('/api/proxy/lemondata/v1/chat/completions', {\n        method: 'POST',\n        headers: { \n          'Content-Type': 'application/json',\n          'Authorization': 'Bearer sk-mxr7hvA0iwxgxRQfXB6QUXGRINYX7dl0Y8dNyr2S2b499e6W'\n        },\n        body: JSON.stringify({\n          model: 'gpt-4o-mini',\n          messages: [\n            { \n              role: 'system', \n              content: 'أنت مساعد ذكي للمهندس حمزة الجزايري (Hamza Hassan Elgzairy)، مهندس AI في Megsy AI. موقع حمزة يحتوي على متجر لبيع برومبتات Midjourney، كورسات AI، وقوالب برمجية. تواصل بلهجة احترافية وودودة باللغة العربية. شجع المستخدمين على استكشاف المتجر أو التواصل مع حمزة للاستشارات.' \n            },\n            ...messages,\n            { role: 'user', content: userMessage }\n          ]\n        })\n      });\n\n      const data = await response.json();\n      const aiContent = data.choices[0].message.content;\n\n      setMessages(prev => [...prev, { role: 'assistant', content: aiContent }]);\n    } catch (error) {\n      setMessages(prev => [...prev, { role: 'assistant', content: 'عذراً، حدث خطأ أثناء الاتصال بالخادم. حاول مرة أخرى قريباً!' }]);\n    } finally {\n      setLoading(false);\n    }\n  };\n\n  return (\n    <div className={ui.section + \" pt-32 min-h-screen bg-black\"}>\n      <div className={ui.container + \" max-w-4xl\"}>\n        <div className=\"text-center mb-12\">\n          <div className=\"inline-flex p-3 rounded-2xl bg-violet-500/10 border border-violet-500/20 mb-4\">\n            <Bot className=\"text-violet-400\" size={32} />\n          </div>\n          <h1 className={ui.h2}>الدعم <span className={ui.gradientText}>الذكي</span></h1>\n          <p className=\"text-white/50 mt-4 font-medium uppercase tracking-[0.2em] text-sm\">Powered by Megsy Engine</p>\n        </div>\n\n        <div className={ui.card + \" flex flex-col h-[600px] relative overflow-hidden ring-1 ring-white/10 shadow-2xl\"}>\n          {/* Chat Headers */}\n          <div className=\"absolute top-0 left-0 right-0 h-2 bg-gradient-to-r from-violet-500 via-fuchsia-500 to-sky-500 z-20\" />\n          \n          {/* Messages Area */}\n          <div \n            ref={scrollRef}\n            className=\"flex-grow overflow-y-auto p-6 space-y-6 scrollbar-hide\"\n          >\n            <AnimatePresence>\n              {messages.map((msg, i) => (\n                <motion.div\n                  initial={{ opacity: 0, y: 10, scale: 0.95 }}\n                  animate={{ opacity: 1, y: 0, scale: 1 }}\n                  key={i}\n                  className={`flex ${msg.role === 'user' ? 'justify-start' : 'justify-end'}`}\n                >\n                  <div className={`flex gap-4 max-w-[85%] ${msg.role === 'user' ? 'flex-row' : 'flex-row-reverse'}`}>\n                    <div className={`w-10 h-10 rounded-xl flex-shrink-0 flex items-center justify-center border ${\n                      msg.role === 'user' ? 'bg-zinc-800 border-white/10' : 'bg-violet-600/20 border-violet-500/30'\n                    }`}>\n                      {msg.role === 'user' ? <User size={20} /> : <Bot className=\"text-violet-400\" size={20} />}\n                    </div>\n                    <div className={`p-4 rounded-3xl ${\n                      msg.role === 'user' \n                      ? 'bg-zinc-900 border border-white/5 text-white/90' \n                      : 'bg-violet-950/20 border border-violet-500/20 text-white leading-relaxed'\n                    }`}>\n                      {msg.content}\n                    </div>\n                  </div>\n                </motion.div>\n              ))}\n            </AnimatePresence>\n            {loading && (\n              <div className=\"flex justify-end pr-14\">\n                <div className=\"flex gap-2\">\n                  <span className=\"w-2 h-2 bg-violet-500 rounded-full animate-bounce [animation-delay:-0.3s]\" />\n                  <span className=\"w-2 h-2 bg-violet-500 rounded-full animate-bounce [animation-delay:-0.15s]\" />\n                  <span className=\"w-2 h-2 bg-violet-500 rounded-full animate-bounce\" />\n                </div>\n              </div>\n            )}\n          </div>\n\n          {/* Input Area */}\n          <form onSubmit={handleSend} className=\"p-6 bg-zinc-950/50 border-t border-white/10\">\n            <div className=\"relative\">\n              <input\n                type=\"text\"\n                value={input}\n                onChange={(e) => setInput(e.target.value)}\n                placeholder=\"اسألني أي شيء عن المتجر أو خدماتنا...\"\n                className=\"w-full bg-white/5 border border-white/10 rounded-2xl py-4 pr-14 pl-6 text-white placeholder-white/20 focus:outline-none focus:ring-2 focus:ring-violet-500/50 focus:border-violet-500/50 transition-all text-right\"\n                dir=\"rtl\"\n              />\n              <button\n                type=\"submit\"\n                disabled={loading || !input.trim()}\n                className=\"absolute left-3 top-1/2 -translate-y-1/2 w-10 h-10 bg-violet-600 rounded-xl flex items-center justify-center hover:bg-violet-500 transition-colors disabled:opacity-50 disabled:cursor-not-allowed\"\n              >\n                {loading ? <Loader2 size={20} className=\"animate-spin\" /> : <Send size={20} />}\n              </button>\n            </div>\n          </form>\n        </div>\n\n        {/* Quick Links */}\n        <div className=\"mt-12 grid grid-cols-1 sm:grid-cols-3 gap-4\">\n          <QuickAction icon={Sparkles} label=\"كيف أشتري برومبت؟\" />\n          <QuickAction icon={HelpCircle} label=\"ما هي Megsy AI؟\" />\n          <QuickAction icon={Sparkles} label=\"طرق الدفع المتاحة\" />\n        </div>\n      </div>\n    </div>\n  );\n}\n\nconst QuickAction = ({ icon: Icon, label }) => (\n  <button className=\"flex items-center gap-3 p-4 rounded-2xl bg-white/[0.02] border border-white/5 hover:bg-white/5 transition-colors text-right justify-end group\">\n    <span className=\"text-white/60 text-sm group-hover:text-white transition-colors\">{label}</span>\n    <Icon className=\"text-violet-400\" size={18} />\n  </button>\n);\n","/lib/theme.js":"export const ui = {\n  card: \"rounded-3xl border border-white/10 bg-white/[0.02] backdrop-blur-xl p-6 sm:p-8\",\n  cardHover: \"transition-all hover:border-white/20 hover:bg-white/[0.04] hover:-translate-y-1\",\n  btnPrimary: \"inline-flex items-center gap-2 rounded-full bg-gradient-to-r from-violet-500 to-fuchsia-500 px-6 py-3 font-semibold text-white shadow-[0_10px_40px_-10px_rgba(167,139,250,0.6)] hover:shadow-[0_10px_50px_-5px_rgba(167,139,250,0.8)] transition-all\",\n  btnGhost: \"inline-flex items-center gap-2 rounded-full border border-white/15 bg-white/[0.03] px-4 py-2 font-medium text-white/90 hover:bg-white/[0.06] transition-all\",\n  section: \"py-20 sm:py-28 lg:py-32 px-4 sm:px-6 lg:px-8\",\n  container: \"mx-auto max-w-7xl\",\n  h1: \"text-5xl sm:text-7xl lg:text-8xl font-black tracking-tight leading-tight\",\n  h2: \"text-3xl sm:text-5xl lg:text-6xl font-bold tracking-tight\",\n  gradientText: \"bg-gradient-to-r from-violet-400 via-fuchsia-400 to-sky-400 bg-clip-text text-transparent\",\n};\n","/App.jsx":"import React from 'react';\nimport { Routes, Route, Link, useLocation } from 'react-router-dom';\nimport { Home, Store, MessageSquare, User, ShoppingCart, Layout, Menu, X, ArrowRight, Shield, Rocket, Cpu } from 'lucide-react';\nimport { ui } from './lib/theme';\nimport { useCart } from './lib/cart';\n\n// Pages\nimport HomePage from './pages/Home';\nimport StorePage from './pages/Store';\nimport ProjectsPage from './pages/Projects';\nimport SupportPage from './pages/Support';\nimport AuthPage from './pages/Auth';\nimport CartPage from './pages/Cart';\nimport AccountPage from './pages/Account';\nimport NotFound from './pages/NotFound';\n\nconst Navbar = () => {\n  const [isOpen, setIsOpen] = React.useState(false);\n  const location = useLocation();\n  const { items } = useCart();\n  const cartCount = items.reduce((sum, item) => sum + item.quantity, 0);\n\n  const links = [\n    { name: 'الرئيسية', path: '/', icon: Home },\n    { name: 'المشاريع', path: '/projects', icon: Layout },\n    { name: 'المتجر', path: '/store', icon: Store },\n    { name: 'الدعم الذكي', path: '/support', icon: MessageSquare },\n  ];\n\n  return (\n    <nav className=\"fixed top-0 left-0 right-0 z-50 bg-black/60 backdrop-blur-xl border-b border-white/5\">\n      <div className={ui.container}>\n        <div className=\"flex items-center justify-between h-20 px-4\">\n          <Link to=\"/\" className=\"text-2xl font-black tracking-tighter flex items-center gap-2\">\n            <div className=\"w-8 h-8 bg-gradient-to-br from-violet-500 to-fuchsia-500 rounded-lg flex items-center justify-center\">\n              <Cpu className=\"text-white w-5 h-5\" />\n            </div>\n            <span className={ui.gradientText}>HAMZA.AI</span>\n          </Link>\n\n          {/* Desktop Nav */}\n          <div className=\"hidden md:flex items-center gap-8\">\n            {links.map((link) => (\n              <Link\n                key={link.path}\n                to={link.path}\n                className={`text-sm font-medium transition-colors hover:text-white ${\n                  location.pathname === link.path ? 'text-white' : 'text-white/50'\n                }`}\n              >\n                {link.name}\n              </Link>\n            ))}\n          </div>\n\n          <div className=\"hidden md:flex items-center gap-4\">\n            <Link to=\"/cart\" className=\"relative group p-2\">\n              <ShoppingCart size={24} className=\"text-white/70 group-hover:text-white\" />\n              {cartCount > 0 && (\n                <span className=\"absolute -top-1 -right-1 w-5 h-5 bg-violet-600 text-[10px] flex items-center justify-center rounded-full text-white font-bold animate-in zoom-in\">\n                  {cartCount}\n                </span>\n              )}\n            </Link>\n            <Link to=\"/auth\" className={ui.btnPrimary + \" py-2 px-6\"}>\n              دخول\n            </Link>\n          </div>\n\n          {/* Mobile Toggle */}\n          <button className=\"md:hidden text-white\" onClick={() => setIsOpen(!isOpen)}>\n            {isOpen ? <X size={28} /> : <Menu size={28} />}\n          </button>\n        </div>\n      </div>\n\n      {/* Mobile Menu */}\n      {isOpen && (\n        <div className=\"md:hidden bg-black border-b border-white/10 animate-in fade-in slide-in-from-top-4 duration-300\">\n          <div className=\"px-4 py-8 flex flex-col gap-6 text-center\">\n            {links.map((link) => (\n              <Link\n                key={link.path}\n                to={link.path}\n                onClick={() => setIsOpen(false)}\n                className=\"text-2xl font-bold text-white/50 hover:text-white\"\n              >\n                {link.name}\n              </Link>\n            ))}\n            <Link to=\"/auth\" onClick={() => setIsOpen(false)} className={ui.btnPrimary}>\n              ابدأ الآن\n            </Link>\n          </div>\n        </div>\n      )}\n    </nav>\n  );\n};\n\nconst Footer = () => (\n  <footer className=\"bg-zinc-950 border-t border-white/5 pt-20 pb-10\">\n    <div className={ui.container + \" px-4 text-center md:text-right\"}>\n      <div className=\"grid grid-cols-1 md:grid-cols-4 gap-12 mb-16 px-4\">\n        <div className=\"md:col-span-2\">\n          <Link to=\"/\" className=\"text-3xl font-black mb-6 block\">\n            <span className={ui.gradientText}>HAMZA.AI</span>\n          </Link>\n          <p className=\"text-white/50 max-w-sm mb-6 leading-relaxed\">\n            مستقبلك يبدأ هنا. نحن في Megsy AI نصمم أنظمة ذكاء اصطناعي تفهمك قبل أن تتحدث، لنجعل التكنولوجيا في يدك لا عليك.\n          </p>\n        </div>\n        <div>\n          <h4 className=\"text-white font-bold mb-6\">روابط هامة</h4>\n          <div className=\"flex flex-col gap-4 text-white/40\">\n            <Link to=\"/store\">المتجر الرقمي</Link>\n            <Link to=\"/projects\">المشاريع</Link>\n            <Link to=\"/support\">الدعم الفني</Link>\n          </div>\n        </div>\n        <div>\n          <h4 className=\"text-white font-bold mb-6\">تواصل معنا</h4>\n          <div className=\"flex flex-col gap-4 text-white/40\">\n            <p>hamza@megsy.ai</p>\n            <p>مجتمع Megsy في تلغرام</p>\n          </div>\n        </div>\n      </div>\n      <div className=\"pt-8 border-t border-white/5 text-center text-white/20 text-xs font-medium tracking-widest uppercase\">\n        © {new Date().getFullYear()} Hamza Hassan Elgzairy • Designed for the Future\n      </div>\n    </div>\n  </footer>\n);\n\nexport default function App() {\n  return (\n    <div className=\"bg-black text-white min-h-screen selection:bg-violet-500/30 font-cairo\" dir=\"rtl\">\n      <Navbar />\n      <main>\n        <Routes>\n          <Route path=\"/\" element={<HomePage />} />\n          <Route path=\"/store\" element={<StorePage />} />\n          <Route path=\"/projects\" element={<ProjectsPage />} />\n          <Route path=\"/support\" element={<Suppor               if (node.declaration) {
                const decl = node.declaration;
                if ((t.isFunctionDeclaration(decl) || t.isClassDeclaration(decl)) && decl.id && decl.id.name === exportName) found = true;
                if (t.isVariableDeclaration(decl)) {
                  for (const d of decl.declarations) if (t.isIdentifier(d.id) && d.id.name === exportName) found = true;
                }
              }
              for (const s of node.specifiers || []) {
                const exported = s.exported && (s.exported.name || s.exported.value);
                if (exported === exportName) found = true;
              }
            },
          }};
        }],
      });
    } catch (_) {
      return code.indexOf('export') !== -1 && code.indexOf(exportName) !== -1;
    }
    return found;
  }

  // CSS imports → JS module that injects a <style> tag and exports {}
  function makeCssModule(cssText, path) {
    const safe = JSON.stringify(cssText);
    return [
      "const __css = " + safe + ";",
      "const __style = document.createElement('style');",
      "__style.setAttribute('data-webly-css', " + JSON.stringify(path) + ");",
      "__style.textContent = __css;",
      "document.head.appendChild(__style);",
      "export default __css;",
    ].join('\n');
  }

  // Match import / export-from / dynamic import statements (handles single + double quotes)
  const IMPORT_RE = /(\bimport\s+(?:[\w*\s{},$]+\s+from\s+)?|\bexport\s+\*\s+from\s+|\bexport\s+\{[^}]*\}\s+from\s+|\bimport\s*\(\s*)(["'])([^"']+)(\2)/g;

  // Pull named bindings out of an import/export-from prefix like 'import Foo, { a, b as c } from '
  function extractNamedBindings(prefix) {
    const out = [];
    const braceMatch = prefix && prefix.match(/\{([^}]*)\}/);
    if (braceMatch) {
      for (const part of braceMatch[1].split(',')) {
        const seg = part.trim();
        if (!seg) continue;
        const name = seg.split(/\s+as\s+/i)[0].trim();
        if (name && name !== 'default' && /^[A-Za-z_$][A-Za-z0-9_$]*$/.test(name)) out.push(name);
      }
    }
    return out;
  }

  // Track which named bindings each local module must expose so we can
  // backfill missing ones from the default export instead of crashing.
  const requiredExports = Object.create(null);
  function noteRequired(modulePath, names) {
    if (!names.length) return;
    if (!requiredExports[modulePath]) requiredExports[modulePath] = new Set();
    for (const n of names) requiredExports[modulePath].add(n);
  }

  async function loadModule(path) {
    if (moduleCache[path]) return moduleCache[path];
    const src = FILES[path];
    if (src === undefined) throw new Error('Module not found: ' + path);

    let code;
    if (path.endsWith('.css')) {
      code = makeCssModule(src, path);
    } else {
      code = transformJs(src, path);

      // Find every relative dep and pre-load it (also note named bindings consumers want)
      const deps = [];
      let m;
      const re = new RegExp(IMPORT_RE.source, 'g');
      while ((m = re.exec(code)) !== null) {
        const prefix = m[1];
        const spec = m[3];
        const resolved = resolvePath(path, spec);
        if (resolved) {
          deps.push({ spec, resolved });
          noteRequired(resolved, extractNamedBindings(prefix));
        }
      }
      const depUrls = {};
      for (const d of deps) {
        depUrls[d.spec] = await loadModule(d.resolved);
      }
      const re2 = new RegExp(IMPORT_RE.source, 'g');
      code = code.replace(re2, function(_full, prefix, q, spec, q2){
        if (depUrls[spec]) return prefix + q + depUrls[spec] + q2;
        return _full;
      });

      // Shim 1: ensure a default export exists so 'import X from "./mod"' never fails.
      const hasDefault = /export\s+default\b/.test(code)
        || /export\s*\{[^}]*\bdefault\b[^}]*\}/.test(code)
        || /export\s*\{[^}]*\bas\s+default\b[^}]*\}/.test(code);
      if (!hasDefault) {
        code += "\n;export default {};\n";
      }

      // Named local imports are converted to namespace imports above, so we no
      // longer mutate a module's export table here. Mutating exports caused hard
      // browser syntax errors like "Duplicate export of 'seedProducts'".
    }

    const blob = new Blob([code], { type: 'text/javascript' });
    const url = URL.createObjectURL(blob);
    moduleCache[path] = url;
    return url;
  }

  // Pre-pass: scan every file's raw source so that requiredExports is fully
  // populated BEFORE any module is transformed/cached. Without this, a module
  // loaded earlier than one of its consumers wouldn't get the backfill.
  function prescanRequiredExports() {
    for (const filePath of Object.keys(FILES)) {
      if (!/\.(jsx?|tsx?)$/.test(filePath)) continue;
      const code = FILES[filePath];
      const re = new RegExp(IMPORT_RE.source, 'g');
      let m;
      while ((m = re.exec(code)) !== null) {
        const prefix = m[1];
        const spec = m[3];
        const resolved = resolvePath(filePath, spec);
        if (resolved) noteRequired(resolved, extractNamedBindings(prefix));
      }
    }
  }

  (async () => {
    try {
      prescanRequiredExports();
      const entryUrl = await loadModule(ENTRY);
      await import(entryUrl);
    } catch (err) {
      console.error('[Webly]', err);
      const msg = (err && err.stack) ? err.stack : String(err);
      document.getElementById('root').innerHTML =
        '<div style="padding:24px;font-family:ui-monospace,monospace;direction:ltr;text-align:left;min-height:100vh;background:#0f172a">' +
        '<h2 style="color:#f87171;margin:0 0 12px">Webly Runtime Error</h2>' +
        '<pre style="white-space:pre-wrap;color:#fecaca;background:#1e293b;padding:16px;border-radius:8px;border:1px solid #b91c1c;font-size:13px">' +
        msg.replace(/[&<>]/g, function(c){ return ({ '&':'&amp;','<':'&lt;','>':'&gt;' })[c]; }) +
        '</pre></div>';
    }
  })();
</script>
</body>
</html>
