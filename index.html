e path=\"/cart\" element={<Cart />} />\n          <Route path=\"/auth\" element={<Auth />} />\n          <Route path=\"/account\" element={<Account />} />\n          <Route path=\"/support\" element={<Support />} />\n          <Route path=\"/reset-password\" element={<ResetPassword />} />\n          <Route path=\"*\" element={<NotFound />} />\n        </Routes>\n      </main>\n      <Footer />\n    </div>\n  );\n}\n\nexport default App;\n","/main.jsx":"import React from 'react';\nimport ReactDOM from 'react-dom/client';\nimport { BrowserRouter } from 'react-router-dom';\nimport App from './App';\nimport './styles/tokens.css';\nimport './styles.css';\n\nReactDOM.createRoot(document.getElementById('root')).render(\n  <React.StrictMode>\n    <BrowserRouter>\n      <App />\n    </BrowserRouter>\n  </React.StrictMode>\n);\n","/styles/tokens.css":"","/styles.css":"@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Inter:wght@400;600;700&display=swap');\n\n@tailwind base;\n@tailwind components;\n@tailwind utilities;\n\nbody {\n  font-family: 'Inter', 'Cairo', sans-serif;\n  -webkit-font-smoothing: antialiased;\n  -moz-osx-font-smoothing: grayscale;\n  direction: ltr; /* Default to LTR, can be overridden for specific parts */\n}\n\n[dir=\"rtl\"] body {\n    direction: rtl;\n}\n","/components/Navbar.jsx":"import React, { useState } from 'react';\nimport { Link, NavLink } from 'react-router-dom';\nimport { Menu, X, ShoppingCart, User } from 'lucide-react';\nimport { ui } from '../lib/theme';\n\nconst navLinks = [\n  { path: '/', label: 'Home' },\n  { path: '/about', label: 'About' },\n  { path: '/projects', label: 'Projects' },\n  { path: '/store', label: 'Store' },\n  { path: '/support', label: 'Support' },\n];\n\nconst Navbar = () => {\n  const [isOpen, setIsOpen] = useState(false);\n\n  const activeLinkClass = \"text-violet-400\";\n\n  return (\n    <header className=\"sticky top-0 z-50 glass\">\n      <div className={`${ui.container} flex items-center justify-between h-20`}>\n        <Link to=\"/\" className=\"flex items-center gap-2\">\n          <span className=\"text-xl font-bold tracking-tight\">Hamza Elgzairy</span>\n        </Link>\n\n        <nav className=\"hidden md:flex items-center gap-6\">\n          {navLinks.map(link => (\n            <NavLink key={link.path} to={link.path} className={({ isActive }) => \n              `font-medium text-white/80 hover:text-white transition-colors ${isActive ? activeLinkClass : ''}`\n            }>\n              {link.label}\n            </NavLink>\n          ))}\n        </nav>\n\n        <div className=\"flex items-center gap-4\">\n           <NavLink to=\"/cart\" className={({isActive}) => `relative text-white/80 hover:text-white ${isActive ? activeLinkClass : ''}`}>\n            <ShoppingCart size={22} />\n            {/* Add a badge for cart items count later */}\n          </NavLink>\n          <NavLink to=\"/account\" className={({isActive}) => `text-white/80 hover:text-white ${isActive ? activeLinkClass : ''}`}>\n            <User size={22} />\n          </NavLink>\n\n          <button \n            className=\"md:hidden text-white/80 hover:text-white\"\n            onClick={() => setIsOpen(!isOpen)}\n            aria-label=\"Toggle menu\"\n          >\n            {isOpen ? <X size={24} /> : <Menu size={24} />}\n          </button>\n        </div>\n      </div>\n      \n      {/* Mobile Menu */}\n      {isOpen && (\n        <div className=\"md:hidden absolute top-20 left-0 w-full bg-surface pb-6\">\n          <nav className=\"flex flex-col items-center gap-6 pt-6\">\n            {navLinks.map(link => (\n              <NavLink \n                key={link.path} \n                to={link.path} \n                onClick={() => setIsOpen(false)}\n                className={({ isActive }) => \n                  `text-lg font-medium text-white/80 hover:text-white transition-colors ${isActive ? activeLinkClass : ''}`\n                }\n              >\n                {link.label}\n              </NavLink>\n            ))}\n          </nav>\n        </div>\n      )}\n    </header>\n  );\n};\n\nexport default Navbar;\n","/components/Footer.jsx":"import React from 'react';\nimport { Link } from 'react-router-dom';\nimport { Github, Linkedin, Twitter } from 'lucide-react';\nimport { ui } from '../lib/theme';\n\nconst Footer = () => {\n  return (\n    <footer className=\"bg-surface-2 border-t border-border\">\n      <div className={`${ui.container} ${ui.section} !py-16 grid grid-cols-1 md:grid-cols-3 gap-12`}>\n        <div>\n          <h3 className=\"font-bold text-lg mb-4\">Hamza Hassan Elgzairy</h3>\n          <p className=\"text-text-muted max-w-xs\">\n            AI Engineer at Megsy AI, building the future of intelligent applications.\n          </p>\n          <div className=\"flex items-center gap-4 mt-6\">\n            <a href=\"#\" className=\"text-text-muted hover:text-white\"><Github size={20} /></a>\n            <a href=\"#\" className=\"text-text-muted hover:text-white\"><Linkedin size={20} /></a>\n            <a href=\"#\" className=\"text-text-muted hover:text-white\"><Twitter size={20} /></a>\n          </div>\n        </div>\n\n        <div>\n          <h3 className=\"font-bold text-lg mb-4\">Quick Links</h3>\n          <ul className=\"space-y-3\">\n            <li><Link to=\"/about\" className=\"text-text-muted hover:text-white\">About</Link></li>\n            <li><Link to=\"/projects\" className=\"text-text-muted hover:text-white\">Projects</Link></li>\n            <li><Link to=\"/store\" className=\"text-text-muted hover:text-white\">Store</Link></li>\n            <li><Link to=\"/support\" className=\"text-text-muted hover:text-white\">Support</Link></li>\n          </ul>\n        </div>\n\n        <div>\n          <h3 className=\"font-bold text-lg mb-4\">Newsletter</h3>\n          <p className=\"text-text-muted mb-4\">Get updates on new projects and products.</p>\n          <form className=\"flex gap-2\">\n            <input type=\"email\" placeholder=\"your.email@example.com\" className=\"bg-surface border border-border rounded-md px-4 py-2 w-full focus:ring-violet-500 focus:border-violet-500\" />\n            <button type=\"submit\" className={`${ui.btnPrimary} !px-4 !py-2`}>Subscribe</button>\n          </form>\n        </div>\n      </div>\n      <div className=\"bg-bg border-t border-border py-6\">\n        <p className={`${ui.container} text-center text-sm text-text-muted`}>\n          &copy; {new Date().getFullYear()} Hamza Hassan Elgzairy. All rights reserved.\n        </p>\n      </div>\n    </footer>\n  );\n};\n\nexport default Footer;\n","/pages/Home.jsx":"import React from 'react';\nimport { Link } from 'react-router-dom';\nimport { ArrowRight, BrainCircuit, Code, ShoppingBag } from 'lucide-react';\nimport { ui } from '../lib/theme';\nimport { motion } from 'framer-motion';\n\nconst stagger = (delay) => ({\n  hidden: { opacity: 0, y: 20 },\n  visible: { opacity: 1, y: 0, transition: { staggerChildren: delay || 0.1 } },\n});\n\nconst fadeIn = {\n  hidden: { opacity: 0, y: 20 },\n  visible: { opacity: 1, y: 0 },\n};\n\nconst Home = () => {\n  const heroImageUrl = \"https://images.pexels.com/photos/777001/pexels-photo-777001.jpeg?auto=compress&cs=tinysrgb&w=1260&h=750&dpr=2\"; // Placeholder, will be replaced with the image from find_images\n\n  return (\n    <div className=\"overflow-hidden\">\n      {/* Hero Section */}\n      <motion.section \n        className={`${ui.section} relative min-h-screen flex items-center justify-center text-center`} \n        variants={stagger(0.2)} \n        initial=\"hidden\" \n        animate=\"visible\">\n        <div className=\"absolute inset-0 z-0\">\n          <img src=\"https://images.pexels.com/photos/1963075/pexels-photo-1963075.jpeg?auto=compress&cs=tinysrgb&w=1260&h=750&dpr=2\" alt=\"Hero Background\" className=\"w-full h-full object-cover opacity-10\" />\n          <div className=\"absolute inset-0 bg-gradient-to-t from-bg via-bg/80 to-transparent\"></div>\n        </div>\n\n        <div className=\"relative z-10 flex flex-col items-center\">\n          <motion.div variants={fadeIn} className=\"w-32 h-32 md:w-40 md:h-40 rounded-full mb-6 border-4 border-violet-500/50 shadow-lg overflow-hidden\">\n            <img src={heroImageUrl} alt=\"Hamza Hassan Elgzairy\" className=\"w-full h-full object-cover\" />\n          </motion.div>\n          <motion.h1 variants={fadeIn} className={`${ui.h1} mb-4`}>\n            Hamza Hassan Elgzairy\n          </motion.h1>\n          <motion.p variants={fadeIn} className=\"text-xl md:text-2xl text-text-muted mb-8 max-w-2xl\">\n            AI Engineer @ <a href=\"https://megsy.ai\" target=\"_blank\" rel=\"noopener noreferrer\" className=\"font-semibold text-violet-400 hover:text-violet-300\">Megsy AI</a>, crafting intelligent systems that push the boundaries of technology.\n          </motion.p>\n          <motion.div variants={fadeIn} className=\"flex flex-wrap justify-center gap-4\">\n            <Link to=\"/projects\" className={ui.btnPrimary}>\n              View My Work <ArrowRight size={20} />\n            </Link>\n            <Link to=\"/about\" className={ui.btnGhost}>\n              More About Me\n            </Link>\n          </motion.div>\n        </div>\n      </motion.section>\n\n      {/* Features Section */}\n      <motion.section className={`${ui.section} bg-surface-2`} initial=\"hidden\" whileInView=\"visible\" viewport={{ once: true, amount: 0.3 }} variants={stagger()}>\n        <div className={ui.container}>\n          <div className=\"max-w-2xl mx-auto text-center mb-16\">\n            <motion.h2 variants={fadeIn} className={ui.h2}>What I Do</motion.h2>\n            <motion.p variants={fadeIn} className=\"mt-4 text-lg text-text-muted\">\n              I focus on creating robust, scalable, and impactful AI solutions. From developing complex models to building user-centric applications, my work spans the full spectrum of AI engineering.\n            </p>\n          </div>\n          <div className=\"grid grid-cols-1 md:grid-cols-3 gap-8\">\n            <motion.div variants={fadeIn} className={`${ui.card} text-center`}>\n              <div className=\"inline-block p-4 bg-violet-900/50 rounded-full mb-4\">\n                <BrainCircuit className=\"text-violet-400\" size={32} />\n              </div>\n              <h3 className=\"text-xl font-bold mb-2\">AI Model Development</h3>\n              <p className=\"text-text-muted\">Specializing in building and training custom machine learning and deep learning models for various applications, including NLP and computer vision. I have extensive experience with frameworks like TensorFlow and PyTorch.</p>\n            </motion.div>\n            <motion.div variants={fadeIn} className={`${ui.card} text-center`}>\n              <div className=\"inline-block p-4 bg-sky-900/50 rounded-full mb-4\">\n                <Code className=\"text-sky-400\" size={32} />\n              </div>\n              <h3 className=\"text-xl font-bold mb-2\">Full-Stack AI Integration</h3>\n              <p className=\"text-text-muted\">Bridging the gap between AI models and real-world applications. I design and implement full-stack systems, integrating AI functionalities into scalable web services and user-friendly interfaces using technologies like React and Node.js.</p>\n            </motion.div>\n            <motion.div variants={fadeIn} className={`${ui.card} text-center`}>\n              <div className=\"inline-block p-4 bg-fuchsia-900/50 rounded-full mb-4\">\n                <ShoppingBag className=\"text-fuchsia-400\" size={32} />\n              </div>\n              <h3 className=\"text-xl font-bold mb-2\">Digital Product Creation</h3>\n              <p className=\"text-text-muted\">Leveraging my expertise to create valuable digital assets for developers and AI enthusiasts. I develop high-quality AI prompt packs, comprehensive courses, and ready-to-use project templates to accelerate AI development.</p>\n            </motion.div>\n          </div>\n        </div>\n      </motion.section>\n    </div>\n  );\n};\n\nexport default Home;\n","/lib/supabase.js":"import { createClient } from '@supabase/supabase-js';\n\nconst supabaseUrl = window.__SUPABASE_URL__;\nconst supabaseAnonKey = window.__SUPABASE_ANON_KEY__;\n\nexport const supabase = createClient(supabaseUrl, supabaseAnonKey);\n","/pages/NotFound.jsx":"import React from 'react';\nimport { Link } from 'react-router-dom';\nimport { Frown } from 'lucide-react';\nimport { ui } from '../lib/theme';\n\nconst NotFound = () => {\n  return (\n    <div className={`${ui.section} ${ui.container} text-center flex flex-col items-center justify-center min-h-[60vh]`}>\n        <Frown className=\"w-24 h-24 text-violet-400 mb-6\" />\n      <h1 className={`${ui.h1} ${ui.gradientText} mb-4`}>404</h1>\n      <h2 className=\"text-3xl font-bold mb-4\">Page Not Found</h2>\n      <p className=\"text-text-muted text-lg mb-8 max-w-md\">\n        Oops! The page you're looking for doesn't exist. It might have been moved or deleted.\n      </p>\n      <Link to=\"/\" className={ui.btnPrimary}>\n        Go Back Home\n      </Link>\n    </div>\n  );\n};\n\nexport default NotFound;\n","/pages/Store.jsx":"import React, { useState, useEffect } from 'react';\nimport { ui } from '../lib/theme';\nimport DigitalProductCard from '../components/DigitalProductCard';\nimport {motion} from 'framer-motion';\n\nconst Store = () => {\n  const [products, setProducts] = useState([]);\n  const [loading, setLoading] = useState(true);\n\n  useEffect(() => {\n    // In a real app, you'd fetch from /api/data/products\n    // For this static build, we'll fetch from the JSON file.\n    fetch('/data/products.json')\n      .then(res => res.json())\n      .then(data => {\n        setProducts(data);\n        setLoading(false);\n      })\n      .catch(err => {\n        console.error(\"Error fetching products:\", err);\n        setLoading(false);\n      });\n  }, []);\n\n  return (\n    <div className={`${ui.section} ${ui.container}`}>\n         <motion.div initial={{ opacity: 0, y: 20 }} animate={{ opacity: 1, y: 0 }} transition={{ duration: 0.5 }}>\n            <div className=\"text-center max-w-3xl mx-auto\">\n                <h1 className={`${ui.h1} ${ui.gradientText} mb-4`}>Digital Store</h1>\n                <p className=\"text-lg sm:text-xl text-text-muted\">\n                    Accelerate your AI journey with my collection of high-quality digital products. From comprehensive courses to production-ready templates, these resources are designed to save you time and provide immense value.\n                </p>\n            </div>\n        </motion.div>\n\n      <div className=\"mt-16 sm:mt-20\">\n        {loading ? (\n          <div className=\"grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8\">\n            {[...Array(6)].map((_, i) => (\n              <div key={i} className={`${ui.card} animate-pulse`}>\n                <div className=\"bg-surface-2 h-48 w-full rounded-lg mb-4\"></div>\n                <div className=\"h-6 bg-surface-2 rounded w-3/4 mb-2\"></div>\n                <div className=\"h-4 bg-surface-2 rounded w-1/4\"></div>\n              </div>\n            ))}\n          </div>\n        ) : (\n          <motion.div \n             initial=\"hidden\"\n             animate=\"visible\"\n             variants={{ visible: { transition: { staggerChildren: 0.1 } } }}\n             className=\"grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8\">\n            {products.map(product => (\n                 <motion.div key={product.name_en} variants={{ hidden: { opacity: 0, y: 20 }, visible: { opacity: 1, y: 0 } }}>\n                    <DigitalProductCard product={product} />\n                 </motion.div>\n            ))}\n          </motion.div>\n        )}\n      </div>\n    </div>\n  );\n};\n\nexport default Store;","/components/DigitalProductCard.jsx":"import React from 'react';\nimport { ShoppingCart } from 'lucide-react';\nimport { ui } from '../lib/theme';\n\nconst DigitalProductCard = ({ product }) => {\n  // In a real app, you would use a global state (like Zustand/Redux) to handle adding to cart.\n  const handleAddToCart = () => {\n    console.log(`Added ${product.name_en} to cart.`);\n    // useCartStore.getState().addItem(product);\n  };\n\n  return (\n    <div className={`${ui.card} ${ui.cardHover} flex flex-col h-full`}>\n      <div className=\"aspect-video w-full overflow-hidden rounded-lg mb-4\">\n        <img src={product.image_url} alt={product.name_en} className=\"w-full h-full object-cover\" />\n      </div>\n      <div className=\"flex-grow\">\n          <p className=\"text-sm text-violet-400 font-medium mb-1\">{product.category}</p>\n          <h3 className=\"text-lg font-bold mb-2\">{product.name_en}</h3>\n          <p className=\"text-text-muted text-sm flex-grow mb-4\">{product.description_en}</p>\n      </div>\n      <div className=\"flex items-center justify-between mt-4\">\n        <span className=\"text-2xl font-bold text-white\">${product.price.toFixed(2)}</span>\n        <button onClick={handleAddToCart} className={`${ui.btnGhost} !px-4 !py-2`}>\n          <ShoppingCart size={18} />\n          <span className=\"hidden sm:inline\">Add to Cart</span>\n        </button>\n      </div>\n    </div>\n  );\n};\n\nexport default DigitalProductCard;","/pages/About.jsx":"import React from 'react';\nimport { ui } from '../lib/theme';\nimport { motion } from 'framer-motion';\nimport { Briefcase, Cpu, Code, Zap, Target } from 'lucide-react';\n\nconst About = () => {\n  const aboutImageUrl = 'https://images.pexels.com/photos/33433724/pexels-photo-33433724.jpeg?auto=compress&cs=tinysrgb&dpr=2&h=650&w=940';\n\n  return (\n    <div className={`${ui.section} ${ui.container}`}>\n      <motion.div \n        initial={{ opacity: 0, y: 20 }}\n        animate={{ opacity: 1, y: 0 }}\n        transition={{ duration: 0.5 }}\n        className=\"text-center max-w-3xl mx-auto mb-16 sm:mb-24\"\n      >\n        <h1 className={`${ui.h1} ${ui.gradientText} mb-4`}>About Me</h1>\n        <p className=\"text-lg sm:text-xl text-text-muted\">\n          An AI Engineer driven by a passion for building intelligent, scalable, and impactful solutions that shape the future.\n        </p>\n      </motion.div>\n\n      <div className=\"grid grid-cols-1 lg:grid-cols-5 gap-12 lg:gap-16 items-center\">\n        <motion.div \n          initial={{ opacity: 0, x: -50 }}\n          animate={{ opacity: 1, x: 0 }}\n          transition={{ duration: 0.7 }}\n          className=\"lg:col-span-2\"\n        >\n          <div className=\"aspect-square relative rounded-3xl overflow-hidden glass p-2\">\n             <img src={aboutImageUrl} alt=\"Hamza Hassan Elgzairy\" className=\"w-full h-full object-cover rounded-2xl\" />\n             <div className=\"absolute bottom-4 left-4 right-4 p-4 bg-black/50 backdrop-blur-md rounded-xl border border-white/10\">\n                <p className='font-bold text-lg'>Hamza H. Elgzairy</p>\n                <p className='text-sm text-violet-300'>AI Engineer @ Megsy AI</p>\n             </div>\n          </div>\n        </motion.div>\n        <motion.div \n          initial={{ opacity: 0, x: 50 }}\n          animate={{ opacity: 1, x: 0 }}\n          transition={{ duration: 0.7, delay: 0.2 }}\n          className=\"lg:col-span-3\"\n        >\n          <h2 className={`${ui.h2} mb-6`}>From Curiosity to Creation</h2>\n          <div className=\"space-y-6 text-text-muted text-lg leading-relaxed\">\n            <p>\n              My journey into the world of Artificial Intelligence began not in a classroom, but with a profound curiosity about how complex systems learn and adapt. This curiosity evolved into a dedicated career focused on the intersection of data, algorithms, and user experience. As an AI Engineer at <a href='https://megsy.ai' target='_blank' rel='noopener noreferrer' className='text-violet-400 font-semibold'>Megsy AI</a>, I am on the front lines, architecting and implementing the core intelligence that powers our next-generation platform.\n            </p>\n            <p>\n              I specialize in the full development lifecycle of AI systems—from conceptualization and data processing to model training, deployment, and integration into full-stack applications. My work is not just about writing code; it's about solving real-world problems and creating tangible value through technology.\n            </p>\n             <p>\n              I thrive in dynamic environments where innovation is constant. Whether it's fine-tuning a large language model, designing a scalable API for an AI service, or collaborating with a team to bring a complex feature to life, my goal is always to build products that are not only intelligent but also reliable and intuitive.\n            </p>\n          </div>\n        </motion.div>\n      </div>\n      \n      {/* Core Competencies Section */}\n    <div className=\"mt-24 sm:mt-32\">\n        <div className=\"text-center max-w-3xl mx-auto\">\n            <h2 className={`${ui.h2} mb-4`}>Core Competencies</h2>\n             <p className=\"text-lg text-text-muted\">\n             I leverage a diverse skill set to translate complex technical challenges into elegant solutions.\n            </p>\n        </div>\n        <div className=\"mt-16 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8\">\n            <div className={`${ui.card} text-center`}>\n                <Cpu size={32} className=\"mx-auto text-violet-400 mb-4\"/>\n                <h3 className='font-bold text-xl mb-2'>Machine Learning</h3>\n                <p className='text-text-muted text-sm'>Expert in Scikit-learn, TensorFlow, PyTorch. Experience with NLP, Computer Vision and predictive modeling.</p>\n            </div>\n            <div className={`${ui.card} text-center`}>\n                <Code size={32} className=\"mx-auto text-sky-400 mb-4\"/>\n                <h3 className='font-bold text-xl mb-2'>Backend Development</h3>\n                <p className='text-text-muted text-sm'>Building robust APIs and data pipelines using Python (FastAPI), Node.js, and integrating with databases like PostgreSQL and Supabase.</p>\n            </div>\n            <div className={`${ui.card} text-center`}>\n                <Zap size={32} className=\"mx-auto text-amber-400 mb-4\"/>\n                <h3 className='font-bold text-xl mb-2'>MLOps & Deployment</h3>\n                <p className='text-text-muted text-sm'>Proficient in containerization with Docker, CI/CD pipelines, and deploying scalable models on cloud platforms (AWS, GCP).</p>\n            </div>\n            <div className={`${ui.card} text-center`}>\n                <Target size={32} className=\"mx-auto text-fuchsia-400 mb-4\"/>\n                <h3 className='font-bold text-xl mb-2'>Product Strategy</h3>\n                <p className='text-text-muted text-sm'>Adept at aligning technical possibilities with business goals to deliver AI features that have a measurable market impact.</p>\n            </div>\n        </div>\n    </div>\n\n    </div>\n  );\n};\n\nexport default About;\n","/pages/Projects.jsx":"import React from 'react';\nimport { ui } from '../lib/theme';\nimport { ExternalLink, Github } from 'lucide-react';\n\nconst projects = [\n  {\n    title: \"Megsy AI Core\",\n    description: \"Developing the core AI architecture for Megsy, focusing on scalable model deployment and real-time processing.\",\n    tags: [\"Python\", \"PyTorch\", \"FastAPI\", \"Docker\"],\n    link: \"#\",\n    github: \"#\"\n  },\n  {\n    title: \"EcoSmart Predictor\",\n    description: \"An AI-powered system for predicting energy consumption in smart buildings, reducing waste by 25%.\",\n    tags: [\"TensorFlow\", \"Scikit-learn\", \"PostgreSQL\"],\n    link: \"#\",\n    github: \"#\"\n  },\n  {\n    title: \"VisionScan Pro\",\n    description: \"Advanced computer vision   const ENTRY = "/main.jsx";
  const moduleCache = Object.create(null);

  function tryResolve(path) {
    if (FILES[path] !== undefined) return path;
    for (const ext of ['.jsx', '.tsx', '.js', '.ts', '.css']) {
      if (FILES[path + ext] !== undefined) return path + ext;
    }
    for (const ext of ['.jsx', '.tsx', '.js', '.ts']) {
      if (FILES[path + '/index' + ext] !== undefined) return path + '/index' + ext;

  function resolvePath(from, spec) {

    const segs = [];
    for (const s of raw.split('/')) {

      if (s === '..') segs.pop();

  const NO_DEFAULT_EXTERNALS = new Set([

        );

          t.importDeclaration([t.importNamespaceSpecifier(t.identifier(s.local.name))], t.stringLiteral(source))
        );

  // CSS imports → JS module that injects a <style> tag and exports {}

  function extractNamedBindings(prefix) {

      const hasDefault = /export\s+default\b/.test(code)
        || /export\s*\{[^}]*\bdefault\b[^}]*\}/.test(code)
        || /export\s*\{[^}]*\bas\s+default\b[^}]*\}/.test(code);
      if (!hasDefault) {
        code += "\n;export default {};\n";
      }

      // Named local imports are converted to namespace imports above, so we no
      // longer mutate a module's export table here. Mutating exports caused hard
      // browser syntax errors like "Duplicate export of 'seedProducts'".
    }

    const blob = new Blob([code], { type: 'text/javascript' });
    const url = URL.createObjectURL(blob);
    moduleCache[path] = url;
    return url;
  }

  // Pre-pass: scan every file's raw source so that requiredExports is fully
  // populated BEFORE any module is transformed/cached. Without this, a module
  // loaded earlier than one of its consumers wouldn't get the backfill.
  function prescanRequiredExports() {
    for (const filePath of Object.keys(FILES)) {
      if (!/\.(jsx?|tsx?)$/.test(filePath)) continue;
      const code = FILES[filePath];
      const re = new RegExp(IMPORT_RE.source, 'g');
      let m;
      while ((m = re.exec(code)) !== null) {
        const prefix = m[1];
        const spec = m[3];
        const resolved = resolvePath(filePath, spec);
        if (resolved) noteRequired(resolved, extractNamedBindings(prefix));
      }
    }
  }

  (async () => {
    try {
      prescanRequiredExports();
      const entryUrl = await loadModule(ENTRY);
      await import(entryUrl);
    } catch (err) {
      console.error('[Webly]', err);
      const msg = (err && err.stack) ? err.stack : String(err);
      document.getElementById('root').innerHTML =
        '<div style="padding:24px;font-family:ui-monospace,monospace;direction:ltr;text-align:left;min-height:100vh;background:#0f172a">' +
        '<h2 style="color:#f87171;margin:0 0 12px">Webly Runtime Error</h2>' +
        '<pre style="white-space:pre-wrap;color:#fecaca;background:#1e293b;padding:16px;border-radius:8px;border:1px solid #b91c1c;font-size:13px">' +
        msg.replace(/[&<>]/g, function(c){ return ({ '&':'&amp;','<':'&lt;','>':'&gt;' })[c]; }) +
        '</pre></div>';
    }
  })();
</script>
</body>
</html>
